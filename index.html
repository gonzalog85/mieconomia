// ── EXPORT / SHARE ────────────────────────────────────────────────────────

function exportExcel() {
  if (transactions.length === 0) { showToast('No hay datos para exportar', 'error'); return; }
  const rows = transactions.map(t => {
    const cat = getCat(t.category);
    return {
      'Fecha':        t.date,
      'Tipo':         t.type === 'income' ? 'Ingreso' : 'Gasto',
      'Categoría':    cat.label,
      'Método':       t.method,
      'Descripción':  t.description || '',
      'Monto':        t.type === 'income' ? t.amount : -t.amount,
    };
  });

  // Summary sheet
  const income  = transactions.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense = transactions.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const summary = [
    { 'Concepto': 'Total Ingresos',  'Monto': income },
    { 'Concepto': 'Total Gastos',    'Monto': -expense },
    { 'Concepto': 'Balance Final',   'Monto': income - expense },
  ];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows),    'Movimientos');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(summary), 'Resumen');

  const date = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `MiEconomia_${date}.xlsx`);
  setLastBackup();
  showToast('Excel descargado ✅');
}

function exportCSV() {
  if (transactions.length === 0) { showToast('No hay datos para exportar', 'error'); return; }
  const header = ['id','date','type','amount','category','method','description'];
  const rows = transactions.map(t =>
    [t.id, t.date, t.type, t.amount, t.category, t.method, (t.description||'').replace(/,/g,' ')].join(',')
  );
  const csv = [header.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `MiEconomia_backup_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
  setLastBackup();
  showToast('CSV descargado ✅');
}

function restoreCSV(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const lines = e.target.result.trim().split('\n');
      const header = lines[0].split(',');
      const restored = lines.slice(1).map(line => {
        const vals = line.split(',');
        const obj = {};
        header.forEach((h,i) => obj[h.trim()] = vals[i]?.trim() || '');
        return {
          id:          parseInt(obj.id) || Date.now(),
          date:        obj.date,
          type:        obj.type,
          amount:      parseFloat(obj.amount) || 0,
          category:    obj.category,
          method:      obj.method,
          description: obj.description || '',
        };
      }).filter(t => t.amount > 0 && t.date && t.type);

      if (restored.length === 0) { showToast('CSV inválido o vacío', 'error'); return; }
      if (!confirm(`¿Restaurar ${restored.length} movimientos? Esto reemplazará los datos actuales.`)) return;
      transactions = restored;
      saveTxs(transactions);
      showToast(`${restored.length} movimientos restaurados ✅`);
      showView('dashboard');
    } catch(err) {
      showToast('Error al leer el archivo', 'error');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function shareWhatsApp() {
  if (transactions.length === 0) { showToast('No hay datos para compartir', 'error'); return; }

  const now = new Date();
  const m = now.getMonth(), y = now.getFullYear();
  const monthTxs = transactions.filter(t => {
    const d = new Date(t.date);
    return d.getFullYear()===y && d.getMonth()===m;
  });

  const income  = monthTxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense = monthTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const balance = income - expense;
  const cardExp = monthTxs.filter(t=>t.type==='expense'&&t.method==='Tarjeta crédito').reduce((s,t)=>s+t.amount,0);

  const byCat = {};
  monthTxs.filter(t=>t.type==='expense').forEach(t => { byCat[t.category]=(byCat[t.category]||0)+t.amount; });
  const topCats = Object.entries(byCat).sort((a,b)=>b[1]-a[1]).slice(0,4);

  const fmtARS = n => '$' + Math.round(n).toLocaleString('es-AR');

  let msg = `💰 *MiEconomía — ${MONTHS_ES[m]} ${y}*\n\n`;
  msg += `📈 Ingresos:  ${fmtARS(income)}\n`;
  msg += `📉 Gastos:    ${fmtARS(expense)}\n`;
  msg += `💳 Tarjeta:   ${fmtARS(cardExp)}\n`;
  msg += `━━━━━━━━━━━━━━\n`;
  msg += `${balance >= 0 ? '✅' : '⚠️'} Balance:   ${fmtARS(balance)}\n\n`;

  if (topCats.length > 0) {
    msg += `*Mayores gastos:*\n`;
    topCats.forEach(([catId, amount]) => {
      const cat = getCat(catId);
      msg += `  ${cat.icon} ${cat.label}: ${fmtARS(amount)}\n`;
    });
  }

  const url = 'https://wa.me/?text=' + encodeURIComponent(msg);
  window.open(url, '_blank');
}

function reloadApp() {
  if (confirm('¿Recargar la app? Esto buscará la última versión disponible.')) {

    if ('caches' in window) {
      caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k))))
        .then(() => location.reload());
    } else {
      location.reload();
    }
  }
}

function setBudget(catId) {
  const cat = getCat(catId);
  const current = budgets[catId];
  const input = prompt(
    `Presupuesto mensual para "${cat.label}":\n${current ? `(actual: ${fmt(current)})` : ''}`,
    current || ''
  );
  if (input === null) return;
  const amount = parseFloat(input);
  if (isNaN(amount) || amount <= 0) { showToast('Monto inválido', 'error'); return; }
  budgets[catId] = amount;
  saveBudgets();
  showToast(`Presupuesto definido: ${fmt(amount)}`);
  render();
}

function deleteBudget(catId) {
  if (!confirm('¿Quitar este presupuesto?')) return;
  delete budgets[catId];
  saveBudgets();
  showToast('Presupuesto eliminado');
  render();
}

  }

  const data = {
    id: recurringForm.id || ('r_' + Date.now()),
    name: recurringForm.name.trim(),

    type: recurringForm.type,
    category: recurringForm.category,
    method: recurringForm.method,
    dayOfMonth: recurringForm.dayOfMonth,
    active: recurringForm.active,
    lastApplied: recurringForm.lastApplied || null
  };

  if (recurringForm.id) {
    const idx = recurring.findIndex(r => r.id === recurringForm.id);
    if (idx >= 0) recurring[idx] = data;
  } else {
    recurring.push(data);

// Apply recurring transactions if their date has passed
function checkRecurring() {
  const today = new Date();
  const todayStr = today.toISOString().slice(0, 10);
  let applied = 0;
  const appliedNames = [];

  recurring.forEach(r => {
    if (!r.active) return;

    // Last applied date
    const lastDate = r.lastApplied ? new Date(r.lastApplied) : null;

    // Find all due dates between lastApplied (or 30 days ago if never) and today
    const startDate = lastDate
      ? new Date(lastDate.getFullYear(), lastDate.getMonth() + 1, 1)
      : new Date(today.getFullYear(), today.getMonth(), 1);

    let cursor = new Date(startDate.getFullYear(), startDate.getMonth(), r.dayOfMonth);
    while (cursor <= today) {
      // Check that this exact date hasn't been applied (defensive)
      const cursorStr = cursor.toISOString().slice(0, 10);
      const exists = transactions.some(t =>
        t._recurringId === r.id && t.date === cursorStr
      );
      if (!exists) {
        const tx = {
          id: Date.now() + Math.random(),
          type: r.type,
          amount: r.amount,
          category: r.category,
          method: r.method,
          description: r.name + ' (auto)',
          date: cursorStr,
          _recurringId: r.id
        };
        transactions.unshift(tx);
        applied++;
        if (!appliedNames.includes(r.name)) appliedNames.push(r.name);
      }
      // Next month
      cursor = new Date(cursor.getFullYear(), cursor.getMonth() + 1, r.dayOfMonth);
    }

    r.lastApplied = todayStr;
  });

  if (applied > 0) {
    saveTxs(transactions);
    saveRecurring();
    recurringJustApplied = appliedNames;
  }
}

          <button class="modal-close" onclick="closeModal()">×</button>
        </div>

        ${!categoryForm.id ? `
        <div class="type-toggle">
          <button class="toggle-btn ${categoryForm.type==='expense'?'expense-active':''}"
            onclick="categoryForm.type='expense'; renderCategoryModal()">↓ Gasto</button>
          <button class="toggle-btn ${categoryForm.type==='income'?'income-active':''}"
            onclick="categoryForm.type='income'; renderCategoryModal()">↑ Ingreso</button>
        </div>` : ''}

        <label>Nombre</label>
        <input type="text" placeholder="Ej: Café"
          value="${categoryForm.label.replace(/"/g, '&quot;')}"
          oninput="categoryForm.label=this.value" maxlength="20" />

        <label>Ícono · Seleccionado: <span style="font-size:18px">${categoryForm.icon}</span></label>
        <div class="emoji-picker">
          ${CATEGORY_EMOJIS.map(e => `
            <button class="emoji-cell ${categoryForm.icon === e ? 'selected' : ''}"
              onclick="categoryForm.icon='${e}'; renderCategoryModal()">${e}</button>
          `).join('')}
        </div>

        <div class="form-actions">
          <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
          <button class="btn-save" onclick="saveCategoryForm()">Guardar</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('modal-container').innerHTML = html;
}

function saveCategoryForm() {
  if (!categoryForm.label.trim()) { showToast('Falta el nombre', 'error'); return; }
  const label = categoryForm.label.trim();

  if (categoryForm.id) {
    // Edit
    const idx = CATEGORIES[categoryForm.type].findIndex(c => c.id === categoryForm.id);
    if (idx >= 0) {
      CATEGORIES[categoryForm.type][idx].label = label;
      CATEGORIES[categoryForm.type][idx].icon = categoryForm.icon;
    }
  } else {
    // Create
    const id = 'custom_' + Date.now();
    CATEGORIES[categoryForm.type].push({ id, label, icon: categoryForm.icon });
  }
  saveCategoriesToStorage();
  closeModal();
  showToast(`Categoría ${categoryForm.id ? 'actualizada' : 'creada'}`);
  render();
}

function deleteCategory(catId, type) {
  const used = transactions.some(t => t.category === catId);
  if (used) {
    if (!confirm('Esta categoría tiene movimientos. ¿Eliminar igual? Los movimientos se quedarán sin categoría visible.')) return;
  } else {
    if (!confirm('¿Eliminar esta categoría?')) return;
  }
  CATEGORIES[type] = CATEGORIES[type].filter(c => c.id !== catId);
  saveCategoriesToStorage();
  // Also remove budget if exists
  if (budgets[catId]) { delete budgets[catId]; saveBudgets(); }
  showToast('Categoría eliminada');
  render();
}

// ── METHODS PAGE ──────────────────────────────────────────────────────────
function renderMethodsPage() {
  return `
  <div class="fade-up">
    <div class="subpage-header">
      <button class="back-btn" onclick="showView('settings')">‹</button>
      <div class="subpage-title">💳 Métodos de pago</div>
      <button class="subpage-action" onclick="openMethodForm()">+ Nuevo</button>
    </div>

    <p style="font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.5">
      Personalizá los métodos de pago. Si editás uno existente, los movimientos viejos se actualizan automáticamente.
    </p>

    ${METHODS.map(m => methodRow(m)).join('')}
  </div>`;
}

function methodRow(m) {
  const isCustom = isCustomMethod(m.id);
  const usage = transactions.filter(t => t.method === m.label).length;
  return `
    <div class="recurring-row" style="margin-bottom:8px">
      <div class="ricon">${m.icon}</div>
      <div class="recurring-info">
        <div class="recurring-name">${m.label}</div>
        <div class="recurring-meta">${isCustom ? 'Personalizado' : 'Predefinido'} · ${usage} movimiento${usage !== 1 ? 's' : ''}</div>
      </div>
      <button class="recurring-toggle" onclick="editMethod('${m.id}')" title="Editar">✏️</button>
      ${isCustom ? `
        <button class="recurring-toggle" onclick="deleteMethod('${m.id}')" title="Eliminar" style="color:var(--red);border-color:#5a2a2a">🗑️</button>
      ` : ''}
    </div>
  `;
}

function openMethodForm() {
  methodForm = { id: null, label: '', icon: '💳', oldLabel: null };
  renderMethodModal();
}

function editMethod(methodId) {
  const m = METHODS.find(x => x.id === methodId);
  if (!m) return;
  methodForm = { id: m.id, label: m.label, icon: m.icon, oldLabel: m.label };
  renderMethodModal();
}

function renderMethodModal() {
  const html = `
    <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
      <div class="modal" style="max-width:360px">
        <div class="modal-header">
          <div class="modal-title">${methodForm.id ? '✏️ Editar' : '➕ Nuevo'} método</div>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>

        <label>Nombre</label>
        <input type="text" placeholder="Ej: Naranja X, Ualá, Brubank"
          value="${methodForm.label.replace(/"/g, '&quot;')}"
          oninput="methodForm.label=this.value" maxlength="25" />

        <label>Ícono · Seleccionado: <span style="font-size:18px">${methodForm.icon}</span></label>
        <div class="emoji-picker">
          ${['💵','💳','🏦','🟡','🟣','🔵','🟢','🔴','🟠','📱','💰','💸','🧾','📲','🪙','💴','💶','💷','📦','⚡','🌟','✨','🎯','📊','🔐','🏧','💼','🎫','🎟️','🪪','📇','💎','🏷️','🛡️','📞','🌐','💻','⌚','📱','🖥️'].map(e => `
            <button class="emoji-cell ${methodForm.icon === e ? 'selected' : ''}"
              onclick="methodForm.icon='${e}'; renderMethodModal()">${e}</button>
          `).join('')}
        </div>

        <div class="form-actions">
          <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
          <button class="btn-save" onclick="saveMethodForm()">Guardar</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('modal-container').innerHTML = html;
}

function saveMethodForm() {
  const label = methodForm.label.trim();
  if (!label) { showToast('Falta el nombre', 'error'); return; }

  // Check duplicate
  const existing = METHODS.find(m => m.label === label && m.id !== methodForm.id);
  if (existing) { showToast('Ya existe un método con ese nombre', 'error'); return; }

  if (methodForm.id) {
    // Edit
    const idx = METHODS.findIndex(m => m.id === methodForm.id);
    if (idx >= 0) {
      const oldLabel = methodForm.oldLabel;
      METHODS[idx].label = label;
      METHODS[idx].icon = methodForm.icon;

      // Migrate transactions if label changed
      if (oldLabel && oldLabel !== label) {
        let migrated = 0;
        transactions.forEach(t => {
          if (t.method === oldLabel) { t.method = label; migrated++; }
        });
        recurring.forEach(r => {
          if (r.method === oldLabel) r.method = label;
        });
        if (migrated > 0) {
          saveTxs(transactions);
          saveRecurring();
        }
      }
    }
  } else {
    // Create
    const id = 'custom_m_' + Date.now();
    METHODS.push({ id, label, icon: methodForm.icon });
  }
  saveMethodsToStorage();
  closeModal();
  showToast(`Método ${methodForm.id ? 'actualizado' : 'creado'}`);
  render();
}

function deleteMethod(methodId) {
  const m = METHODS.find(x => x.id === methodId);
  if (!m) return;
  const usage = transactions.filter(t => t.method === m.label).length;
  let msg = `¿Eliminar "${m.label}"?`;
  if (usage > 0) msg += `\n\nLos ${usage} movimientos con este método se reasignarán a "Otro".`;
  if (!confirm(msg)) return;

  // Reassign transactions
  if (usage > 0) {
    transactions.forEach(t => {
      if (t.method === m.label) t.method = 'Otro';
    });
    recurring.forEach(r => {
      if (r.method === m.label) r.method = 'Otro';
    });
    saveTxs(transactions);
    saveRecurring();
  }

  METHODS = METHODS.filter(x => x.id !== methodId);
  saveMethodsToStorage();
  showToast('Método eliminado');
  render();
}

// ── PHASE 3 TOGGLES ───────────────────────────────────────────────────────
function toggleQuickAdd() {
  settingsFlags.quickAddEnabled = !settingsFlags.quickAddEnabled;
  saveSettingsFlags();
  render();
  showToast(settingsFlags.quickAddEnabled ? 'Modo rápido activado' : 'Modo rápido desactivado');
}

function togglePieChart() {
  settingsFlags.showPieChart = !settingsFlags.showPieChart;
  saveSettingsFlags();
  render();
}

function onFabClick() {
  if (settingsFlags.quickAddEnabled) {
    openQuickAdd();
  } else {
    showView('add');
  }
}

// ── QUICK ADD ─────────────────────────────────────────────────────────────
let quickAddState = { amount: '', category: null };

function openQuickAdd() {
  quickAddState = { amount: '', category: getFavoriteCategory() };
  renderQuickAdd();
  // Focus amount input
  setTimeout(() => {
    const el = document.getElementById('quick-amount');
    if (el) el.focus();
  }, 100);
}

function renderQuickAdd() {
  // Top 8 most-used categories from last 30 days
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 30);
  const recent = transactions.filter(t =>
    t.type === 'expense' && new Date(t.date) >= cutoff
  );
  const counts = {};
  recent.forEach(t => { counts[t.category] = (counts[t.category] || 0) + 1; });
  let sortedCats = Object.entries(counts)
    .sort((a, b) => b[1] - a[1])
    .map(([id]) => CATEGORIES.expense.find(c => c.id === id))
    .filter(Boolean);

  // Fill with default if needed
  if (sortedCats.length < 8) {
    CATEGORIES.expense.forEach(c => {
      if (sortedCats.length < 8 && !sortedCats.find(s => s.id === c.id)) {
        sortedCats.push(c);
      }
    });
  }
  sortedCats = sortedCats.slice(0, 8);

  const html = `
    <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
      <div class="quick-add">
        <div class="quick-add-title">⚡ Gasto rápido</div>
        <input type="number" inputmode="decimal" class="quick-amount-input" id="quick-amount"
          placeholder="0" value="${quickAddState.amount}"
          oninput="quickAddState.amount=this.value" />
        <div class="quick-cats">
          ${sortedCats.map(cat => `
            <button class="quick-cat-btn ${quickAddState.category === cat.id ? 'active' : ''}"
              onclick="quickAddState.category='${cat.id}'; renderQuickAdd()">
              ${cat.icon}
              <span class="lbl">${cat.label.length > 8 ? cat.label.slice(0, 8) + '…' : cat.label}</span>
            </button>
          `).join('')}
        </div>
        <div class="quick-actions">
          <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
          <button class="btn-save" onclick="saveQuickAdd()">💾 Guardar</button>
        </div>
        <button class="quick-more" onclick="closeModal(); showView('add')">Más opciones →</button>
      </div>
    </div>
  `;
  document.getElementById('modal-container').innerHTML = html;
}

function saveQuickAdd() {
  const amount = parseFloat(quickAddState.amount);
  if (!amount || isNaN(amount) || amount <= 0) {
    showToast('Ingresá un monto', 'error'); return;
  }
  if (!quickAddState.category) {
    showToast('Elegí una categoría', 'error'); return;
  }
  const tx = {
    id: Date.now(),
    type: 'expense',
    amount,
    category: quickAddState.category,
    method: 'Tarjeta crédito', // default
    description: '',
    tags: [],
    date: new Date().toISOString().slice(0, 10)
  };
  transactions.unshift(tx);
  saveTxs(transactions);
  closeModal();
  showToast('Gasto guardado ⚡');
  if (currentView === 'dashboard') render();
}

// ── INIT ──────────────────────────────────────────────────────────────────
checkRecurring();
render();

// ═══════════════════════════════════════════════════════════════════════════
// UX POLISH · feedback táctil, ripple, animaciones
// ═══════════════════════════════════════════════════════════════════════════

// Haptic feedback (vibración corta para confirmar toques importantes)
function haptic(type = 'light') {
  if (!navigator.vibrate) return;
  const patterns = {
    light: 10,        // tap normal
    medium: 20,       // confirmación
    success: [10, 50, 10],  // 2 pulsos
    error: [30, 30, 30],    // 3 pulsos
  };
  navigator.vibrate(patterns[type] || 10);
}

// Ripple effect at tap location
document.addEventListener('pointerdown', (e) => {
  const target = e.target.closest('.bn-btn, .settings-row, .tx-row, .card, .recurring-row, .budget-row, .cat-btn, .month-cell, .system-btn, .backup-btn, .filter-btn, .tag-filter-btn, .btn-add, .btn-save, .btn-cancel, .toggle-btn, .subpage-action, .back-btn, .fab');
  if (!target) return;

  // Light haptic on every tappable
  haptic('light');

  // Ripple positioning
  if (!target.classList.contains('ripple')) target.classList.add('ripple');
  const rect = target.getBoundingClientRect();
  const x = ((e.clientX - rect.left) / rect.width) * 100;
  const y = ((e.clientY - rect.top) / rect.height) * 100;
  target.style.setProperty('--rx', x + '%');
  target.style.setProperty('--ry', y + '%');

  target.classList.remove('tapped');
  // Force reflow
  void target.offsetWidth;
  target.classList.add('tapped');
  setTimeout(() => target.classList.remove('tapped'), 600);
}, { passive: true });

// Stronger haptic on successful saves
function patchSaveActions() {
  const originalSaveTx = window.saveTransaction;
  window.saveTransaction = function() {
    const len = transactions.length;
    originalSaveTx();
    if (transactions.length > len) {
      haptic('success');
      // Pulse the save button (visual)
      const btn = document.querySelector('.btn-save');
      if (btn) {
        btn.classList.add('success-pulse');
        setTimeout(() => btn.classList.remove('success-pulse'), 400);
      }
    } else {
      haptic('error');
    }
  };

  const originalQuickSave = window.saveQuickAdd;
  window.saveQuickAdd = function() {
    const len = transactions.length;
    originalQuickSave();
    if (transactions.length > len) haptic('success');
    else haptic('error');
  };
}
patchSaveActions();

// Patch toast to vibrate on errors
const originalShowToast = window.showToast;
window.showToast = function(msg, type = 'success') {
  originalShowToast(msg, type);
  if (type === 'error') haptic('error');
};

// Subtle haptic on view changes
const originalShowView = window.showView;
window.showView = function(v) {
  if (currentView !== v) haptic('light');
  originalShowView(v);
};
</script>

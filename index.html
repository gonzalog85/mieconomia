          <div style="font-size:14px;font-weight:600;color:var(--text-dim);margin-bottom:6px">Sin fondos todavía</div>
          <div style="font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:14px">
            Creá fondos para gastos no mensuales: vacaciones, seguros, regalos de fin de año.
            La app calcula cuánto apartar por mes.
          </div>
          <button class="btn-save" style="padding:10px 20px" onclick="openSinkingFundForm()">Crear primer fondo</button>
        </div>
      ` : SINKING_FUNDS.map(f => sinkingFundRow(f)).join('')}
    </div>

  </div>`;
}

function sinkingFundRow(f) {
  const pct = f.targetAmount > 0
    ? Math.min(100, Math.round(((f.savedAmount || 0) / f.targetAmount) * 100))
    : 0;
  const barClass = pct >= 100 ? 'safe' : pct >= 60 ? 'warn' : 'safe'; // always safe except done
  const done = pct >= 100;
  const contribution = monthlyContributionNeeded(f);
  const months = monthsUntilTarget(f.targetDate);
  const dueText = f.targetDate
    ? (() => {
        const d = new Date(f.targetDate + 'T00:00:00');
        return `${MONTHS_ES[d.getMonth()].slice(0,3)} ${d.getFullYear()}`;
      })()
    : 'Sin fecha';

  return `
  <div class="sf-row ${done ? 'sf-done' : ''}">
    <div class="sf-header">
      <span class="sf-emoji">${f.emoji || '🎯'}</span>
      <div class="sf-info">
        <div class="sf-name">${f.name}${done ? ' ✓' : ''}</div>
        <div class="sf-meta">${dueText}${months !== null && months > 0 ? ` · ${months} mes${months !== 1 ? 'es' : ''}` : done ? ' · ¡Completado!' : ''}</div>
      </div>
      <div class="sf-amounts">
        <div class="sf-saved">${fmt(f.savedAmount || 0)}</div>
        <div class="sf-target">/ ${fmt(f.targetAmount)}</div>
      </div>
    </div>
    <div class="sf-bar-wrap">
      <div class="sf-bar">
        <div class="sf-bar-fill ${done ? 'done' : 'active'}" style="width:${pct}%"></div>
      </div>
      <span class="sf-pct">${pct}%</span>
    </div>
    ${!done && contribution > 0 ? `
    <div class="sf-contribution">Apartar <strong>${fmt(contribution)}/mes</strong> para llegar a tiempo</div>
    ` : ''}
    <div class="sf-actions">
      <button onclick="addToSinkingFund('${f.id}')" class="sf-btn-add">+ Agregar</button>
      <button onclick="editSinkingFund('${f.id}')" class="sf-btn-edit">✏️</button>
      <button onclick="deleteSinkingFund('${f.id}')" class="sf-btn-del">🗑️</button>
    </div>
  </div>`;
}

function renderStats() {
  const total_income     = transactions.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const total_expense_legacy = transactions.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  // Fase 4.2: sumar todas las compras con tarjeta al total general
  const total_purchases  = sumAllCardPurchases();
  const total_expense    = total_expense_legacy + total_purchases;
  const total_card       = transactions.filter(t=>t.type==='expense'&&t.method==='Tarjeta crédito').reduce((s,t)=>s+t.amount,0) + total_purchases;

  // By method — Fase 4.4: en vez de meter todo en "Tarjeta crédito",
  // cada tarjeta aparece con su nombre propio si tiene compras históricas.
  const byMethod = {};
  transactions.filter(t=>t.type==='expense').forEach(t => { byMethod[t.method] = (byMethod[t.method]||0)+t.amount; });
  // Compras por tarjeta — cada una como entrada propia
  for (const card of CARDS) {
    const cardTotal = CARD_PURCHASES.filter(p => p.cardId === card.id).reduce((s, p) => s + p.totalAmount, 0);
    if (cardTotal > 0) {
      const key = `${card.emoji} ${card.name}`;
      byMethod[key] = (byMethod[key] || 0) + cardTotal;
    }
  }
  // Compras huérfanas (tarjeta borrada) van a "Tarjeta crédito" genérico
  for (const p of CARD_PURCHASES) {
    if (!getCard(p.cardId)) {
      byMethod['Tarjeta crédito'] = (byMethod['Tarjeta crédito'] || 0) + p.totalAmount;
    }
  }
  const methods = Object.entries(byMethod).sort((a,b)=>b[1]-a[1]);

  // By category (for pie chart) - histórico completo
  const byCategoryAll = {};
  transactions.filter(t => t.type === 'expense').forEach(t => {
    byCategoryAll[t.category] = (byCategoryAll[t.category] || 0) + t.amount;
  });
  // Fase 4.2: agregar compras con tarjeta al pie por categoría
  for (const p of CARD_PURCHASES) {
    byCategoryAll[p.category] = (byCategoryAll[p.category] || 0) + p.totalAmount;
  }
  const pieCats = Object.entries(byCategoryAll).sort((a, b) => b[1] - a[1]);
  const pieTotal = pieCats.reduce((s, [_, v]) => s + v, 0);

  // Monthly summary (last 6 months)
  const monthlySummary = [];
  for (let i = chartRange - 1; i >= 0; i--) {
    const d = new Date(); d.setDate(1); d.setMonth(d.getMonth() - i);
    const y = d.getFullYear(), m = d.getMonth();
    const monthKey = `${y}-${String(m+1).padStart(2,'0')}-01`; // primer día del mes para fmtReal
    const monthTxs = transactions.filter(t => {
      const td = new Date(t.date);
      return td.getFullYear()===y && td.getMonth()===m;
    });
    // Fase 6: si el toggle está activo, ajustar por inflación (usando el 1ro del mes como proxy)
    const inflMult = settingsFlags.adjustForInflation ? getInflationMultiplier(monthKey) : 1;
    const rawIncome  = monthTxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const rawExpense = monthTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0) + sumInstallmentsForMonth(y, m);
    monthlySummary.push({
      label: MONTHS_ES[m].slice(0,3),
      income:  rawIncome  * inflMult,
      expense: rawExpense * inflMult,
    });
  }
  const maxVal = Math.max(...monthlySummary.flatMap(m=>[m.income,m.expense]), 1);

  // Pie chart colors
  const PIE_COLORS = ['#a78bfa','#f472b6','#fb923c','#4ade80','#60a5fa','#facc15','#f87171','#34d399','#c084fc','#fbbf24','#22d3ee','#fb7185'];

  return `
  <div class="fade-up">
    <!-- General totals -->
    <div class="cards-grid">
      <div class="card">
        <div class="card-label">Total ingresos</div>
        <div class="card-amount green" style="font-size:18px">${fmt(total_income)}</div>
      </div>
      <div class="card">
        <div class="card-label">Total gastos</div>
        <div class="card-amount red" style="font-size:18px">${fmt(total_expense)}</div>
      </div>
      <div class="card full">
        <div class="card-label">Total tarjeta crédito (histórico)</div>
        <div class="card-amount orange" style="font-size:18px">${fmt(total_card)}</div>
      </div>
    </div>

    ${settingsFlags.showPieChart && pieCats.length > 0 && pieTotal > 0 ? `
    <!-- Pie chart -->
    <div class="section">
      <div class="section-title">🥧 Distribución de gastos (histórico)</div>
      <div class="pie-wrapper">
        <svg class="pie-svg" width="120" height="120" viewBox="0 0 100 100">
          ${(() => {
            let cumAngle = 0;
            return pieCats.map(([catId, amount], i) => {
              const pct = amount / pieTotal;
              const startAngle = cumAngle;
              const endAngle = cumAngle + pct * 360;
              cumAngle = endAngle;
              if (pct >= 0.999) {
                return `<circle cx="50" cy="50" r="45" fill="${PIE_COLORS[i % PIE_COLORS.length]}" />`;
              }
              const startRad = (startAngle * Math.PI) / 180;
              const endRad = (endAngle * Math.PI) / 180;
              const x1 = 50 + 45 * Math.cos(startRad);
              const y1 = 50 + 45 * Math.sin(startRad);
              const x2 = 50 + 45 * Math.cos(endRad);
              const y2 = 50 + 45 * Math.sin(endRad);
              const largeArc = pct > 0.5 ? 1 : 0;
              return `<path class="pie-segment" d="M 50 50 L ${x1} ${y1} A 45 45 0 ${largeArc} 1 ${x2} ${y2} Z" fill="${PIE_COLORS[i % PIE_COLORS.length]}" />`;
            }).join('');
          })()}
          <circle cx="50" cy="50" r="22" fill="var(--surface)" />
        </svg>
        <div class="pie-legend">
          ${pieCats.slice(0, 6).map(([catId, amount], i) => {
            const cat = getCat(catId);
            const pct = (amount / pieTotal) * 100;
            return `
              <div class="pie-legend-item">
                <div class="pie-legend-dot" style="background:${PIE_COLORS[i % PIE_COLORS.length]}"></div>
                <span class="pie-legend-label">${cat.icon} ${cat.label}</span>
                <span class="pie-legend-value">${Math.round(pct)}%</span>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    </div>` : ''}

    <!-- Monthly chart -->
    <div class="section">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
        <div class="section-title" style="margin:0">📅 Evolución mensual${settingsFlags.adjustForInflation ? ' <span style="font-size:10px;color:var(--purple-light);font-weight:600;text-transform:none;letter-spacing:0"> · en pesos de hoy</span>' : ''}</div>
        <div class="range-selector">
          <button class="range-btn ${chartRange===3?'active':''}" onclick="setChartRange(3)">3M</button>
          <button class="range-btn ${chartRange===6?'active':''}" onclick="setChartRange(6)">6M</button>
          <button class="range-btn ${chartRange===12?'active':''}" onclick="setChartRange(12)">12M</button>
        </div>
      </div>
      <div style="display:flex;align-items:flex-end;gap:${chartRange === 12 ? '4px' : '8px'};height:120px;padding:8px 0">
        ${monthlySummary.map(m => {
          const hInc = maxVal > 0 ? (m.income/maxVal)*100 : 0;
          const hExp = maxVal > 0 ? (m.expense/maxVal)*100 : 0;
          const barW = chartRange === 12 ? '6px' : chartRange === 6 ? '10px' : '14px';
          return `
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
            <div style="display:flex;align-items:flex-end;gap:2px;height:90px">
              <div style="width:${barW};background:var(--green);border-radius:3px 3px 0 0;height:${hInc}%;opacity:0.85"></div>
              <div style="width:${barW};background:var(--red);border-radius:3px 3px 0 0;height:${hExp}%;opacity:0.85"></div>
            </div>
            <div style="font-size:${chartRange === 12 ? '8px' : '10px'};color:var(--muted)">${m.label}</div>
          </div>`;
        }).join('')}
      </div>
      <div style="display:flex;gap:16px;margin-top:4px">
        <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)">
          <div style="width:10px;height:10px;background:var(--green);border-radius:2px"></div> Ingresos
        </div>
        <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)">
          <div style="width:10px;height:10px;background:var(--red);border-radius:2px"></div> Gastos
        </div>
      </div>
    </div>

    <!-- By payment method -->
    ${methods.length > 0 ? `
    <div class="section">
      <div class="section-title">💳 Gastos por método de pago</div>
      ${methods.map(([method, amount]) => {
        const pct = total_expense > 0 ? (amount/total_expense)*100 : 0;
        const meth = getMethod(method);
        return `
        <div class="cat-row">
          <div class="cat-name" style="flex:unset;min-width:130px">${meth.icon} ${method}</div>
          <div class="cat-bar-wrap" style="flex:1;justify-content:flex-end">
            <div class="bar-track" style="width:80px"><div class="bar-fill" style="width:${pct}%"></div></div>
            <div class="cat-amount-sm">${fmt(amount)}</div>
          </div>
        </div>`;
      }).join('')}
    </div>` : ''}

    <!-- Count -->
    <div style="text-align:center;color:var(--muted);font-size:13px;margin-top:8px">
      ${transactions.length + CARD_PURCHASES.length} movimiento${(transactions.length + CARD_PURCHASES.length)!==1?'s':''} registrado${(transactions.length + CARD_PURCHASES.length)!==1?'s':''}
      ${CARD_PURCHASES.length > 0 ? `<span style="opacity:0.6"> (${CARD_PURCHASES.length} con tarjeta)</span>` : ''}
    </div>

    ${(() => {
      // ── Fase 4.6: Análisis por tarjeta ───────────────────────
      if (CARDS.length === 0 || CARD_PURCHASES.length === 0) return '';

      const cardStats = CARDS.map(card => {
        const purchases = CARD_PURCHASES.filter(p => p.cardId === card.id);
        if (purchases.length === 0) return null;
        const totalSpent = purchases.reduce((s, p) => s + p.totalAmount, 0);

        // Categoría top
        const byCat = {};
        purchases.forEach(p => { byCat[p.category] = (byCat[p.category] || 0) + p.totalAmount; });
        const topCatEntry = Object.entries(byCat).sort((a,b)=>b[1]-a[1])[0];
        const topCat = topCatEntry ? getCat(topCatEntry[0]) : null;

        // Promedio de resumen mensual (últimos 6 meses)
        let monthlyAvg = 0;
        const now = new Date();
        let monthsWithActivity = 0;
        for (let i = 0; i < 6; i++) {
          const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
          const items = getInstallmentsForMonth(card, d.getFullYear(), d.getMonth());
          const monthTotal = items.reduce((s, it) => s + it.amount, 0);
          if (monthTotal > 0) { monthlyAvg += monthTotal; monthsWithActivity++; }
        }
        if (monthsWithActivity > 0) monthlyAvg /= monthsWithActivity;

        return { card, purchases, totalSpent, topCat, topCatAmount: topCatEntry?.[1] || 0, monthlyAvg };
      }).filter(Boolean).sort((a,b) => b.totalSpent - a.totalSpent);

      if (cardStats.length === 0) return '';

      return `
      <div class="section">
        <div class="section-title">💳 Análisis por tarjeta</div>
        ${cardStats.map(({ card, purchases, totalSpent, topCat, topCatAmount, monthlyAvg }) => `
          <div class="card-stat-row" onclick="showView('cards')">
            <div class="card-stat-header" style="border-left-color:${card.color}">
              <span style="font-size:18px">${card.emoji}</span>
              <div class="card-stat-info">
                <div class="card-stat-name">${card.name}</div>
                <div class="card-stat-meta">${purchases.length} compra${purchases.length!==1?'s':''} · ${fmt(totalSpent)} total</div>
              </div>
              <div class="card-stat-avg">
                <div class="card-stat-avg-val">${fmt(monthlyAvg)}</div>
                <div class="card-stat-avg-lbl">/mes</div>
              </div>
            </div>
            ${topCat ? `
              <div class="card-stat-top-cat">
                ${topCat.icon} Mayor gasto: <strong>${topCat.label}</strong> — ${fmt(topCatAmount)}
              </div>` : ''}
          </div>
        `).join('')}
      </div>`;
    })()}

    ${renderHeatmap()}
    ${renderYearComparison()}
  </div>`;
}

// ── HEATMAP (Fase 7) ──────────────────────────────────────────────────────
function renderHeatmap() {
  if (transactions.length === 0) return '';
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const firstWeekday = new Date(y, m, 1).getDay(); // 0=dom

  // Gasto por día del mes actual
  const byDay = {};
  transactions.forEach(t => {
    const d = new Date(t.date);
    if (t.type !== 'expense' || d.getFullYear() !== y || d.getMonth() !== m) return;
    const day = d.getDate();
    byDay[day] = (byDay[day] || 0) + t.amount;
  });
  // Sumar cuotas del mes
  for (const card of CARDS) {
    const items = getInstallmentsForMonth(card, y, m);
    items.forEach(it => {
      const day = card.closingDay || 15; // las cuotas no tienen día exacto — usar día de cierre como proxy
      byDay[day] = (byDay[day] || 0) + it.amount;
    });
  }

  const maxDay = Math.max(...Object.values(byDay), 1);
  const today = now.getDate();
  const dayLabels = ['D','L','M','X','J','V','S'];

  // Celdas: primer día del mes puede no ser lunes
  const cells = [];
  for (let pad = 0; pad < firstWeekday; pad++) cells.push({ empty: true });
  for (let d = 1; d <= daysInMonth; d++) {
    const amt = byDay[d] || 0;
    const intensity = amt > 0 ? Math.max(0.1, amt / maxDay) : 0;
    cells.push({ day: d, amt, intensity, isToday: d === today });
  }

  return `
  <div class="section">
    <div class="section-title">🗓️ Actividad diaria — ${MONTHS_ES[m]} ${y}</div>
    <div class="heatmap-day-labels">
      ${dayLabels.map(l => `<span>${l}</span>`).join('')}
    </div>
    <div class="heatmap-grid">
      ${cells.map(c => c.empty
        ? `<div class="heatmap-cell empty"></div>`
        : `<div class="heatmap-cell ${c.isToday ? 'today' : ''}"
              style="--intensity:${c.intensity.toFixed(2)}"
              title="Día ${c.day}: ${c.amt > 0 ? fmt(c.amt) : 'sin gastos'}">
             <span class="heatmap-day-num">${c.day}</span>
           </div>`
      ).join('')}
    </div>
    <div class="heatmap-legend">
      <span>Sin gasto</span>
      <div class="heatmap-legend-scale">
        ${[0.1,0.3,0.5,0.7,1].map(v => `<div class="heatmap-legend-cell" style="--intensity:${v}"></div>`).join('')}
      </div>
      <span>${fmt(maxDay)}</span>
    </div>
  </div>`;
}

// ── COMPARACIÓN AÑO VS AÑO (Fase 7) ──────────────────────────────────────
let showYearComparison = false;

function renderYearComparison() {
  if (transactions.length === 0) return '';
  const now = new Date();
  const currentY = now.getFullYear();
  const prevY = currentY - 1;

  const toggleBtn = `
    <button onclick="showYearComparison=!showYearComparison; render()"
      style="font-size:11px;color:var(--purple-light);background:none;border:1px solid var(--border);
             border-radius:7px;padding:5px 10px;cursor:pointer;font-family:inherit;font-weight:600">
      ${showYearComparison ? '▲ Ocultar' : `📊 vs ${prevY}`}
    </button>`;

  if (!showYearComparison) {
    return `<div style="text-align:center;margin:8px 0 16px">${toggleBtn}</div>`;
  }

  // Últimos 6 meses — comparar año actual vs año anterior
  const rows = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const m2 = d.getMonth();
    const curByCat = getMonthExpenseByCat(currentY, m2);
    const prevByCat = getMonthExpenseByCat(prevY, m2);
    const curTotal = Object.values(curByCat).reduce((s,v)=>s+v,0) + sumInstallmentsForMonth(currentY, m2);
    const prevTotal = Object.values(prevByCat).reduce((s,v)=>s+v,0) + sumInstallmentsForMonth(prevY, m2);
    const pct = prevTotal > 0 ? Math.round(((curTotal - prevTotal) / prevTotal) * 100) : null;
    rows.push({ month: MONTHS_ES[m2].slice(0,3), curTotal, prevTotal, pct });
  }
  const maxVal = Math.max(...rows.flatMap(r => [r.curTotal, r.prevTotal]), 1);

  return `
  <div class="section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="section-title" style="margin:0">📊 ${currentY} vs ${prevY}</div>
      ${toggleBtn}
    </div>
    ${rows.map(r => `
      <div class="yoy-row">
        <div class="yoy-month">${r.month}</div>
        <div class="yoy-bars">
          <div class="yoy-bar-wrap">
            <div class="yoy-bar current" style="width:${(r.curTotal/maxVal*100).toFixed(1)}%"></div>
            <span class="yoy-label">${fmt(r.curTotal)}</span>
          </div>
          <div class="yoy-bar-wrap">
            <div class="yoy-bar prev" style="width:${(r.prevTotal/maxVal*100).toFixed(1)}%"></div>
            <span class="yoy-label muted">${r.prevTotal > 0 ? fmt(r.prevTotal) : '—'}</span>
          </div>
        </div>
        ${r.pct !== null && r.prevTotal > 0 ? `
          <div class="yoy-pct ${r.pct > 0 ? 'up' : 'down'}">${r.pct > 0 ? '+' : ''}${r.pct}%</div>
        ` : '<div class="yoy-pct muted">—</div>'}
      </div>
    `).join('')}
    <div class="yoy-legend">
      <div><span class="yoy-dot current"></span>${currentY}</div>
      <div><span class="yoy-dot prev"></span>${prevY}</div>
    </div>
  </div>`;
}

            oninput="formState.exchangeRate=parseFloat(this.value)||1; updateFormCurrencyPreview()" />
        </div>
        <div class="currency-preview" id="currency-preview">
          ${(() => {
            const usd = parseFloat(formState.amount) || 0;
            const rate = formState.exchangeRate || 1;
            if (usd > 0 && rate > 1) return `= ${fmt(usd * rate)} ARS`;
            return 'Ingresá monto y cotización';
          })()}
        </div>
        <button class="currency-fetch-btn" onclick="fetchRateForForm('${formState.currency}')">
          🔄 Cotización actual
        </button>
      ` : ''}
    </div>` : ''}

    <!-- Category -->
    <label>Categoría</label>
    <div class="cat-grid">
      ${cats.map(cat => `
        <button class="cat-btn ${formState.category===cat.id?'active':''}" onclick="setFormCat('${cat.id}')">
          ${cat.icon}
          <span class="cat-lbl">${cat.label}</span>
        </button>`).join('')}
    </div>

    <!-- Method -->
    <label>Método de pago</label>
    <select id="f-method" onchange="setFormMethod(this.value)">
      ${METHODS.map(m => `<option value="${m.label}" ${formState.method===m.label?'selected':''}>${m.icon} ${m.label}</option>`).join('')}
    </select>

    ${(() => {
      // Fase 4.2: campos extra cuando es compra con tarjeta de crédito.
      // Solo en CREATE mode (la edición de compras con tarjeta llega en 4.3).
      if (formState.type !== 'expense') return '';
      if (formState.method !== 'Tarjeta crédito') return '';
      if (isEdit) return ''; // legacy edit: no extra fields

      const activeCards = CARDS.filter(c => c.active !== false);
      if (activeCards.length === 0) {
        return `
          <div class="card-purchase-block warn">
            <div class="cpb-title">⚠️ Configurá una tarjeta primero</div>
            <div class="cpb-desc">
              Para registrar compras con cuotas necesitás tener al menos una tarjeta cargada.
              <button class="cpb-btn" onclick="cancelForm(); showView('cards')">Ir a Tarjetas</button>
            </div>
          </div>
        `;
      }

      // Fase 4.6: sugerir última tarjeta usada
      const lastCardId = localStorage.getItem('mie_last_card');
      const lastCard = lastCardId ? activeCards.find(c => c.id === lastCardId) : null;
      const selectedCardId = formState.cardId || (lastCard ? lastCard.id : activeCards[0].id);
      if (!formState.cardId) formState.cardId = selectedCardId;

      const installmentsOptions = [1, 2, 3, 6, 9, 12, 18, 24];
      // Si el usuario tiene un valor custom, lo respetamos
      const currentInst = formState.installments || 1;

      return `
        <div class="card-purchase-block">
          <div class="cpb-title">💳 Compra con tarjeta</div>

          <label>Tarjeta</label>
          <select id="f-card" onchange="formState.cardId=this.value">
            ${activeCards.map(c => `
              <option value="${c.id}" ${selectedCardId===c.id?'selected':''}>
                ${c.emoji} ${c.name} · cierre ${c.closingDay}
              </option>
            `).join('')}
          </select>

          <label>Cuotas</label>
          <div class="installments-grid">
            ${installmentsOptions.map(n => `
              <button class="inst-btn ${currentInst===n?'active':''}"
                onclick="formState.installments=${n}; render()">${n===1?'1 pago':n+'x'}</button>
            `).join('')}
          </div>

          ${(() => {
            // Vista previa: a qué resumen entra la cuota 1
            const card = getCard(selectedCardId);
            if (!card) return '';
            const first = getFirstSummaryMonth(formState.date, card.closingDay);
            if (!first) return '';
            const monthName = MONTHS_ES[first.month];
            const due = getDueDate(card, first.year, first.month);
            const dueText = due
              ? `vence ${due.getDate()} ${MONTHS_ES[due.getMonth()].toLowerCase().slice(0,3)}`
              : 'vencimiento manual';
            const amt = parseFloat(formState.amount) || 0;
            const perInst = amt / currentInst;
            return `
              <div class="cpb-preview">
                Cuota 1${currentInst>1?` de ${currentInst}`:''} entra al resumen de
                <strong>${monthName} ${first.year}</strong> · ${dueText}
                ${amt > 0 && currentInst > 1 ? `<br><span style="opacity:0.85">${currentInst} cuotas de <strong>${fmt(perInst)}</strong></span>` : ''}
              </div>
            `;
          })()}

          <!-- Fase 4.6: MSI toggle -->
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;margin-top:4px;margin-bottom:8px">
            <input type="checkbox" ${formState.noInterest ? 'checked' : ''}
              onchange="formState.noInterest=this.checked"
              style="width:16px;height:16px;cursor:pointer" />
            <span style="font-size:12px;color:var(--text-dim);text-transform:none;letter-spacing:0;font-weight:500;margin:0">
              💚 Sin interés (MSI / cuotas sin cargo)
            </span>
          </label>
        </div>
      `;
    })()}

    <!-- Description -->
    <label>Descripción / Notas <span style="color:var(--muted);text-transform:none;font-size:10px">(opcional)</span></label>
    <textarea id="f-desc" placeholder="Ej: Cumpleaños de Juan en restaurante X, fuimos 6 personas"
      oninput="formState.description=this.value; applyAutoCategory(this.value)">${formState.description}</textarea>

    <!-- Tags -->
    <label>Etiquetas <span style="color:var(--muted);text-transform:none;font-size:10px">(opcional, ej: vacaciones, regalo)</span></label>
    <div class="tags-input-wrap">
      ${(formState.tags || []).map((tag, i) => `
        <span class="tag-chip">#${tag}<span class="x" onclick="removeTag(${i})">×</span></span>
      `).join('')}
      <input type="text" class="tag-input" id="tag-input" placeholder="Agregar etiqueta..."
        onkeydown="if(event.key==='Enter'||event.key===','){event.preventDefault();addTagFromInput(this)}"
        onblur="addTagFromInput(this)" />
    </div>
    ${(() => {
      const used = getAllUsedTags();
      const existing = (formState.tags || []);
      const suggestions = used.filter(t => !existing.includes(t)).slice(0, 8);
      if (suggestions.length === 0) return '';
      return `
        <div class="tag-suggestions">
          ${suggestions.map(t => `
            <button class="tag-suggestion" onclick="addTag('${t.replace(/'/g, "\\'")}')">+ #${t}</button>
          `).join('')}
        </div>
      `;
    })()}

    <!-- Date -->
    <label>Fecha</label>
    <input type="date" id="f-date" value="${formState.date}" onchange="formState.date=this.value" />

    <div class="form-actions">
      <button class="btn-cancel" onclick="cancelForm()">Cancelar</button>
      <button class="btn-save" onclick="saveTransaction()">${isEdit ? '💾 Actualizar' : '💾 Guardar'}</button>
    </div>
  </div>`;
}

function cancelForm() {
  formState = defaultFormState();
  showView('dashboard');
}

function setFormType(t) {
  formState.type = t;
  formState.category = t === 'expense' ? 'tarjeta' : 'salario';
  render();
}

function setFormCat(id) {
  formState.category = id;
  formState._catManuallySet = true; // Fase 7: el usuario eligió manualmente, no sugerir más
  render();
  const amtEl = document.getElementById('f-amount');
  if (amtEl) { amtEl.value = formState.amount; amtEl.focus(); }
}

// Fase 7: sugiere categoría basada en historial de descripciones.
// Solo actúa si el usuario no eligió manualmente una categoría.
function applyAutoCategory(description) {
  if (formState._catManuallySet) return;
  if (formState.id !== null) return; // en edición, no sobreescribir
  const suggested = getAutoCategory(description);
  if (suggested && suggested !== formState.category) {
    formState.category = suggested;
    // Re-renderizar solo el grid de categorías sin perder el foco del input
    const catGrid = document.querySelector('.cat-grid');
    if (catGrid) {
      const cats = CATEGORIES[formState.type];
      catGrid.innerHTML = cats.map(cat => `
        <button class="cat-btn ${formState.category===cat.id?'active':''}" onclick="setFormCat('${cat.id}')">
          ${cat.icon}
          <span class="cat-lbl">${cat.label}</span>
        </button>`).join('');
    }
  }
}

// Fase 4.2: cambiar método triggerea re-render para mostrar/ocultar
// los campos de compra con tarjeta (selector de tarjeta + cuotas).
function setFormMethod(value) {
  formState.method = value;
  if (value === 'Tarjeta crédito' && !formState.cardId) {
    formState.cardId = null;
    if (!formState.installments) formState.installments = 1;
  }
  render();
}

// Fase 6: helpers de multi-moneda en el form
function setFormCurrency(currency) {
  formState.currency = currency;
  if (currency === 'ARS') { formState.exchangeRate = 1; formState.originalAmount = ''; }
  render();
  if (currency !== 'ARS') fetchRateForForm(currency);
}

async function fetchRateForForm(currency) {
  const rates = await fetchLiveRates();
  if (!rates) {
    // Sin conexión o entorno bloqueado — dejar el input vacío para ingreso manual
    showToast('Ingresá la cotización manualmente');
    const rateInput = document.getElementById('f-rate');
    if (rateInput) { rateInput.focus(); rateInput.select(); }
    return;
  }
  let rate = 1;
  if (currency === 'USD_BLUE')    rate = rates.blue    || 1;
  if (currency === 'USD_OFICIAL') rate = rates.oficial || 1;
  if (currency === 'USD_MEP')     rate = rates.mep     || 1;
  formState.exchangeRate = rate;
  const today = new Date().toISOString().slice(0,10);
  if (!EXCHANGE_RATES[today]) EXCHANGE_RATES[today] = {};
  if (currency === 'USD_BLUE')    EXCHANGE_RATES[today].blue = rate;
  if (currency === 'USD_OFICIAL') EXCHANGE_RATES[today].oficial = rate;
  if (currency === 'USD_MEP')     EXCHANGE_RATES[today].mep = rate;
  saveExchangeRates();
  const rateInput = document.getElementById('f-rate');
  if (rateInput) rateInput.value = rate;
  updateFormCurrencyPreview();
  showToast(`Cotización: $${rate.toLocaleString('es-AR')}`);
}

function updateFormCurrencyPreview() {
  const preview = document.getElementById('currency-preview');
  if (!preview) return;
  const usd = parseFloat(formState.amount) || 0;
  const rate = formState.exchangeRate || 1;
  preview.textContent = usd > 0 && rate > 1 ? `= ${fmt(usd * rate)} ARS` : 'Ingresá monto y cotización';
}

function saveTransaction() {
  const amount = parseFloat(formState.amount);
  if (!amount || isNaN(amount) || amount <= 0) {
    showToast('Ingresá un monto válido', 'error');
    // Shake animation on amount input
    const amtEl = document.getElementById('f-amount');
    if (amtEl) {
      amtEl.classList.add('shake');
      setTimeout(() => amtEl.classList.remove('shake'), 500);
    }
    return;
  }

  // ── Fase 4.2: Compras con tarjeta de crédito ───────────────────────────
  // En CREATE + expense + Tarjeta crédito + cardId valido → va a mie_card_purchases
  // En EDIT seguimos el flujo legacy (mie_txs). La edición de card_purchases es 4.3.
  const isCardPurchase = (
    formState.id === null &&
    formState.type === 'expense' &&
    formState.method === 'Tarjeta crédito' &&
    formState.cardId &&
    getCard(formState.cardId)
  );

  if (isCardPurchase) {
    const card = getCard(formState.cardId);
    const installments = Math.max(1, parseInt(formState.installments) || 1);
    const first = getFirstSummaryMonth(formState.date, card.closingDay);
    const firstStr = first ? `${first.year}-${String(first.month + 1).padStart(2, '0')}` : null;

    const purchase = {
      id: Date.now(),
      cardId: formState.cardId,
      purchaseDate: formState.date,
      totalAmount: amount,
      installments,
      category: formState.category,
      description: formState.description.trim(),
      tags: (formState.tags || []).filter(t => t.trim()),
      firstInstallmentMonth: firstStr,
      noInterest: formState.noInterest === true
    };
    CARD_PURCHASES.unshift(purchase);
    saveCardPurchasesToStorage();
    // Fase 4.6: recordar última tarjeta usada para sugerirla la próxima vez
    localStorage.setItem('mie_last_card', formState.cardId);
    showToast(installments > 1 ? `Compra en ${installments} cuotas guardada` : 'Compra con tarjeta guardada');

    formState = defaultFormState();
    showView('dashboard');
    return;
  }

  if (formState.id !== null) {
    // EDIT
    const idx = transactions.findIndex(t => t.id === formState.id);
    if (idx >= 0) {
      transactions[idx] = {
        ...transactions[idx],
        type: formState.type,
        amount,
        category: formState.category,
        method: formState.method,
        description: formState.description.trim(),
        tags: (formState.tags || []).filter(t => t.trim()),
        date: formState.date,
      };
      saveTxs(transactions);
      showToast('Movimiento actualizado');
    }
  } else {
    // CREATE
    // Fase 6: si la moneda es USD, el amount en ARS = originalAmount × exchangeRate
    const finalAmount = (formState.currency && formState.currency !== 'ARS')
      ? (parseFloat(formState.amount) || 0) * (formState.exchangeRate || 1)
      : amount;
    const tx = {
      id: Date.now(),
      type: formState.type,
      amount: finalAmount,
      category: formState.category,
      method: formState.method,
      description: formState.description.trim(),
      tags: (formState.tags || []).filter(t => t.trim()),
      date: formState.date,
    };
    // Guardar campos de moneda si aplica
    if (formState.currency && formState.currency !== 'ARS') {
      tx.currency = formState.currency;
      tx.originalAmount = parseFloat(formState.amount) || 0;
      tx.exchangeRate = formState.exchangeRate || 1;
    }
    transactions.unshift(tx);
    saveTxs(transactions);
    showToast('Movimiento guardado');
  }

  // Fase 7: evaluar reglas automáticas (con delay para que el toast no se pise)
  const triggered = checkRules();
  if (triggered.length > 0) {
    setTimeout(() => {
      const r = triggered[0];
      const cat = getCat(r.rule.category);
      showToast(`📏 ${cat.label}: ${fmt(r.spent)} supera tu límite de ${fmt(r.rule.threshold)}`, 'error');
    }, 800);
  }

  formState = defaultFormState();
  showView('dashboard');
}

function editTransaction(id) {
  const tx = transactions.find(t => t.id === id);
  if (!tx) return;
  formState = {
    id: tx.id,
    type: tx.type,
    amount: tx.amount.toString(),
    category: tx.category,
    method: tx.method,
    description: tx.description || '',
    tags: tx.tags ? [...tx.tags] : [],
    date: tx.date,
  };
  showView('add');
}

function deleteFromEdit() {
  showConfirm('¿Eliminar este movimiento?', 'Esta acción no se puede deshacer.', () => {
    transactions = transactions.filter(t => t.id !== formState.id);
    saveTxs(transactions);
    formState = defaultFormState();
    showToast('Movimiento eliminado');

}

// ── TAGS HELPERS ──────────────────────────────────────────────────────────
function addTag(tag) {
  tag = tag.trim().toLowerCase().replace(/^#/, '').replace(/[^a-z0-9áéíóúñü]/g, '');
  if (!tag) return;
  if (!formState.tags) formState.tags = [];
  if (formState.tags.includes(tag)) return;
  formState.tags.push(tag);
  render();
  setTimeout(() => {
    const el = document.getElementById('tag-input');
    if (el) el.focus();
  }, 50);
}
function addTagFromInput(input) {
  const v = input.value;
  if (v.trim()) addTag(v);
  input.value = '';
}
function removeTag(idx) {
  if (formState.tags) formState.tags.splice(idx, 1);
  render();
}

function deleteTx(id) {
  showConfirm(
    '¿Eliminar movimiento?',
    'Esta acción no se puede deshacer.',
    () => {
      transactions = transactions.filter(t => t.id !== id);
      saveTxs(transactions);
      showToast('Movimiento eliminado');
      render();
    }
  );
}

// ── TECLADO MÓVIL: DELEGACIÓN GLOBAL (una sola vez al arrancar) ───────────
// Usamos delegación en document para capturar Enter/Go en CUALQUIER input,
// incluyendo los que se inyectan dinámicamente en modales.
// Escucha keydown + keyup porque algunos teclados Android disparan solo keyup.
(function initKeyboardDelegation() {
  const FOCUSABLE = 'input:not([type="hidden"]):not([type="checkbox"]):not(.tag-input)';

  function handleEnter(e) {
    // Filtrar: solo Enter, solo en inputs relevantes
    if (e.key !== 'Enter' && e.keyCode !== 13) return;
    const el = e.target;
    if (!el.matches(FOCUSABLE)) return;
    // tag-input tiene su propio handler (agrega tags con Enter)
    if (el.classList.contains('tag-input')) return;

    e.preventDefault();

    // Contexto: el modal abierto o el form-card o el body
    const container = el.closest('.modal') || el.closest('.form-card') || document.body;
    const all = Array.from(container.querySelectorAll(FOCUSABLE)).filter(
      inp => !inp.disabled && inp.offsetParent !== null
    );
    const idx = all.indexOf(el);
    const next = (idx >= 0 && idx < all.length - 1) ? all[idx + 1] : null;

    if (next) {
      el.blur();
      next.focus();
      if (next.type === 'number' || next.type === 'text') {
        try { next.select(); } catch(err) {}
      }
    } else {
      el.blur();
      // Último campo: click en el botón de guardar del contexto
      const saveBtn = container.querySelector('.btn-save');
      if (saveBtn) saveBtn.click();
    }
  }

  // Escuchar ambos eventos para compatibilidad máxima con teclados Android/iOS
  document.addEventListener('keydown', handleEnter, true);
  document.addEventListener('keyup',   handleEnter, true);
})();

function exportExcel() {
  if (transactions.length === 0) { showToast('No hay datos para exportar', 'error'); return; }
  const rows = transactions.map(t => {
    const cat = getCat(t.category);
    return {
      'Fecha':        t.date,
      'Tipo':         t.type === 'income' ? 'Ingreso' : 'Gasto',
      'Categoría':    cat.label,
      'Método':       t.method,
      'Descripción':  t.description || '',
      'Monto':        t.type === 'income' ? t.amount : -t.amount,
    };
  });

  // Summary sheet
  const income  = transactions.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense = transactions.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const summary = [
    { 'Concepto': 'Total Ingresos',  'Monto': income },
    { 'Concepto': 'Total Gastos',    'Monto': -expense },
    { 'Concepto': 'Balance Final',   'Monto': income - expense },
  ];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows),    'Movimientos');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(summary), 'Resumen');

  const date = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `MiEconomia_${date}.xlsx`);
  setLastBackup();
  showToast('Excel descargado ✅');
}

function exportCSV() {
  if (transactions.length === 0 && CARD_PURCHASES.length === 0) {
    showToast('No hay datos para exportar', 'error'); return;
  }
  // Sección 1: movimientos regulares
  const header1 = ['id','date','type','amount','category','method','description'];
  const rows1 = transactions.map(t =>
    [t.id, t.date, t.type, t.amount, t.category, t.method, (t.description||'').replace(/,/g,' ')].join(',')
  );
  // Sección 2: compras con tarjeta (Fase 4.2+)
  const header2 = ['cp_id','cardId','purchaseDate','totalAmount','installments','category','description'];
  const rows2 = CARD_PURCHASES.map(p =>
    [p.id, p.cardId, p.purchaseDate, p.totalAmount, p.installments, p.category, (p.description||'').replace(/,/g,' ')].join(',')
  );
  let csv = [header1.join(','), ...rows1].join('\n');
  if (rows2.length > 0) {
    csv += '\n\n## COMPRAS CON TARJETA\n' + [header2.join(','), ...rows2].join('\n');
  }
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `MiEconomia_backup_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
  setLastBackup();
  showToast('CSV descargado ✅');
}

function restoreCSV(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const lines = e.target.result.trim().split('\n');
      const header = lines[0].split(',');
      const restored = lines.slice(1).map(line => {
        const vals = line.split(',');
        const obj = {};
        header.forEach((h,i) => obj[h.trim()] = vals[i]?.trim() || '');
        return {
          id:          parseInt(obj.id) || Date.now(),
          date:        obj.date,
          type:        obj.type,
          amount:      parseFloat(obj.amount) || 0,
          category:    obj.category,
          method:      obj.method,
          description: obj.description || '',
        };
      }).filter(t => t.amount > 0 && t.date && t.type);

      if (restored.length === 0) { showToast('CSV inválido o vacío', 'error'); return; }
      showConfirm(
        `¿Restaurar ${restored.length} movimientos?`,
        'Esto reemplazará todos los datos actuales del historial.',
        () => {
          transactions = restored;
          saveTxs(transactions);
          showToast(`${restored.length} movimientos restaurados`);
          showView('dashboard');
        },
        { icon: '📥', confirmText: 'Restaurar', primary: true }
      );
    } catch(err) {
      showToast('Error al leer el archivo', 'error');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function shareWhatsApp() {
  if (transactions.length === 0) { showToast('No hay datos para compartir', 'error'); return; }

  const now = new Date();
  const m = now.getMonth(), y = now.getFullYear();
  const monthTxs = transactions.filter(t => {
    const d = new Date(t.date);
    return d.getFullYear()===y && d.getMonth()===m;
  });

  const income  = monthTxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  // Fase 4.2: sumar cuotas que caen en este mes
  const installmentsThisMonth = sumInstallmentsForMonth(y, m);
  const expense = monthTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0) + installmentsThisMonth;
  const balance = income - expense;
  const cardExp = monthTxs.filter(t=>t.type==='expense'&&t.method==='Tarjeta crédito').reduce((s,t)=>s+t.amount,0) + installmentsThisMonth;

  // Fase 4.4: helper unificado
  const byCat = getMonthExpenseByCat(y, m);
  const topCats = Object.entries(byCat).sort((a,b)=>b[1]-a[1]).slice(0,4);

  const fmtARS = n => '$' + Math.round(n).toLocaleString('es-AR');

  let msg = `💰 *MiEconomía — ${MONTHS_ES[m]} ${y}*\n\n`;
  msg += `📈 Ingresos:  ${fmtARS(income)}\n`;
  msg += `📉 Gastos:    ${fmtARS(expense)}\n`;
  msg += `💳 Tarjeta:   ${fmtARS(cardExp)}\n`;
  msg += `━━━━━━━━━━━━━━\n`;
  msg += `${balance >= 0 ? '✅' : '⚠️'} Balance:   ${fmtARS(balance)}\n\n`;

  if (topCats.length > 0) {
    msg += `*Mayores gastos:*\n`;
    topCats.forEach(([catId, amount]) => {
      const cat = getCat(catId);
      msg += `  ${cat.icon} ${cat.label}: ${fmtARS(amount)}\n`;
    });
  }

  const url = 'https://wa.me/?text=' + encodeURIComponent(msg);
  window.open(url, '_blank');
}

  );
}

function budgetRow(cat, spent, total) {
  const pct = total > 0 ? (spent / total) * 100 : 0;
  const cls = pct >= 100 ? 'danger' : pct >= 80 ? 'warn' : 'safe';
  return `
    <div class="budget-row">
      <div class="budget-header">
        <div class="budget-cat">
          <span class="icon">${cat.icon}</span>
          <span>${cat.label}</span>
        </div>
        <div class="budget-amounts">
          <span class="spent">${fmt(spent)}</span>
          <span class="total"> / ${fmt(total)}</span>
        </div>
      </div>
      <div class="budget-bar">
        <div class="budget-bar-fill ${cls}" style="width:${Math.min(pct, 100)}%"></div>
      </div>
      <div class="budget-pct ${cls}">${Math.round(pct)}% usado</div>
      <div class="budget-actions">
        <button onclick="setBudget('${cat.id}')">✏️ Modificar</button>
        <button class="delete" onclick="deleteBudget('${cat.id}')">🗑️ Quitar</button>
      </div>
    </div>
  `;
}

function setBudget(catId) {
  const cat = getCat(catId);
  const current = budgets[catId];

  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
      <div class="modal" style="max-width:320px">
        <div class="modal-header">
          <div class="modal-title">${cat.icon} ${cat.label}</div>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <label>Presupuesto mensual</label>
        <input type="number" id="budget-input" placeholder="0"
          value="${current || ''}" inputmode="decimal" min="1" enterkeyhint="done" />
        <div class="form-actions" style="margin-top:12px">
          <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
          <button class="btn-save" onclick="saveBudgetModal('${catId}')">Guardar</button>
        </div>
      </div>
    </div>`;

  setTimeout(() => {
    const inp = document.getElementById('budget-input');
    if (inp) { inp.focus(); inp.select(); }
  }, 80);
}

function saveBudgetModal(catId) {
  const inp = document.getElementById('budget-input');
  if (!inp) return;
  inp.blur();
  const amount = parseFloat(inp.value);
  if (isNaN(amount) || amount <= 0) { showToast('Monto inválido', 'error'); return; }
  budgets[catId] = amount;
  saveBudgets();
  closeModal();
  showToast(`Presupuesto definido: ${fmt(amount)}`);
  render();
}

function deleteBudget(catId) {
  const cat = getCat(catId);
  showConfirm(
    `¿Quitar presupuesto de ${cat.label}?`,
    'Los movimientos no se afectan, solo se quita el límite mensual.',
    () => {
      delete budgets[catId];
      saveBudgets();
      showToast('Presupuesto eliminado');
      render();
    },
    { icon: '🎯' }
  );
}

// Apply recurring transactions if their date has passed
function checkRecurring() {
  const today = new Date();
  const todayStr = today.toISOString().slice(0, 10);
  let applied = 0;
  const appliedNames = [];

  recurring.forEach(r => {
    if (!r.active) return;

    // Last applied date
    const lastDate = r.lastApplied ? new Date(r.lastApplied) : null;

    // Find all due dates between lastApplied (or 30 days ago if never) and today
    const startDate = lastDate
      ? new Date(lastDate.getFullYear(), lastDate.getMonth() + 1, 1)
      : new Date(today.getFullYear(), today.getMonth(), 1);

    let cursor = new Date(startDate.getFullYear(), startDate.getMonth(), r.dayOfMonth);
    while (cursor <= today) {
      // Check that this exact date hasn't been applied (defensive)
      const cursorStr = cursor.toISOString().slice(0, 10);
      const exists = transactions.some(t =>
        t._recurringId === r.id && t.date === cursorStr
      );
      if (!exists) {
        const tx = {
          id: Date.now() + Math.random(),
          type: r.type,
          amount: r.amount,
          category: r.category,
          method: r.method,
          description: r.name + ' (auto)',
          date: cursorStr,
          _recurringId: r.id
        };
        transactions.unshift(tx);
        applied++;
        if (!appliedNames.includes(r.name)) appliedNames.push(r.name);
      }
      // Next month
      cursor = new Date(cursor.getFullYear(), cursor.getMonth() + 1, r.dayOfMonth);
    }

    r.lastApplied = todayStr;
  });

  if (applied > 0) {
    saveTxs(transactions);
    saveRecurring();
    recurringJustApplied = appliedNames;
  }
}

function saveMethodForm() {
  const label = methodForm.label.trim();
  if (!label) { showToast('Falta el nombre', 'error'); return; }

  // Check duplicate
  const existing = METHODS.find(m => m.label === label && m.id !== methodForm.id);
  if (existing) { showToast('Ya existe un método con ese nombre', 'error'); return; }

  if (methodForm.id) {
    // Edit
    const idx = METHODS.findIndex(m => m.id === methodForm.id);
    if (idx >= 0) {
      const oldLabel = methodForm.oldLabel;
      METHODS[idx].label = label;
      METHODS[idx].icon = methodForm.icon;

      // Migrate transactions if label changed
      if (oldLabel && oldLabel !== label) {
        let migrated = 0;
        transactions.forEach(t => {
          if (t.method === oldLabel) { t.method = label; migrated++; }
        });
        recurring.forEach(r => {
          if (r.method === oldLabel) r.method = label;
        });
        if (migrated > 0) {
          saveTxs(transactions);
          saveRecurring();
        }
      }
    }
  } else {
    // Create
    const id = 'custom_m_' + Date.now();
    METHODS.push({ id, label, icon: methodForm.icon });
  }
  saveMethodsToStorage();
  closeModal();
  showToast(`Método ${methodForm.id ? 'actualizado' : 'creado'}`);
  render();
}

function deleteMethod(methodId) {
  const m = METHODS.find(x => x.id === methodId);
  if (!m) return;
  const usage = transactions.filter(t => t.method === m.label).length;
  const desc = usage > 0
    ? `Los ${usage} movimientos con este método se reasignarán a "Otro".`
    : 'Esta acción no se puede deshacer.';

  showConfirm(
    `¿Eliminar "${m.label}"?`,
    desc,
    () => {
      // Reassign transactions
      if (usage > 0) {
        transactions.forEach(t => {
          if (t.method === m.label) t.method = 'Otro';
        });
        recurring.forEach(r => {
          if (r.method === m.label) r.method = 'Otro';
        });
        saveTxs(transactions);
        saveRecurring();
      }
      METHODS = METHODS.filter(x => x.id !== methodId);
      saveMethodsToStorage();
      showToast('Método eliminado');
      render();
    },
    { icon: '💳' }
  );
}

        <div class="form-actions" style="margin-top:14px">
          <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
          <button class="btn-save" onclick="executeMigration()">Migrar ${oldTxs.length} ${oldTxs.length === 1 ? 'gasto' : 'gastos'}</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('modal-container').innerHTML = html;
}

function executeMigration() {
  const cardId = document.getElementById('mig-card').value;
  const card = getCard(cardId);
  if (!card) return;

  const oldTxs = getOldCardCreditTxs();
  if (oldTxs.length === 0) { closeModal(); return; }

  let migrated = 0;
  for (const t of oldTxs) {
    const first = getFirstSummaryMonth(t.date, card.closingDay);
    const firstStr = first ? `${first.year}-${String(first.month + 1).padStart(2, '0')}` : null;
    const purchase = {
      id: Date.now() + migrated, // evitar colisión de ids al hacer varios en el mismo ms
      cardId: card.id,
      purchaseDate: t.date,
      totalAmount: t.amount,
      installments: 1,
      category: t.category,
      description: t.description || '',
      tags: t.tags || [],
      firstInstallmentMonth: firstStr
    };
    CARD_PURCHASES.push(purchase);
    migrated++;
  }
  // Borrar los txs viejos
  const oldIds = new Set(oldTxs.map(t => t.id));
  transactions = transactions.filter(t => !oldIds.has(t.id));

  saveCardPurchasesToStorage();
  saveTxs(transactions);
  closeModal();
  showToast(`${migrated} ${migrated === 1 ? 'gasto migrado' : 'gastos migrados'}`);
  render();
}

// ── WIZARD CUOTA EN CURSO (Fase 4.5) ──────────────────────────────────────

function saveWizardPurchase() {
  const st = wizardState;
  if (!st) return;
  const amount = parseFloat(st.totalAmount);
  if (!amount || isNaN(amount) || amount <= 0) { showToast('Ingresá un monto válido', 'error'); return; }
  const card = getCard(st.cardId);
  if (!card) { showToast('Tarjeta no válida', 'error'); return; }

  const now = new Date();
  const targetSummary = addMonths({ year: now.getFullYear(), month: now.getMonth() }, -(st.paidSoFar - 1));
  const purchaseDate = `${targetSummary.year}-${String(targetSummary.month + 1).padStart(2, '0')}-01`;
  const first = getFirstSummaryMonth(purchaseDate, card.closingDay);
  const firstStr = first ? `${first.year}-${String(first.month + 1).padStart(2, '0')}` : null;

  const purchase = {
    id: Date.now(),
    cardId: st.cardId,
    purchaseDate,
    totalAmount: amount,
    installments: st.installments,
    category: st.category,
    description: st.description.trim(),
    tags: [],
    firstInstallmentMonth: firstStr,
    _loadedInProgress: true
  };
  CARD_PURCHASES.unshift(purchase);
  saveCardPurchasesToStorage();
  wizardState = null;
  closeModal();
  showToast(`Compra en ${st.installments} cuotas cargada`);
  render();
}

function renderSFModal() {

      </div>

// Actualiza solo el preview de contribución sin re-renderizar el modal
function updateSFPreview() {
  const preview = document.getElementById('sf-preview');
  if (!preview) return;
  const targetVal = parseFloat(sfForm.targetAmount) || 0;
  const savedVal  = parseFloat(sfForm.savedAmount)  || 0;
  const remaining = Math.max(0, targetVal - savedVal);
  const months = monthsUntilTarget(sfForm.targetDate);
  const contribution = months && months > 0 && remaining > 0 ? remaining / months : 0;
  if (contribution > 0) {
    preview.innerHTML = `
      <div class="cpb-preview" style="margin-top:8px">
        Necesitás apartar <strong>${fmt(contribution)}/mes</strong>
        durante ${months} mes${months!==1?'es':''} para llegar a la meta.
        ${targetVal > 0 ? `Faltan <strong>${fmt(remaining)}</strong>.` : ''}
      </div>`;
  } else {
    preview.innerHTML = '';
  }
}

// Cambia emoji sin re-renderizar el modal completo
function setSFEmoji(emoji) {
  sfForm.emoji = emoji;
  const display = document.getElementById('sf-emoji-display');
  if (display) display.textContent = emoji;
  document.querySelectorAll('.emoji-cell[id^="sfemoji-"]').forEach(btn => {
    btn.classList.toggle('selected', btn.textContent.trim() === emoji);
  });
}

function saveSFForm() {
  const f = sfForm;
  if (!f) return;
  // Leer valores del DOM para capturar lo que el usuario tipió (por si sfForm no se actualizó)
  const nameEl   = document.getElementById('sf-name');
  const targetEl = document.getElementById('sf-target');
  const savedEl  = document.getElementById('sf-saved');
  const dateEl   = document.getElementById('sf-date');
  if (nameEl)   f.name         = nameEl.value;
  if (targetEl) f.targetAmount = targetEl.value;
  if (savedEl)  f.savedAmount  = savedEl.value;
  if (dateEl)   f.targetDate   = dateEl.value;

  const name = f.name.trim();
  if (!name) { showToast('Falta el nombre', 'error'); return; }
  const target = parseFloat(f.targetAmount);
  if (!target || isNaN(target) || target <= 0) { showToast('Meta inválida', 'error'); return; }
  const saved = Math.max(0, parseFloat(f.savedAmount) || 0);

  const fund = {
    id: f.id || ('sf_' + Date.now()),
    name,
    emoji: f.emoji,
    color: f.color || '#a78bfa',
    targetAmount: target,
    targetDate: f.targetDate,
    savedAmount: saved,
    notes: f.notes || ''
  };

  if (f.id) {
    const idx = SINKING_FUNDS.findIndex(x => x.id === f.id);
    if (idx >= 0) SINKING_FUNDS[idx] = fund;
  } else {
    SINKING_FUNDS.push(fund);
  }
  saveSinkingFunds();
  sfForm = null;
  closeModal();
  showToast(`Fondo ${f.id ? 'actualizado' : 'creado'}`);
  render();
}

function addToSinkingFund(fundId) {
  const f = SINKING_FUNDS.find(x => x.id === fundId);
  if (!f) return;
  const contribution = monthlyContributionNeeded(f);
  const suggested = Math.round(contribution);

  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
      <div class="modal" style="max-width:320px">
        <div class="modal-header">
          <div class="modal-title">${f.emoji || '🎯'} ${f.name}</div>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.5">
          Progreso actual: <strong>${fmt(f.savedAmount || 0)}</strong> de <strong>${fmt(f.targetAmount)}</strong>
          ${suggested > 0 ? `<br>Contribución sugerida: <strong>${fmt(suggested)}</strong>` : ''}
        </div>
        <label>¿Cuánto agregás?</label>
        <input type="number" id="sf-add-input" placeholder="0"
          value="${suggested || ''}" inputmode="decimal" min="1" enterkeyhint="done" />
        <div class="form-actions" style="margin-top:12px">
          <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
          <button class="btn-save" onclick="confirmAddToFund('${fundId}')">Agregar</button>
        </div>
      </div>
    </div>`;

  setTimeout(() => {
    const inp = document.getElementById('sf-add-input');
    if (inp) { inp.focus(); inp.select(); }
  }, 80);
}

function confirmAddToFund(fundId) {
  const inp = document.getElementById('sf-add-input');
  if (!inp) return;
  inp.blur();
  const amount = parseFloat(inp.value);
  if (isNaN(amount) || amount <= 0) { showToast('Ingresá un monto válido', 'error'); return; }
  const idx = SINKING_FUNDS.findIndex(x => x.id === fundId);
  if (idx >= 0) {
    SINKING_FUNDS[idx].savedAmount = (SINKING_FUNDS[idx].savedAmount || 0) + amount;
    const reached = SINKING_FUNDS[idx].savedAmount >= SINKING_FUNDS[idx].targetAmount;
    saveSinkingFunds();
    closeModal();
    showToast(reached ? '🎉 ¡Meta alcanzada!' : `${fmt(amount)} agregado`);
    render();
  }
}

function deleteSinkingFund(fundId) {
  const f = SINKING_FUNDS.find(x => x.id === fundId);
  if (!f) return;
  showConfirm(
    `¿Eliminar "${f.name}"?`,
    'Se borra el fondo y el progreso guardado. Esta acción no se puede deshacer.',
    () => {
      SINKING_FUNDS = SINKING_FUNDS.filter(x => x.id !== fundId);
      saveSinkingFunds();
      showToast('Fondo eliminado');
      render();
    },
    { icon: '🏦' }
  );
}

function cardRow(c) {
  const dueText = cardDueText(c);
  const inactive = c.active === false;

  // Fase 4.6: barra de utilización del límite (resumen del mes actual)
  let limitBar = '';
  if (c.creditLimit) {
    const now = new Date();
    const items = getInstallmentsForMonth(c, now.getFullYear(), now.getMonth());
    const used = items.reduce((s, i) => s + i.amount, 0);
    const pct = Math.min(100, Math.round((used / c.creditLimit) * 100));
    const cls = pct >= 100 ? 'danger' : pct >= 80 ? 'warn' : 'safe';
    limitBar = `
      <div class="credit-limit-bar-wrap">
        <div class="credit-limit-bar">
          <div class="credit-limit-fill ${cls}" style="width:${pct}%"></div>
        </div>
        <span class="credit-limit-pct ${cls}">${pct}% usado</span>
      </div>`;
  }

  return `
    <div class="card-row ${inactive ? 'inactive' : ''}" style="border-left-color:${c.color}">
      <div class="ricon">${c.emoji}</div>
      <div class="recurring-info" style="flex:1">

  const dup = CARDS.find(c => c.name.toLowerCase() === preset.name.toLowerCase());

    showToast(`Ya tenés "${preset.name}"`, 'error');
    return;
  }
  const newCard = {
    id: 'card_' + Date.now(),
    name: preset.name,
    emoji: preset.emoji,
    color: preset.color,
    closingDay: preset.closingDay,
    dueDateMode: preset.dueDateMode,
    dueDay: preset.dueDay,
    active: true
  };
  CARDS.push(newCard);
  saveCardsToStorage();
  showToast(`${preset.name} agregada`);
  render();
}

function saveCardForm() {
  const name = cardForm.name.trim();
  if (!name) { showToast('Falta el nombre', 'error'); return; }

  // Validar día de cierre
  if (!cardForm.closingDay || cardForm.closingDay < 1 || cardForm.closingDay > 31) {
    showToast('Día de cierre inválido (1-31)', 'error'); return;
  }

  // Validar día/offset según modo
  if (cardForm.dueDateMode === 'fixed') {
    if (!cardForm.dueDay || cardForm.dueDay < 1 || cardForm.dueDay > 31) {
      showToast('Día de vencimiento inválido (1-31)', 'error'); return;
    }
  }
  if (cardForm.dueDateMode === 'relative') {
    if (!cardForm.dueOffsetDays || cardForm.dueOffsetDays < 1 || cardForm.dueOffsetDays > 60) {
      showToast('Offset inválido (1-60 días)', 'error'); return;
    }
  }

  // Check duplicate name
  const existing = CARDS.find(c => c.name.toLowerCase() === name.toLowerCase() && c.id !== cardForm.id);
  if (existing) { showToast('Ya existe una tarjeta con ese nombre', 'error'); return; }

  // Build card object
  const newCard = {
    id: cardForm.id || ('card_' + Date.now()),
    name,
    emoji: cardForm.emoji,
    color: cardForm.color,
    closingDay: cardForm.closingDay,
    dueDateMode: cardForm.dueDateMode,
    active: cardForm.active !== false,
    reminderDays: cardForm.reminderDays || 3
  };
  if (cardForm.dueDateMode === 'fixed') newCard.dueDay = cardForm.dueDay;
  if (cardForm.dueDateMode === 'relative') newCard.dueOffsetDays = cardForm.dueOffsetDays;
  // Límite opcional: solo guardarlo si tiene valor
  const limit = parseFloat(cardForm.creditLimit);
  if (!isNaN(limit) && limit > 0) newCard.creditLimit = limit;

  if (cardForm.id) {
    const idx = CARDS.findIndex(c => c.id === cardForm.id);
    if (idx >= 0) CARDS[idx] = newCard;
  } else {
    CARDS.push(newCard);
  }

  saveCardsToStorage();
  closeModal();
  showToast(`Tarjeta ${cardForm.id ? 'actualizada' : 'creada'}`);
  render();
}

function deleteCard(cardId) {
  const c = getCard(cardId);
  if (!c) return;

  // En sub-fase 4.1 no hay compras vinculadas todavía. Cuando se implemente 4.2,
  // acá hay que verificar usos en mie_card_purchases y avisar/migrar.
  showConfirm(
    `¿Eliminar "${c.name}"?`,
    'Esta acción no se puede deshacer. Si querés conservarla pero ocultarla, mejor desactivala desde el form de edición.',
    () => {
      CARDS = CARDS.filter(x => x.id !== cardId);
      saveCardsToStorage();
      showToast('Tarjeta eliminada');
      render();
    },
    { icon: '💎' }
  );
}

  showToast('Regla creada');

function deleteRule(ruleId) {

      diario o en el INDEC. Con los datos cargados, activá "Ver en pesos de hoy" en
      Ajustes para comparar gastos de distintos meses en términos reales.
    </div>

    <div class="ipc-table">
      <div class="ipc-row ipc-header">
        <span>Mes</span>
        <span>IPC mensual (%)</span>
      </div>

        <div class="ipc-row">
          <span class="ipc-month-label">${label}</span>
          <div class="ipc-input-wrap">
            <input type="number" class="ipc-input" min="0" max="100" step="0.1"

              value="${value !== undefined ? value : ''}"

            <span class="ipc-pct-sign">%</span>
          </div>
        </div>
      `).join('')}
    </div>

    ${Object.keys(IPC_DATA).length > 0 ? `
    <div style="margin-top:20px;padding:12px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);font-size:12px;color:var(--muted)">
      <strong style="color:var(--text-dim)">${Object.keys(IPC_DATA).length} mes${Object.keys(IPC_DATA).length>1?'es':''} cargados.</strong>
      Inflación compuesta desde el más antiguo hasta hoy:
      <strong style="color:var(--purple-light)">${(() => {
        const oldest = Object.keys(IPC_DATA).sort()[0];
        const mult = getInflationMultiplier(oldest + '-01');
        return ((mult - 1) * 100).toFixed(0) + '%';
      })()}</strong>
    </div>` : ''}

    <button onclick="clearAllIPC()" style="margin-top:14px;width:100%;padding:10px;background:transparent;border:1px solid #5a2a2a;border-radius:var(--radius);color:var(--red);font-family:inherit;font-size:13px;cursor:pointer">
      Borrar todos los datos de IPC

function setIPC(monthKey, value) {
  const pct = parseFloat(value);
  if (isNaN(pct) || value === '') {
    delete IPC_DATA[monthKey];
  } else {
    IPC_DATA[monthKey] = Math.max(0, Math.min(100, pct));
  }
  saveIPC();
  // No re-render: el input está en foco, evitamos perderlo
}

function clearAllIPC() {
  showConfirm('¿Borrar todos los datos de IPC?', 'No se puede deshacer.', () => {
    IPC_DATA = {};
    saveIPC();
    if (settingsFlags.adjustForInflation) {
      settingsFlags.adjustForInflation = false;
      saveSettingsFlags();
    }
    showToast('Datos de IPC borrados');
    render();
  }, { icon: '🧾' });
}

function setConverterRate(rate) {
  const rateEl = document.getElementById('conv-rate');

  if (!rateEl) return;
  rateEl.value = rate;
  const usd = parseFloat(usdEl?.value) || 100;
  if (usdEl) usdEl.value = usd;
  if (arsEl) arsEl.value = Math.round(usd * rate);
}
function recalcConverter() {
  const rate = parseFloat(document.getElementById('conv-rate')?.value) || 0;
  const usd  = parseFloat(document.getElementById('conv-usd')?.value)  || 0;
  const arsEl = document.getElementById('conv-ars');
  if (arsEl) arsEl.value = rate > 0 ? Math.round(usd * rate) : '';
}
function recalcConverterFromUSD() {
  const rate = parseFloat(document.getElementById('conv-rate')?.value) || 0;
  const usd  = parseFloat(document.getElementById('conv-usd')?.value)  || 0;
  const arsEl = document.getElementById('conv-ars');
  if (arsEl) arsEl.value = rate > 0 ? Math.round(usd * rate) : '';
}
function recalcConverterFromARS() {
  const rate = parseFloat(document.getElementById('conv-rate')?.value) || 0;
  const ars  = parseFloat(document.getElementById('conv-ars')?.value)  || 0;
  const usdEl = document.getElementById('conv-usd');
  if (usdEl) usdEl.value = rate > 0 ? (ars / rate).toFixed(2) : '';
}

function saveQuickAdd() {
  const amount = parseFloat(quickAddState.amount);

    showToast('Ingresá un monto', 'error'); return;

// Haptic feedback (vibración corta para confirmar toques importantes)
function haptic(type = 'light') {
  if (!navigator.vibrate) return;
  const patterns = {
    light: 10,        // tap normal
    medium: 20,       // confirmación
    success: [10, 50, 10],  // 2 pulsos
    error: [30, 30, 30],    // 3 pulsos
  };
  navigator.vibrate(patterns[type] || 10);
}

// Ripple effect at tap location
document.addEventListener('pointerdown', (e) => {
  const target = e.target.closest(
    '.bn-btn, .settings-row, .tx-row, .card, .recurring-row, .budget-row, .card-row, ' +
    '.cat-btn, .month-cell, .system-btn, .backup-btn, .filter-btn, .tag-filter-btn, ' +
    '.btn-add, .btn-save, .btn-cancel, .toggle-btn, .subpage-action, .back-btn, ' +
    '.logo, .month-nav button, .month-label-btn, .tag-suggestion, .modal-close, ' +
    '.recurring-toggle, .emoji-cell, .color-cell, .due-mode-btn, .quick-cat-btn, .quick-more, ' +
    '.btn-delete, .credit-highlight, .backup-reminder button, ' +
    '.year-nav button'
  );
  if (!target) return;

  // Light haptic on every tappable
  haptic('light');

  // Ripple positioning
  if (!target.classList.contains('ripple')) target.classList.add('ripple');
  const rect = target.getBoundingClientRect();
  const x = ((e.clientX - rect.left) / rect.width) * 100;
  const y = ((e.clientY - rect.top) / rect.height) * 100;
  target.style.setProperty('--rx', x + '%');
  target.style.setProperty('--ry', y + '%');

  target.classList.remove('tapped');
  // Force reflow
  void target.offsetWidth;
  target.classList.add('tapped');
  setTimeout(() => target.classList.remove('tapped'), 300);
}, { passive: true });

// FAB has its own animation, just add haptic
document.addEventListener('pointerdown', (e) => {
  if (e.target.closest('.fab')) {
    haptic('medium');
  }
}, { passive: true });

// Stronger haptic on successful saves
function patchSaveActions() {
  const originalSaveTx = window.saveTransaction;
  window.saveTransaction = function() {
    const len = transactions.length;
    originalSaveTx();
    if (transactions.length > len) {
      haptic('success');
      // Pulse the save button (visual)
      const btn = document.querySelector('.btn-save');
      if (btn) {
        btn.classList.add('success-pulse');
        setTimeout(() => btn.classList.remove('success-pulse'), 400);
      }
    } else {
      haptic('error');
    }
  };

  const originalQuickSave = window.saveQuickAdd;
  window.saveQuickAdd = function() {
    const len = transactions.length;
    originalQuickSave();
    if (transactions.length > len) haptic('success');
    else haptic('error');
  };
}
patchSaveActions();

// Patch toast to vibrate on errors
const originalShowToast = window.showToast;
window.showToast = function(msg, type = 'success') {
  originalShowToast(msg, type);
  if (type === 'error') haptic('error');
};

// Subtle haptic on view changes
const originalShowView = window.showView;
window.showView = function(v) {
  if (currentView !== v) haptic('light');
  originalShowView(v);
};
</script>

</body>
</html>

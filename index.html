    .bn-btn:active .bn-icon {
      transform: scale(0.9);
    }

    /* FAB — clean, no idle animation */
    .fab {
      animation: none;
    }
    .fab:active {
      transform: scale(0.92) rotate(45deg);
    }

    /* All buttons — improve tap feedback */
    button {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* Cards — subtle hover */
    .card, .credit-highlight, .section, .tx-row, .settings-row, .recurring-row, .budget-row {
      -webkit-tap-highlight-color: transparent;
    }

    /* Save button — pulse on success */
    @keyframes savePulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.04); box-shadow: 0 8px 24px rgba(124,58,237,0.7); }
      100% { transform: scale(1); }
    }
    .btn-save.success-pulse { animation: savePulse 0.4s ease; }

    /* Toast — better entrance with bounce */
    .toast {
      will-change: transform, opacity;
    }

    /* TX row — tap feedback */
    .tx-row {
      transition: background 0.15s, transform 0.1s;
    }
    .tx-row:active {
      background: var(--bg);
      transform: scale(0.995);
    }

    /* Settings rows — smoother active */
    .settings-row {
      transition: background 0.15s, transform 0.1s;
    }
    .settings-row:active {
      background: var(--bg);
      transform: scale(0.995);
    }

    /* Filter buttons — better active */
    .filter-btn, .tag-filter-btn {
      transition: all 0.2s;
    }
    .filter-btn:active, .tag-filter-btn:active {
      transform: scale(0.94);
    }

    /* Cat buttons in form */
    .cat-btn {
      transition: all 0.15s;
    }
    .cat-btn:active {
      transform: scale(0.92);
    }

    /* Modal entrance — smoother */
    .modal {
      will-change: transform, opacity;
    }
    .modal-overlay {
      will-change: opacity;
    }

    /* Inputs — focus ring */
    input:focus, select:focus, textarea:focus {
      box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.15);
    }

    /* Number input on dashboard amount */
    .quick-amount-input:focus {
      box-shadow: none;
      outline: none;
    }

    /* Subtle scale on switch */
    .switch {
      transition: background 0.25s;
    }
    .switch:active {
      transform: scale(0.95);
    }

    /* Backup reminder buttons — better feedback */
    .backup-reminder button {
      transition: transform 0.1s, opacity 0.15s;
    }
    .backup-reminder button:active {
      transform: scale(0.94);
    }

    /* Add a soft border on focus for sliders/cards in forms */
    .cat-btn.active, .month-cell.current {
      animation: gentleScale 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes gentleScale {
      from { transform: scale(0.92); }
      to { transform: scale(1); }
    }

    /* Smooth scroll between views */
    html {
      scroll-behavior: smooth;
    }

    /* Pretty selection */
    ::selection {
      background: rgba(167, 139, 250, 0.3);
      color: var(--text);
    }

    /* Range selector for chart */
    .range-selector {
      display: flex; gap: 4px;
      background: var(--bg);
      padding: 3px; border-radius: 100px;
      border: 1px solid var(--border);
    }
    .range-btn {
      background: transparent; border: none;
      color: var(--muted); font-family: inherit;
      font-size: 11px; font-weight: 700;
      padding: 5px 10px; border-radius: 100px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .range-btn.active {
      background: var(--purple);
      color: #fff;
    }

    /* Shake animation for invalid inputs */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    .shake {
      animation: shake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97);
      border-color: var(--red) !important;
    }

    /* Confirm modal */
    .confirm-modal {
      max-width: 320px !important;
      text-align: center;
      padding: 24px 20px !important;
    }
    .confirm-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }
    .confirm-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text);
    }
    .confirm-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 22px;
    }
    .confirm-actions {
      display: flex;
      gap: 10px;
    }
    .confirm-actions button {
      flex: 1;
      padding: 11px;
      border-radius: 10px;
      font-family: inherit;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid var(--border);
    }
    .confirm-cancel {
      background: var(--bg);
      color: var(--text);
    }
    .confirm-confirm {
      background: var(--red);
      color: #fff;
      border-color: var(--red) !important;
    }
    .confirm-confirm.primary {
      background: var(--purple);
      border-color: var(--purple) !important;
    }
  </style>
</head>
<body>

<header class="header-v2">
  <div class="logo" onclick="showView('dashboard')" style="cursor:pointer">💰 Mi<span>Economía</span></div>

// ── CARDS (Fase 4.1) ──────────────────────────────────────────────────────

// Detecta gastos viejos cargados con método "Tarjeta crédito" (pre-fase 4) sin tarjeta asignada.

// ── CARD PURCHASES (Fase 4.2) ─────────────────────────────────────────────
// Modelo: una fila por compra (no por cuota). Las cuotas se calculan en runtime

//   {

//     category, description, tags, firstInstallmentMonth ('YYYY-MM' cacheado)
//   }

let CARD_PURCHASES = loadCardPurchases();

// ── CARD PAYMENTS (Fase 4.3) ─────────────────────────────────────────────
// Registro de resúmenes marcados como pagados. Solo visual — no afecta el
// balance porque las cuotas ya están distribuidas mes a mes.
// Estructura: { cardId, summaryMonth ('YYYY-MM'), paidAt, paidAmount? }
function loadCardPayments() {
  try {
    const stored = localStorage.getItem('mie_card_payments');
    if (stored) return JSON.parse(stored);
  } catch {}
  return [];
}
function saveCardPaymentsToStorage() {
  localStorage.setItem('mie_card_payments', JSON.stringify(CARD_PAYMENTS));
}
let CARD_PAYMENTS = loadCardPayments();

// Clave única para un resumen: "cardId|YYYY-MM"
function summaryKey(cardId, year, month) {
  return `${cardId}|${year}-${String(month + 1).padStart(2, '0')}`;
}
function isSummaryPaid(cardId, year, month) {
  const key = summaryKey(cardId, year, month);
  return CARD_PAYMENTS.some(p => summaryKey(p.cardId, ...p.summaryMonth.split('-').slice(0, 2).map((v, i) => i === 1 ? Number(v) - 1 : Number(v))) === key);
}
// Versión más directa y robusta sin el split
function isSummaryPaidDirect(cardId, year, month) {
  const ym = `${year}-${String(month + 1).padStart(2, '0')}`;
  return CARD_PAYMENTS.some(p => p.cardId === cardId && p.summaryMonth === ym);
}
function markSummaryPaid(cardId, year, month, amount) {
  const ym = `${year}-${String(month + 1).padStart(2, '0')}`;
  // Idempotente: si ya está pagado, actualiza el timestamp
  CARD_PAYMENTS = CARD_PAYMENTS.filter(p => !(p.cardId === cardId && p.summaryMonth === ym));
  CARD_PAYMENTS.push({ cardId, summaryMonth: ym, paidAt: new Date().toISOString(), paidAmount: amount });
  saveCardPaymentsToStorage();
}
function unmarkSummaryPaid(cardId, year, month) {
  const ym = `${year}-${String(month + 1).padStart(2, '0')}`;
  CARD_PAYMENTS = CARD_PAYMENTS.filter(p => !(p.cardId === cardId && p.summaryMonth === ym));
  saveCardPaymentsToStorage();
}

// ── IPC HELPERS (Fase 6) ─────────────────────────────────────────────────

// Factor acumulado de inflación desde fromYM hasta hoy.
// Si IPC_DATA tiene datos para cada mes, compone (1 + ipc/100) × ... × (1 + ipc_n/100).
// Meses sin dato: se saltan (el usuario puede ir llenando a medida que los conoce).
function getInflationMultiplier(txDate) {
  if (!txDate || Object.keys(IPC_DATA).length === 0) return 1;
  const from = parseLocalDate(txDate);
  if (!from) return 1;
  const now = new Date();
  let multiplier = 1;
  // Iterar desde el mes siguiente al de la tx hasta el mes actual
  let cur = new Date(from.getFullYear(), from.getMonth() + 1, 1);
  while (cur <= now) {
    const key = `${cur.getFullYear()}-${String(cur.getMonth() + 1).padStart(2, '0')}`;
    if (IPC_DATA[key] !== undefined) {
      multiplier *= (1 + IPC_DATA[key] / 100);
    }
    cur.setMonth(cur.getMonth() + 1);
  }
  return multiplier;
}

// Formatter con ajuste de inflación opcional.
// Usa fmtReal(amount, txDate) en lugar de fmt(amount) donde el monto se muestra al usuario.
// Si el toggle está apagado, se comporta igual que fmt.
function fmtReal(amount, txDate) {
  if (!settingsFlags.adjustForInflation || !txDate) return fmt(amount);
  const mult = getInflationMultiplier(txDate);
  return fmt(amount * mult);
}

// Convierte un monto en moneda extranjera a ARS usando la tasa almacenada o la cacheada.
// currency: 'ARS' | 'USD_BLUE' | 'USD_OFICIAL' | 'USD_MEP'
function toARS(originalAmount, currency, exchangeRate) {
  if (!currency || currency === 'ARS') return originalAmount;
  return originalAmount * (exchangeRate || 1);
}
// Un sinking fund es dinero apartado cada mes para un gasto futuro no mensual.
// Una meta de ahorro es lo mismo con propósito explícito. Usamos el mismo modelo.
// Estructura:
//   { id, name, emoji, color, targetAmount, targetDate ('YYYY-MM-DD'),
//     savedAmount, monthlyContribution? (calculado), notes? }
function loadSinkingFunds() {
  try {
    const stored = localStorage.getItem('mie_sinking_funds');
    if (stored) return JSON.parse(stored);
  } catch {}
  return [];
}
function saveSinkingFunds() {
  localStorage.setItem('mie_sinking_funds', JSON.stringify(SINKING_FUNDS));
}
let SINKING_FUNDS = loadSinkingFunds();

// ── INFLACIÓN (Fase 6) ────────────────────────────────────────────────────
// IPC mensual cargado a mano. Estructura: { 'YYYY-MM': pct } donde pct es el
// porcentaje mensual (ej: 4.2 = 4,2% en ese mes). El usuario lo lee de cualquier
// diario y lo carga en Ajustes.
function loadIPC() {
  try {
    const stored = localStorage.getItem('mie_ipc');
    if (stored) return JSON.parse(stored);
  } catch {}
  return {};
}
function saveIPC() { localStorage.setItem('mie_ipc', JSON.stringify(IPC_DATA)); }
let IPC_DATA = loadIPC();

// ── MULTI-MONEDA (Fase 6) ─────────────────────────────────────────────────
// Cotizaciones históricas: { 'YYYY-MM-DD': { blue, oficial, mep } }
// Se guarda automáticamente cuando el usuario registra una tx en USD.
function loadExchangeRates() {
  try {
    const stored = localStorage.getItem('mie_exchange_rates');
    if (stored) return JSON.parse(stored);
  } catch {}
  return {};
}
function saveExchangeRates() {
  localStorage.setItem('mie_exchange_rates', JSON.stringify(EXCHANGE_RATES));
}
let EXCHANGE_RATES = loadExchangeRates();

// Cotización en memoria (cacheada de DolarApi para la sesión actual)
let cachedRates = null;
let cachedRatesTs = 0; // timestamp de la última fetch

async function fetchLiveRates() {
  const now = Date.now();
  if (cachedRates && (now - cachedRatesTs) < 5 * 60 * 1000) return cachedRates; // cache 5min
  try {
    const res = await fetch('https://dolarapi.com/v1/dolares');
    if (!res.ok) return null;
    const data = await res.json();
    const blue    = data.find(d => d.casa === 'blue');
    const oficial = data.find(d => d.casa === 'oficial');
    const mep     = data.find(d => d.casa === 'bolsa');
    cachedRates = {
      blue:    blue    ? Math.round((blue.compra + blue.venta) / 2)    : null,
      oficial: oficial ? Math.round((oficial.compra + oficial.venta) / 2) : null,
      mep:     mep     ? Math.round((mep.compra + mep.venta) / 2)     : null,
    };
    cachedRatesTs = now;
    return cachedRates;
  } catch { return null; }
}

// Meses restantes desde hoy hasta targetDate
function monthsUntilTarget(targetDate) {
  if (!targetDate) return null;
  const now = new Date();
  const target = new Date(targetDate + 'T00:00:00');
  const months = (target.getFullYear() - now.getFullYear()) * 12 + (target.getMonth() - now.getMonth());
  return Math.max(0, months);
}

// Contribución mensual necesaria para llegar al objetivo
function monthlyContributionNeeded(fund) {
  const months = monthsUntilTarget(fund.targetDate);
  if (!months || months <= 0) return 0;
  const remaining = Math.max(0, fund.targetAmount - (fund.savedAmount || 0));
  return remaining / months;
}

// ── PURE ALGORITHM ────────────────────────────────────────────────────────
// Funciones puras (no tocan DOM ni localStorage). Reusables y testeables.

// Parsea 'YYYY-MM-DD' como fecha local (evita el shift de UTC midnight).
function parseLocalDate(yyyymmdd) {
  if (!yyyymmdd || typeof yyyymmdd !== 'string') return null;
  const parts = yyyymmdd.split('-').map(Number);
  if (parts.length !== 3 || parts.some(isNaN)) return null;
  return new Date(parts[0], parts[1] - 1, parts[2]);
}

// Si el día pedido no existe en el mes (ej: 31 en febrero), devuelve el último
// día válido del mes. month es 0-indexado.
function clampDayToMonth(year, month, day) {
  const lastDay = new Date(year, month + 1, 0).getDate();
  return Math.min(day, lastDay);
}

// Mes (0-indexado) y año del primer resumen donde entra una compra.
// Convención: si el día de compra <= cierre, entra al resumen de ese mes.
// Si es posterior, entra al siguiente.
function getFirstSummaryMonth(purchaseDate, closingDay) {
  const d = parseLocalDate(purchaseDate);
  if (!d) return null;
  const purchaseDay = d.getDate();
  const effectiveClosing = clampDayToMonth(d.getFullYear(), d.getMonth(), closingDay);
  if (purchaseDay <= effectiveClosing) {
    return { year: d.getFullYear(), month: d.getMonth() };
  }
  // Va al resumen del mes siguiente
  const next = new Date(d.getFullYear(), d.getMonth() + 1, 1);
  return { year: next.getFullYear(), month: next.getMonth() };
}

// Suma N meses a un { year, month } (0-indexado)
function addMonths(ym, n) {
  const total = ym.month + n;
  const yearAdd = Math.floor(total / 12);
  const newMonth = ((total % 12) + 12) % 12;
  return { year: ym.year + yearAdd, month: newMonth };
}

// Devuelve las cuotas (purchase, num, total, amount) que caen en un resumen
// específico de una tarjeta. La cuota 1 va al resumen de getFirstSummaryMonth,
// la 2 al siguiente, etc.
function getInstallmentsForMonth(card, year, month) {
  if (!card) return [];
  const result = [];
  for (const p of CARD_PURCHASES) {
    if (p.cardId !== card.id) continue;
    const first = getFirstSummaryMonth(p.purchaseDate, card.closingDay);
    if (!first) continue;
    const monthsDiff = (year - first.year) * 12 + (month - first.month);
    if (monthsDiff < 0 || monthsDiff >= p.installments) continue;
    result.push({
      purchase: p,
      installmentNum: monthsDiff + 1,        // 1-indexado
      installmentTotal: p.installments,
      amount: p.totalAmount / p.installments
    });
  }
  return result;
}

// Resumen consolidado de una tarjeta para un mes
function getCardSummaryForMonth(card, year, month) {
  const installments = getInstallmentsForMonth(card, year, month);
  return {
    installments,
    total: installments.reduce((s, i) => s + i.amount, 0),
    count: installments.length,
    dueDate: getDueDate(card, year, month)
  };
}

// Fecha de vencimiento del resumen de un mes específico.
// Modo 'fixed': día fijo del mes siguiente al cierre.
// Modo 'relative': N días después del cierre.
// Modo 'manual': null (el usuario lo carga al recibir cada resumen — Fase 4.5).
function getDueDate(card, summaryYear, summaryMonth) {
  if (!card) return null;
  if (card.dueDateMode === 'fixed') {
    const dueY = summaryYear + (summaryMonth + 1 >= 12 ? 1 : 0);
    const dueM = (summaryMonth + 1) % 12;
    const day = clampDayToMonth(dueY, dueM, card.dueDay);
    return new Date(dueY, dueM, day);
  }
  if (card.dueDateMode === 'relative') {
    const closingDay = clampDayToMonth(summaryYear, summaryMonth, card.closingDay);
    const close = new Date(summaryYear, summaryMonth, closingDay);
    close.setDate(close.getDate() + card.dueOffsetDays);
    return close;
  }
  return null;
}

// Helper: cuántas cuotas de una compra están a futuro (incluyendo la del mes actual)
function getRemainingInstallments(purchase) {
  const card = getCard(purchase.cardId);
  if (!card) return purchase.installments;
  const first = getFirstSummaryMonth(purchase.purchaseDate, card.closingDay);
  if (!first) return purchase.installments;
  const now = new Date();
  const elapsed = (now.getFullYear() - first.year) * 12 + (now.getMonth() - first.month);
  const remaining = purchase.installments - Math.max(0, elapsed);
  return Math.max(0, remaining);
}

// Total a pagar en un mes específico, sumando todas las cuotas de todas las tarjetas
// que caen en ese mes. Usado por dashboard y stats.
function sumInstallmentsForMonth(year, month) {
  let total = 0;
  for (const card of CARDS) {
    const items = getInstallmentsForMonth(card, year, month);
    total += items.reduce((s, i) => s + i.amount, 0);
  }
  return total;
}

// Total acumulado en cuotas de toda la historia (para totales de stats globales)
function sumAllCardPurchases() {
  return CARD_PURCHASES.reduce((s, p) => s + p.totalAmount, 0);
}

// ── HELPER UNIFICADO (Fase 4.4) ───────────────────────────────────────────
// Gasto total del mes X por categoría, mezclando txs legacy + cuotas de tarjeta.
// Reemplaza los inline byCat que estaban dispersos. Usarlo en presupuestos y dashboard.
function getMonthExpenseByCat(year, month) {
  const cat = {};
  transactions
    .filter(t => {
      const d = new Date(t.date);
      return t.type === 'expense' && d.getFullYear() === year && d.getMonth() === month;
    })
    .forEach(t => { cat[t.category] = (cat[t.category] || 0) + t.amount; });
  for (const card of CARDS) {
    const items = getInstallmentsForMonth(card, year, month);
    for (const it of items) {
      cat[it.purchase.category] = (cat[it.purchase.category] || 0) + it.amount;
    }
  }
  return cat;
}

// Total de gastos del mes X mezclando ambas fuentes
function getMonthExpenseTotal(year, month) {
  const byCat = getMonthExpenseByCat(year, month);
  return Object.values(byCat).reduce((s, v) => s + v, 0);
}

// Gasto del mes X desglosado por tarjeta (para stats)
function getMonthExpenseByCard(year, month) {
  const byCard = {};
  for (const card of CARDS) {
    const items = getInstallmentsForMonth(card, year, month);
    const total = items.reduce((s, i) => s + i.amount, 0);
    if (total > 0) byCard[card.id] = total;
  }
  return byCard;
}

// ── FORECAST ENGINE (Fase 5) ──────────────────────────────────────────────

// Ingresos esperados por mes: suma de recurrentes tipo 'income' activos.
function expectedMonthlyIncome() {
  return recurring
    .filter(r => r.type === 'income' && r.active !== false)
    .reduce((s, r) => s + (parseFloat(r.amount) || 0), 0);
}

// Compromisos fijos por mes para un año/mes dado:
//   recurrentes expense activos + cuotas de tarjeta que caen en ese mes
function fixedCommitmentsForMonth(year, month) {
  const recurringExpense = recurring
    .filter(r => r.type === 'expense' && r.active !== false)
    .reduce((s, r) => s + (parseFloat(r.amount) || 0), 0);
  const cardInstallments = sumInstallmentsForMonth(year, month);
  return recurringExpense + cardInstallments;
}

// Gasto variable promedio de los últimos N meses (excluye recurrentes y tarjeta)
// "variable" = lo que el usuario cargó en mie_txs pero no son recurrentes.
function avgVariableExpense(months) {
  const now = new Date();
  const recurringExpense = recurring
    .filter(r => r.type === 'expense' && r.active !== false)
    .reduce((s, r) => s + (parseFloat(r.amount) || 0), 0);

  let totalVar = 0;
  let monthsWithData = 0;
  for (let i = 1; i <= months; i++) { // empieza en 1 para no incluir el mes actual incompleto
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const y = d.getFullYear(), m = d.getMonth();
    const monthTxs = transactions.filter(t => {
      const td = new Date(t.date);
      return t.type === 'expense' && td.getFullYear() === y && td.getMonth() === m;
    });
    const monthTotal = monthTxs.reduce((s, t) => s + t.amount, 0);
    // Variable = total - recurrentes (aproximación: los recurrentes son constantes)
    const variable = Math.max(0, monthTotal - recurringExpense);
    totalVar += variable;
    monthsWithData++;
  }
  return monthsWithData > 0 ? totalVar / monthsWithData : 0;
}

// Proyección mensual para los próximos N meses.
// Devuelve array de { year, month, incomeExpected, fixedCommitments, variableAvg, free, totalCommitted }
function buildForecast(months) {
  const now = new Date();
  const incomeExp = expectedMonthlyIncome();
  const varAvg = avgVariableExpense(3);
  const result = [];

  for (let i = 0; i < months; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
    const y = d.getFullYear(), m = d.getMonth();
    const fixed = fixedCommitmentsForMonth(y, m);
    const totalCommitted = fixed + varAvg;
    const free = incomeExp - totalCommitted;
    result.push({ year: y, month: m, incomeExpected: incomeExp, fixedCommitments: fixed, variableAvg: varAvg, totalCommitted, free });
  }
  return result;
}

// ── NET WORTH ENGINE (Fase 5) ─────────────────────────────────────────────

// Saldo líquido acumulado: todos los ingresos menos todos los gastos históricos.
// Incluye txs legacy + compras con tarjeta (al total de la compra, no por cuotas).
// Es una aproximación — no incluye activos reales ni cuentas bancarias.
function getLiquidBalance() {
  const income = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
  const expense = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
  const cardPaid = CARD_PURCHASES.reduce((s, p) => {
    // Solo las cuotas ya pasadas cuentan como gastadas
    const card = getCard(p.cardId);
    if (!card) return s + p.totalAmount; // sin tarjeta = todo gastado
    const first = getFirstSummaryMonth(p.purchaseDate, card.closingDay);
    if (!first) return s + p.totalAmount;
    const now = new Date();
    const elapsed = (now.getFullYear() - first.year) * 12 + (now.getMonth() - first.month);
    const paid = Math.min(p.installments, Math.max(0, elapsed + 1)); // +1 incluye el mes actual
    return s + (p.totalAmount / p.installments) * paid;
  }, 0);
  return income - expense - cardPaid;
}

// Cuotas pendientes totales (compromisos futuros en tarjeta)
function getPendingInstallmentsTotal() {
  return CARD_PURCHASES.reduce((s, p) => {
    const remaining = getRemainingInstallments(p);
    const perInst = p.totalAmount / p.installments;
    return s + perInst * remaining;
  }, 0);
}

// Total guardado en sinking funds
function getSinkingFundsTotal() {
  return SINKING_FUNDS.reduce((s, f) => s + (f.savedAmount || 0), 0);
}

// Patrimonio neto = líquido + sinking funds - cuotas pendientes
function getNetWorth() {
  return getLiquidBalance() + getSinkingFundsTotal() - getPendingInstallmentsTotal();
}

// Resúmenes de los próximos N meses con su total y vencimiento.
// Devuelve array de { year, month, cards: [{card, total, due, paid}], grandTotal }
// ordenado cronológicamente, saltando los meses sin actividad.
function getUpcomingSummaries(months) {
  const now = new Date();
  const result = [];
  for (let i = 0; i < months; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
    const y = d.getFullYear(), m = d.getMonth();
    const cards = [];
    for (const card of CARDS) {
      if (card.active === false) continue;
      const items = getInstallmentsForMonth(card, y, m);
      const total = items.reduce((s, it) => s + it.amount, 0);
      if (total === 0) continue;
      const due = getDueDate(card, y, m);
      const paid = isSummaryPaidDirect(card.id, y, m);
      cards.push({ card, total, due, paid });
    }
    if (cards.length === 0) continue;
    const grandTotal = cards.reduce((s, c) => s + c.total, 0);
    result.push({ year: y, month: m, cards, grandTotal });
  }
  return result;
}

// Compras en cuotas activas (alguna cuota aún no vencida).
// Devuelve array ordenado: las que vencen antes primero.
function getActivePurchases() {
  const now = new Date();
  const nowYM = { year: now.getFullYear(), month: now.getMonth() };
  return CARD_PURCHASES
    .map(p => {
      const card = getCard(p.cardId);
      if (!card) return null;
      const first = getFirstSummaryMonth(p.purchaseDate, card.closingDay);
      if (!first) return null;
      // Cuántas cuotas ya pasaron (índice 0 = primera cuota)
      const elapsed = (nowYM.year - first.year) * 12 + (nowYM.month - first.month);
      const paid = Math.min(Math.max(0, elapsed), p.installments);
      const remaining = p.installments - paid;
      if (remaining <= 0) return null; // terminada
      return { purchase: p, card, first, paid, remaining, total: p.installments };
    })
    .filter(Boolean)
    .sort((a, b) => a.remaining - b.remaining); // las que terminan antes arriba
}

// ── AUTO-CATEGORIZACIÓN (Fase 7) ─────────────────────────────────────────
// Aprende del historial: para cada descripción normalizada,
// registra qué categoría se eligió más veces. Sin IA — pura frecuencia local.

function buildDescriptionCategoryMap() {
  const map = {}; // normalized_desc -> { catId: count }
  for (const t of transactions) {
    const desc = (t.description || '').trim().toLowerCase();
    if (!desc || desc.length < 3) continue;
    if (!map[desc]) map[desc] = {};
    map[desc][t.category] = (map[desc][t.category] || 0) + 1;
  }
  return map;
}

// Devuelve la categoría más probable para una descripción dada.
// Busca coincidencias exactas primero, luego parciales (contiene).
function getAutoCategory(description) {
  if (!description || description.trim().length < 3) return null;
  const query = description.trim().toLowerCase();
  const map = buildDescriptionCategoryMap();

  // Coincidencia exacta
  if (map[query]) {
    return Object.entries(map[query]).sort((a,b) => b[1]-a[1])[0]?.[0] || null;
  }

  // Coincidencia parcial: buscar entradas que contengan la query o viceversa
  let bestMatch = null, bestCount = 0;
  for (const [desc, cats] of Object.entries(map)) {
    if (desc.includes(query) || query.includes(desc)) {
      const topCat = Object.entries(cats).sort((a,b) => b[1]-a[1])[0];
      if (topCat && topCat[1] > bestCount) {
        bestCount = topCat[1];
        bestMatch = topCat[0];
      }
    }
  }
  return bestMatch;
}

// ── INSIGHTS ENGINE (Fase 7) ──────────────────────────────────────────────
// Genera observaciones rule-based sobre el comportamiento financiero del usuario.
// Sin IA — puras reglas locales. Cada insight tiene { icon, text, type, action? }.
function generateInsights() {
  const insights = [];
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();

  // ─ Gasto mensual por categoría vs promedio de 3 meses anteriores
  const thisByCat = getMonthExpenseByCat(y, m);
  for (const [catId, thisAmt] of Object.entries(thisByCat)) {
    if (thisAmt < 1000) continue; // ignorar montos insignificantes
    const hist = [];
    for (let i = 1; i <= 3; i++) {
      const d = new Date(y, m - i, 1);
      const prev = getMonthExpenseByCat(d.getFullYear(), d.getMonth());
      if (prev[catId]) hist.push(prev[catId]);
    }
    if (hist.length < 2) continue;
    const avg = hist.reduce((s, v) => s + v, 0) / hist.length;
    const pct = Math.round(((thisAmt - avg) / avg) * 100);
    if (pct >= 30) {
      const cat = getCat(catId);
      insights.push({ icon: '⚠️', text: `Gastaste ${pct}% más en ${cat.label} que tu promedio de los últimos ${hist.length} meses.`, type: 'warn' });
    } else if (pct <= -25) {
      const cat = getCat(catId);
      insights.push({ icon: '✅', text: `Bajaste ${Math.abs(pct)}% en ${cat.label} vs tu promedio. ¡Buen trabajo!`, type: 'good' });
    }
  }

  // ─ Tendencia descendente en categoría (3 meses seguidos bajando)
  const allCats = [...new Set(transactions.filter(t=>t.type==='expense').map(t=>t.category))];
  for (const catId of allCats) {
    const vals = [];
    for (let i = 0; i < 4; i++) {
      const d = new Date(y, m - i, 1);
      const bc = getMonthExpenseByCat(d.getFullYear(), d.getMonth());
      vals.push(bc[catId] || 0);
    }
    if (vals[0] > 0 && vals[1] > vals[0] && vals[2] > vals[1]) {
      const cat = getCat(catId);
      insights.push({ icon: '📉', text: `Tu gasto en ${cat.label} viene bajando 3 meses seguidos. Bien encaminado.`, type: 'good' });
    }
  }

  // ─ Categoría dominante del mes (>40% del gasto total)
  const totalThisMonth = Object.values(thisByCat).reduce((s,v)=>s+v, 0);
  if (totalThisMonth > 0) {
    for (const [catId, amt] of Object.entries(thisByCat)) {
      const pct = Math.round((amt / totalThisMonth) * 100);
      if (pct >= 40) {
        const cat = getCat(catId);
        insights.push({ icon: '🔍', text: `${cat.label} representa el ${pct}% de tu gasto este mes. ¿Es esperado?`, type: 'info' });
      }
    }
  }

  // ─ Presupuesto casi agotado
  const now_day = now.getDate();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const monthProgress = now_day / daysInMonth;
  for (const [catId, limit] of Object.entries(budgets)) {
    const spent = thisByCat[catId] || 0;
    const pct = spent / limit;
    if (pct >= 0.9 && pct < 1 && monthProgress < 0.7) {
      const cat = getCat(catId);
      insights.push({ icon: '🎯', text: `Ya usaste el ${Math.round(pct*100)}% del presupuesto de ${cat.label} y el mes está al ${Math.round(monthProgress*100)}%.`, type: 'warn' });
    } else if (pct >= 1) {
      const cat = getCat(catId);
      insights.push({ icon: '🔴', text: `Superaste el presupuesto de ${cat.label}: gastaste ${fmt(spent)} de ${fmt(limit)}.`, type: 'danger' });
    }
  }

  // ─ Resumen de tarjeta próximo a vencer
  for (const card of CARDS) {
    if (card.active === false) continue;
    for (let i = 0; i < 2; i++) {
      const d = new Date(y, m + i, 1);
      const cy = d.getFullYear(), cm = d.getMonth();
      const items = getInstallmentsForMonth(card, cy, cm);
      if (items.length === 0) continue;
      const due = getDueDate(card, cy, cm);
      if (!due) continue;
      const paid = isSummaryPaidDirect(card.id, cy, cm);
      if (paid) continue;
      const daysLeft = Math.ceil((due - now) / 86400000);
      if (daysLeft >= 0 && daysLeft <= 5) {
        const total = items.reduce((s,it)=>s+it.amount,0);
        const urgency = daysLeft === 0 ? 'hoy' : daysLeft === 1 ? 'mañana' : `en ${daysLeft} días`;
        insights.push({ icon: '💳', text: `Resumen ${card.name} vence ${urgency}: ${fmt(total)}.`, type: 'warn', action: `showSummaryDetail('${card.id}',${cy},${cm})` });
      }
    }
  }

  // ─ Mes positivo/negativo
  const income = transactions.filter(t=>{const d=new Date(t.date);return d.getFullYear()===y&&d.getMonth()===m&&t.type==='income';}).reduce((s,t)=>s+t.amount,0);
  const expense_total = totalThisMonth + sumInstallmentsForMonth(y, m);
  if (income > 0) {
    const balance = income - expense_total;
    const savingRate = Math.round((balance / income) * 100);
    if (savingRate >= 20) {
      insights.push({ icon: '🏦', text: `Ahorraste el ${savingRate}% de tus ingresos este mes. ¡Excelente!`, type: 'good' });
    } else if (balance < 0) {
      insights.push({ icon: '⚠️', text: `Este mes los gastos superan los ingresos por ${fmt(Math.abs(balance))}.`, type: 'danger' });
    }
  }

  return insights.slice(0, 5); // máximo 5 insights para no abrumar
}

// Evalúa reglas contra el estado actual y devuelve las que dispararon.
function checkRules() {
  if (RULES.length === 0) return [];
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();
  const byCat = getMonthExpenseByCat(y, m);
  const triggered = [];
  for (const rule of RULES) {
    const spent = byCat[rule.category] || 0;
    if (spent >= rule.threshold) {
      triggered.push({ rule, spent });
    }
  }
  return triggered;
}

const MONTHS_ES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

function getCat(id) {
  const all = [...CATEGORIES.expense, ...CATEGORIES.income];
  return all.find(c => c.id === id) || { label: id, icon: "📌" };
}

function fmt(n) {
  return new Intl.NumberFormat('es-AR', {
    style: 'currency', currency: 'ARS', maximumFractionDigits: 0
  }).format(Math.abs(n));
}

function fmtSign(n, type) {
  return (type === 'income' ? '+' : '-') + fmt(n);
}

// Returns CSS class to shrink large amounts
function shrinkClass(value) {
  const len = Math.abs(value).toString().length;
  if (len >= 9) return 'shrink-2';   // 100M+
  if (len >= 7) return 'shrink-1';   // 1M+
  return '';
}

// Relative date formatter: "Hoy", "Ayer", "Hace X días", or full date
function fmtRelativeDate(dateStr) {
  if (!dateStr) return '';
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const txDate = new Date(dateStr + 'T00:00:00');
  const diffMs = today - txDate;
  const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));

  if (diffDays === 0) return 'Hoy';
  if (diffDays === 1) return 'Ayer';
  if (diffDays >= 2 && diffDays <= 6) return `Hace ${diffDays} días`;
  if (diffDays === -1) return 'Mañana';
  // Older: format as "25 abr"
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const day = txDate.getDate();
  const month = months[txDate.getMonth()];
  const year = txDate.getFullYear();
  const currentYear = today.getFullYear();
  return year === currentYear ? `${day} ${month}` : `${day} ${month} ${year}`;
}

  });

  const income  = monthTxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense_legacy = monthTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  // Fase 4.2: sumar cuotas que caen en este mes
  const installmentsThisMonth = sumInstallmentsForMonth(y, m);
  const expense = expense_legacy + installmentsThisMonth;
  const balance = income - expense;
  const cardExp_legacy = monthTxs.filter(t=>t.type==='expense'&&t.method==='Tarjeta crédito').reduce((s,t)=>s+t.amount,0);
  const cardExp = cardExp_legacy + installmentsThisMonth;

  // También para mes anterior
  const prevInstallments = sumInstallmentsForMonth(py, pm);
  const prevIncome  = prevMonthTxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const prevExpense = prevMonthTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0) + prevInstallments;

  const incomeChange  = pctChange(income, prevIncome);
  const expenseChange = pctChange(expense, prevExpense);

  // Daily average + projection (only for current month)
  const today = new Date();
  const isCurrentMonth = y === today.getFullYear() && m === today.getMonth();
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const daysElapsed = isCurrentMonth ? today.getDate() : daysInMonth;
  const dailyAvg = daysElapsed > 0 ? expense / daysElapsed : 0;
  const projection = isCurrentMonth ? dailyAvg * daysInMonth : expense;

  // Fase 4.4: usar helper unificado en vez de inline (ya incluye cuotas por categoría)
  const byCat = getMonthExpenseByCat(y, m);
  const topCats = Object.entries(byCat).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const recentTxs = monthTxs.slice(0,6);

  // Backup reminder
  const daysBackup = daysSinceBackup();
  const showReminder = !backupReminderDismissed && transactions.length > 5 &&
    (daysBackup === null || daysBackup > 30);

  return `
  <div class="fade-up">
    ${recurringJustApplied.length > 0 ? `
    <div class="recurring-applied-banner">
      <span class="ricon">🔁</span>
      <div>Se aplicaron movimientos recurrentes: <strong>${recurringJustApplied.join(', ')}</strong></div>
    </div>` : ''}

    ${showReminder ? `
    <div class="backup-reminder">
      <div class="backup-reminder-icon">📦</div>
      <div class="backup-reminder-text">
        ${daysBackup === null
          ? `<strong>Hacé tu primer backup</strong><br>Tenés ${transactions.length} movimientos sin respaldar.`
          : `<strong>Hace ${daysBackup} días</strong> que no hacés backup. Es un buen momento.`}
      </div>
      <button onclick="exportCSVAndMark()">Exportar</button>
      <button class="dismiss" onclick="dismissBackupReminder()">×</button>
    </div>` : ''}

    <!-- Month nav -->
    <div class="month-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <button class="month-label-btn" onclick="openMonthPicker()">
        ${MONTHS_ES[m]} ${y} <span class="chevron">▼</span>
      </button>
      <button onclick="changeMonth(1)">›</button>
    </div>

    <!-- Balance -->
    <div class="cards-grid">
      <div class="card full">
        <div class="card-label">Balance del mes</div>
        <div class="card-amount balance ${shrinkClass(balance)} ${balance>=0?'green':'red'}">${fmtSign(balance, balance>=0?'income':'expense')}</div>
      </div>
      <div class="card">
        <div class="card-label">↑ Ingresos ${incomeChange !== null ? `<span class="comparison ${incomeChange > 0 ? 'up-good' : incomeChange < 0 ? 'down-bad' : 'neutral'}">${fmtPct(incomeChange)}</span>` : ''}</div>
        <div class="card-amount ${shrinkClass(income)} green">${fmt(income)}</div>
      </div>
      <div class="card">
        <div class="card-label">↓ Gastos ${expenseChange !== null ? `<span class="comparison ${expenseChange > 0 ? 'up-bad' : expenseChange < 0 ? 'down-good' : 'neutral'}">${fmtPct(expenseChange)}</span>` : ''}</div>
        <div class="card-amount ${shrinkClass(expense)} red">${fmt(expense)}</div>
      </div>
    </div>

    ${expense > 0 ? `
    <!-- Mini stats: daily avg + projection -->
    <div class="mini-stats">
      <div class="mini-stat">
        <div class="mini-stat-label">📊 Promedio diario</div>
        <div class="mini-stat-value">${fmt(dailyAvg)}</div>
        <div class="mini-stat-sub">Día ${daysElapsed} de ${daysInMonth}</div>
      </div>
      <div class="mini-stat">
        <div class="mini-stat-label">🔮 ${isCurrentMonth ? 'Proyección fin de mes' : 'Total del mes'}</div>
        <div class="mini-stat-value">${fmt(projection)}</div>
        <div class="mini-stat-sub">${isCurrentMonth ? 'A este ritmo' : 'Cerrado'}</div>
      </div>
    </div>` : ''}

    ${(() => {
      // ── Fase 7: Insights automáticos ──────────────────────────
      if (transactions.length < 5 && CARD_PURCHASES.length === 0) return ''; // no hay datos suficientes
      const insights = generateInsights();
      if (insights.length === 0) return '';
      return `
      <div class="section insights-section">
        <div class="section-title">💡 Observaciones</div>
        ${insights.map(ins => `
          <div class="insight-row ${ins.type}" ${ins.action ? `onclick="${ins.action}" style="cursor:pointer"` : ''}>
            <span class="insight-icon">${ins.icon}</span>
            <span class="insight-text">${ins.text}</span>
          </div>`).join('')}
      </div>`;
    })()}

    <!-- Credit card -->
    <div class="credit-highlight">
      <div class="credit-left">
        <span class="credit-icon">💳</span>
        <div>
          <div class="credit-title">Tarjeta de crédito</div>
          <div class="credit-sub">Gastos del mes</div>
        </div>
      </div>
      <div class="card-amount orange ${shrinkClass(cardExp)}">${fmt(cardExp)}</div>
    </div>

    ${(() => {
      const activeBudgets = Object.entries(budgets);
      if (activeBudgets.length === 0) return '';
      const alerts = activeBudgets.filter(([catId, total]) => {
        const sp = byCat[catId] || 0;
        return sp >= total * 0.8;
      });
      if (alerts.length === 0) return '';
      return `
      <div class="section">
        <div class="section-title">🎯 Estado de presupuestos</div>
        ${alerts.slice(0, 4).map(([catId, total]) => {
          const cat = getCat(catId);
          const sp = byCat[catId] || 0;
          const pct = (sp / total) * 100;
          const cls = pct >= 100 ? 'danger' : 'warn';
          return `
          <div style="margin-bottom:12px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
              <span style="font-size:13px">${cat.icon} ${cat.label}</span>
              <span style="font-family:'DM Mono',monospace;font-size:11px;font-weight:700" class="budget-pct ${cls}">${Math.round(pct)}%</span>
            </div>
            <div class="budget-bar"><div class="budget-bar-fill ${cls}" style="width:${Math.min(pct, 100)}%"></div></div>
            <div style="font-size:10px;color:var(--muted);margin-top:3px;text-align:right;font-family:'DM Mono',monospace">
              ${fmt(sp)} / ${fmt(total)}
            </div>
          </div>`;
        }).join('')}
        ${activeBudgets.length > alerts.length ? `
        <button onclick="showView('budgets')" style="width:100%;margin-top:6px;padding:8px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--purple-light);font-family:inherit;font-size:12px;cursor:pointer">
          Ver todos los presupuestos →
        </button>` : ''}
      </div>`;
    })()}

    ${topCats.length > 0 ? `
    <!-- Top categories -->
    <div class="section">
      <div class="section-title">🏆 Mayores gastos</div>
      ${topCats.map(([catId, amount]) => {
        const cat = getCat(catId);
        const pct = expense > 0 ? (amount/expense)*100 : 0;
        return `
        <div class="cat-row">
          <div class="cat-icon-wrap">${cat.icon}</div>
          <div class="cat-name">${cat.label}</div>
          <div class="cat-bar-wrap">
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
            <div class="cat-amount-sm">${fmt(amount)}</div>
          </div>
        </div>`;
      }).join('')}
    </div>` : ''}

    ${recentTxs.length > 0 ? `
    <!-- Recent -->
    <div class="section">
      <div class="section-title">🕐 Últimos movimientos</div>
      ${recentTxs.map(tx => txRow(tx, false)).join('')}
    </div>` : `
    <div class="empty">
      <div class="emoji">📭</div>
      <p style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px">${transactions.length === 0 ? '¡Bienvenido a MiEconomía!' : 'Sin movimientos este mes'}</p>
      <p style="font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:18px">${transactions.length === 0
        ? 'Empezá registrando tus ingresos y gastos.<br>Todo se guarda automáticamente.'
        : 'Tocá el botón <strong style="color:var(--purple-light)">+</strong> para agregar uno.'}</p>
      <button class="btn-add" onclick="showView('add')">+ Agregar movimiento</button>
      ${transactions.length === 0 ? `
      <p style="font-size:11px;color:var(--muted);margin-top:18px;line-height:1.6">
        💡 Tip: configurá tus <strong style="color:var(--purple-light);cursor:pointer" onclick="showView('recurring')">gastos recurrentes</strong> en Ajustes<br>
        para no tener que cargarlos cada mes.
      </p>` : ''}
    </div>`}

    ${(() => {
      // ── Fase 4.6: Recordatorios de vencimiento y alertas de límite ───────
      const now = new Date();
      const alerts = [];

      for (const card of CARDS) {
        if (card.active === false) continue;

        // Recordatorio: algún resumen de los próximos 3 meses con vencimiento cercano
        for (let i = 0; i < 3; i++) {
          const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
          const y = d.getFullYear(), m = d.getMonth();
          const items = getInstallmentsForMonth(card, y, m);
          if (items.length === 0) continue;
          const due = getDueDate(card, y, m);
          if (!due) continue;
          const paid = isSummaryPaidDirect(card.id, y, m);
          if (paid) continue;
          const daysLeft = Math.ceil((due - now) / 86400000);
          const reminderDays = card.reminderDays || 3;
          if (daysLeft >= 0 && daysLeft <= reminderDays) {
            const total = items.reduce((s, it) => s + it.amount, 0);
            const urgency = daysLeft === 0 ? 'hoy' : daysLeft === 1 ? 'mañana' : `en ${daysLeft} días`;
            alerts.push(`<div class="reminder-alert" onclick="showSummaryDetail('${card.id}',${y},${m})">
              <span style="font-size:16px">${card.emoji}</span>
              <div class="reminder-text">
                <strong>${card.name}</strong> vence ${urgency}
                <span class="reminder-amount">−${fmt(total)}</span>
              </div>
              <span style="color:var(--muted);font-size:16px">›</span>
            </div>`);
          }
        }

        // Límite: si el resumen actual supera el 80%
        if (card.creditLimit) {
          const items = getInstallmentsForMonth(card, now.getFullYear(), now.getMonth());
          const used = items.reduce((s, i) => s + i.amount, 0);
          const pct = Math.round((used / card.creditLimit) * 100);
          if (pct >= 80) {
            const cls = pct >= 100 ? 'danger' : 'warn';
            alerts.push(`<div class="limit-alert ${cls}" onclick="showView('cards')">
              <span style="font-size:16px">${card.emoji}</span>
              <div class="reminder-text">
                <strong>${card.name}</strong> al ${pct}% del límite
                <span class="reminder-amount">${fmt(used)} / ${fmt(card.creditLimit)}</span>
              </div>
            </div>`);
          }
        }
      }

      if (alerts.length === 0) return '';
      return `<div class="section" style="padding-top:0">${alerts.join('')}</div>`;
    })()}

    ${(() => {
      // ── Fase 4.5: Próximos resúmenes ─────────────────────────
      const upcoming = getUpcomingSummaries(3);
      if (upcoming.length === 0) return '';
      return `
      <div class="section upcoming-section">
        <div class="section-title">📅 Se viene en tarjetas</div>
        ${upcoming.map(u => {
          const monthName = MONTHS_ES[u.month];
          const isCurrentMonth = u.year === y && u.month === m;
          return `
          <div class="upcoming-month">
            <div class="upcoming-month-header">
              <span class="upcoming-month-label">${monthName} ${u.year}${isCurrentMonth ? ' · actual' : ''}</span>
              <span class="upcoming-month-total">−${fmt(u.grandTotal)}</span>
            </div>
            ${u.cards.map(c => {
              const dueText = c.due
                ? `vence ${c.due.getDate()} ${MONTHS_ES[c.due.getMonth()].toLowerCase().slice(0,3)}`
                : 'venc. manual';
              const overdue = c.due && c.due < new Date() && !c.paid;
              return `
              <div class="upcoming-card-row ${c.paid ? 'paid' : ''} ${overdue ? 'overdue' : ''}"
                onclick="showSummaryDetail('${c.card.id}', ${u.year}, ${u.month})">
                <span style="font-size:16px">${c.card.emoji}</span>
                <div class="upcoming-card-info">
                  <div class="upcoming-card-name">${c.card.name}${c.paid ? ' <span class="summary-paid-badge">✓</span>' : ''}</div>
                  <div class="upcoming-card-meta">${dueText}${overdue ? ' · <span style="color:var(--red)">vencido</span>' : ''}</div>
                </div>
                <div class="upcoming-card-amount">−${fmt(c.total)}</div>
              </div>`;
            }).join('')}
          </div>`;
        }).join('')}
      </div>`;
    })()}

    ${(() => {
      // ── Fase 4.5: Cuotas activas ──────────────────────────────
      const active = getActivePurchases();
      if (active.length === 0) return '';
      const shown = active.slice(0, 4);
      return `
      <div class="section">
        <div class="section-title">🔄 Compras en cuotas</div>
        ${shown.map(({ purchase: p, card, paid, remaining, total }) => {
          const cat = getCat(p.category);
          const pct = Math.round((paid / total) * 100);
          const perInst = p.totalAmount / total;
          return `
          <div class="active-purchase-row" onclick="showCardPurchaseDetail(${p.id})">
            <div class="active-purchase-top">
              <span class="active-cat-icon">${cat.icon}</span>
              <div class="active-purchase-info">
                <div class="active-purchase-desc">${p.description || cat.label}</div>
                <div class="active-purchase-meta">${card.emoji} ${card.name} · ${remaining}/${total} cuotas restantes · ${fmt(perInst)}/mes</div>
              </div>
            </div>
            <div class="active-progress-wrap">
              <div class="active-progress-bar">
                <div class="active-progress-fill" style="width:${pct}%"></div>
              </div>
              <span class="active-progress-pct">${pct}%</span>
            </div>
          </div>`;
        }).join('')}
        ${active.length > 4 ? `
        <div style="text-align:center;margin-top:8px">
          <button onclick="showView('history')" style="font-size:12px;color:var(--purple-light);background:none;border:none;cursor:pointer;font-family:inherit">
            +${active.length - 4} más en historial →
          </button>
        </div>` : ''}
      </div>`;
    })()}
  </div>`;
}

function changeMonth(delta) {
  viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() + delta, 1);
  render();
}

function dismissBackupReminder() {
  backupReminderDismissed = true;
  render();
}

function exportCSVAndMark() {
  exportCSV();
  setLastBackup();
  backupReminderDismissed = true;
}

// ── MONTH PICKER ──────────────────────────────────────────────────────────
let pickerYear = null;

function openMonthPicker() {
  pickerYear = viewDate.getFullYear();
  renderMonthPicker();
}

function renderMonthPicker() {
  const today = new Date();
  const todayY = today.getFullYear(), todayM = today.getMonth();
  const currentY = viewDate.getFullYear(), currentM = viewDate.getMonth();

  const html = `
    <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">📅 Seleccionar mes</div>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="year-nav">
          <button onclick="changePickerYear(-1)">‹</button>
          <span class="year-display">${pickerYear}</span>
          <button onclick="changePickerYear(1)">›</button>
        </div>
        <div class="month-grid">
          ${MONTHS_ES.map((mo, i) => {
            const isCurrent = pickerYear === currentY && i === currentM;
            const isToday = pickerYear === todayY && i === todayM;
            const cls = isCurrent ? 'current' : isToday ? 'today' : '';
            return `<button class="month-cell ${cls}" onclick="selectMonth(${i})">${mo.slice(0,3)}</button>`;
          }).join('')}
        </div>
      </div>
    </div>
  `;
  document.getElementById('modal-container').innerHTML = html;
}

function changePickerYear(delta) {
  pickerYear += delta;
  renderMonthPicker();
}

function selectMonth(monthIdx) {
  viewDate = new Date(pickerYear, monthIdx, 1);
  closeModal();
  render();
}

function closeModal() {
  document.getElementById('modal-container').innerHTML = '';
}

// ── CUSTOM CONFIRM MODAL ──────────────────────────────────────────────────
function showConfirm(title, desc, onConfirm, options = {}) {
  const {
    icon = '⚠️',
    confirmText = 'Eliminar',
    cancelText = 'Cancelar',
    primary = false  // true = purple confirm button, false = red (destructive)
  } = options;

  const html = `
    <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
      <div class="modal confirm-modal">
        <div class="confirm-icon">${icon}</div>
        <div class="confirm-title">${title}</div>
        <div class="confirm-desc">${desc}</div>
        <div class="confirm-actions">
          <button class="confirm-cancel" onclick="closeModal()">${cancelText}</button>
          <button class="confirm-confirm ${primary ? 'primary' : ''}" id="confirm-btn">${confirmText}</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('modal-container').innerHTML = html;
  document.getElementById('confirm-btn').onclick = () => {
    closeModal();
    onConfirm();
  };
}

// ── TX ROW ────────────────────────────────────────────────────────────────
function txRow(tx, showDelete = true) {
  const cat = getCat(tx.category);
  const meth = getMethod(tx.method);
  const color = tx.type === 'income' ? 'green' : 'red';
  const desc = tx.description || cat.label;
  const hasLongDesc = desc.length > 35 || desc.includes('\n');
  const tags = tx.tags && tx.tags.length > 0 ? `
    <div class="tx-tags">
      ${tx.tags.map(t => `<span class="tx-tag-mini">#${t}</span>`).join('')}
    </div>
  ` : '';
  const isAuto = tx.description && tx.description.includes('(auto)');

  // Fase 6: mostrar monto ajustado por inflación y badge de moneda extranjera
  const displayAmount = fmtReal(tx.amount, tx.date);
  const isInflationAdjusted = settingsFlags.adjustForInflation && Object.keys(IPC_DATA).length > 0;
  const currencyBadge = tx.currency && tx.currency !== 'ARS'
    ? `<span class="currency-badge">${tx.originalAmount ? tx.originalAmount.toLocaleString('es-AR') : ''} ${tx.currency.replace('USD_', 'USD ')}</span>`
    : '';
  const inflationBadge = isInflationAdjusted && tx.date
    ? `<span class="inflation-badge" title="Ajustado por inflación">★ real</span>`
    : '';

  return `
  <div class="tx-row" onclick="${isAuto ? `showToast('Movimientos autom\u00e1ticos no se editan, solo se borran', 'error')` : `editTransaction(${tx.id})`}" style="cursor:pointer">
    <span class="tx-icon">${cat.icon}</span>
    <div class="tx-info">
      <div class="tx-desc" ${hasLongDesc ? 'style="white-space:normal;line-height:1.35"' : ''}>${desc.replace(/\n/g, '<br>')}${currencyBadge}</div>
      <div class="tx-meta">${meth.icon} ${tx.method} · ${fmtRelativeDate(tx.date)} · ${cat.label}</div>
      ${tags}
    </div>
    <div class="tx-right">
      <div class="tx-amount ${color}">${tx.type === 'income' ? '+' : '−'}${displayAmount}${inflationBadge}</div>
      ${showDelete ? `<button class="btn-delete" onclick="event.stopPropagation(); deleteTx(${tx.id})">✕</button>` : ''}
    </div>
  </div>`;
}

// ── SUMMARY ROW (Fase 4.3) ────────────────────────────────────────────────
// Fila colapsada: una línea por tarjeta por mes. Toca → modal de detalle.
function summaryRow(r) {
  const monthName = MONTHS_ES[r.month];
  const paid = r.paid;
  const dueText = r.due
    ? `vence ${r.due.getDate()} ${MONTHS_ES[r.due.getMonth()].toLowerCase().slice(0, 3)}`
    : 'vencimiento manual';

  return `
  <div class="tx-row summary-row ${paid ? 'summary-paid' : ''}"
    style="border-left-color:${r.card.color}"
    onclick="showSummaryDetail('${r.card.id}', ${r.year}, ${r.month})">
    <span class="tx-icon">${r.card.emoji}</span>
    <div class="tx-info">
      <div class="tx-desc">
        ${r.card.name}
        ${paid ? '<span class="summary-paid-badge">✓ pagado</span>' : ''}
      </div>
      <div class="tx-meta">Resumen ${monthName} ${r.year} · ${dueText} · ${r.items.length} compra${r.items.length !== 1 ? 's' : ''}</div>
    </div>
    <div class="tx-right">
      <div class="tx-amount red">−${fmt(r.total)}</div>
      <span class="summary-chevron">›</span>
    </div>
  </div>`;
}

// Devuelve un array de "filas virtuales" (cuotas) para mostrar en el historial.
// Cada cuota se ubica en el mes donde cae su vencimiento, no en la fecha de compra.
// Filtra por type/tag/search reusando los mismos predicados que las txs.
// Fase 4.3: devuelve UNA fila por (tarjeta × mes) con el total de ese resumen.
// Antes (4.2): una fila por cuota individual. Ahora: una fila colapsada que
// al tocarse abre el modal de detalle del resumen.
function buildInstallmentRowsForHistory() {
  const rows = [];
  if (CARD_PURCHASES.length === 0) return rows;

  // Recolectar todos los (cardId, year, month) únicos que tienen cuotas
  const seen = new Set();
  for (const p of CARD_PURCHASES) {
    const card = getCard(p.cardId);
    if (!card) continue;
    const first = getFirstSummaryMonth(p.purchaseDate, card.closingDay);
    if (!first) continue;
    for (let i = 0; i < p.installments; i++) {
      const ym = addMonths(first, i);
      seen.add(`${p.cardId}|${ym.year}|${ym.month}`);
    }
  }

  for (const key of seen) {
    const [cardId, yearStr, monthStr] = key.split('|');
    const year = Number(yearStr), month = Number(monthStr);
    const card = getCard(cardId);
    if (!card) continue;

    const items = getInstallmentsForMonth(card, year, month);
    const total = items.reduce((s, i) => s + i.amount, 0);
    const due = getDueDate(card, year, month);
    const sortDate = due
      ? `${due.getFullYear()}-${String(due.getMonth() + 1).padStart(2, '0')}-${String(due.getDate()).padStart(2, '0')}`
      : `${year}-${String(month + 1).padStart(2, '0')}-15`;
    const paid = isSummaryPaidDirect(cardId, year, month);

    // Para que funcionen los filtros de búsqueda
    const allDescriptions = items.map(i => i.purchase.description || '').join(' ');
    const allTags = [...new Set(items.flatMap(i => i.purchase.tags || []))];
    const allCategories = [...new Set(items.map(i => i.purchase.category))];

    rows.push({
      _kind: 'summary',
      _sortDate: sortDate,
      card, year, month, total, paid, due, items,
      // predicados de filtro compatibles con el merge de renderHistory
      type: 'expense',
      method: 'Tarjeta crédito',
      category: allCategories[0] || 'tarjeta',
      description: allDescriptions,
      tags: allTags,
      date: sortDate,
      amount: total,
      amount_searchable: Math.round(total).toString()
    });
  }

  return rows;
}

// ── SUMMARY DETAIL MODAL (Fase 4.3) ───────────────────────────────────────
// Modal principal de 4.3: detalle de un resumen por tarjeta y mes.
// Muestra todas las compras con sus cuotas, total, vencimiento y "Marcar pagado".
function showSummaryDetail(cardId, year, month) {
  const card = getCard(cardId);
  if (!card) return;

  const items = getInstallmentsForMonth(card, year, month);
  const total = items.reduce((s, i) => s + i.amount, 0);
  const due = getDueDate(card, year, month);
  const paid = isSummaryPaidDirect(cardId, year, month);
  const monthName = MONTHS_ES[month];

  const dueText = due
    ? `${due.getDate()} ${MONTHS_ES[due.getMonth()]} ${due.getFullYear()}`
    : 'Vencimiento manual';

  // Agrupado por compra para mostrar descripción + cuota X/Y
  const byPurchase = {};
  for (const it of items) {
    const pid = it.purchase.id;
    if (!byPurchase[pid]) byPurchase[pid] = { purchase: it.purchase, installmentNum: it.installmentNum, installmentTotal: it.installmentTotal, amount: 0 };
    byPurchase[pid].amount += it.amount;
  }
  const purchaseRows = Object.values(byPurchase);

  const html = `
    <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
      <div class="modal" style="max-width:400px;max-height:90vh;overflow-y:auto">
        <div class="modal-header">
          <div class="modal-title" style="color:${card.color}">${card.emoji} ${card.name}</div>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>

        <div class="sum-header">
          <div class="sum-month">Resumen ${monthName} ${year}</div>
          <div class="sum-meta">
            Cierre ${card.closingDay} ${monthName.toLowerCase()} ·
            ${due ? `Vence ${dueText}` : 'Vencimiento manual'}
          </div>
          ${paid ? `<div class="sum-paid-banner">✓ Marcado como pagado</div>` : ''}
        </div>

        <!-- Lista de compras del resumen -->
        <div class="sum-purchases">
          ${purchaseRows.length === 0
            ? `<div style="color:var(--muted);font-size:13px;text-align:center;padding:16px">Sin compras en este resumen</div>`
            : purchaseRows.map(row => {
                const cat = getCat(row.purchase.category);
                const desc = row.purchase.description || cat.label;
                const isMulti = row.installmentTotal > 1;
                return `
                  <div class="sum-purchase-row" onclick="showCardPurchaseDetail(${row.purchase.id})">
                    <span class="sum-cat-icon">${cat.icon}</span>
                    <div class="sum-purchase-info">
                      <div class="sum-purchase-desc">${desc}${isMulti ? ` <span class="installment-badge">${row.installmentNum}/${row.installmentTotal}</span>` : ''}</div>
                      <div class="sum-purchase-meta">${fmtRelativeDate(row.purchase.purchaseDate)} · ${cat.label}</div>
                    </div>
                    <div class="sum-purchase-amount">−${fmt(row.amount)}</div>
                  </div>
                `;
              }).join('')
          }
        </div>

        <!-- Total y acción de pago -->
        <div class="sum-total-row">
          <span>Total resumen</span>
          <span class="sum-total-amount">−${fmt(total)}</span>
        </div>

        <div class="form-actions" style="margin-top:14px">
          ${paid
            ? `<button class="btn-cancel" onclick="toggleSummaryPaid('${cardId}',${year},${month},${total},false)">↩ Desmarcar</button>`
            : `<button class="btn-save" style="flex:1" onclick="toggleSummaryPaid('${cardId}',${year},${month},${total},true)">✓ Marcar como pagado</button>`
          }
          <button class="btn-cancel" onclick="closeModal()">Cerrar</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('modal-container').innerHTML = html;
}

function toggleSummaryPaid(cardId, year, month, amount, markAsPaid) {
  if (markAsPaid) {
    markSummaryPaid(cardId, year, month, amount);
    showToast('Resumen marcado como pagado');
  } else {
    unmarkSummaryPaid(cardId, year, month);
    showToast('Desmarcado');
  }
  // Re-abrir el modal con el estado actualizado
  showSummaryDetail(cardId, year, month);
  render();
}

// ── CARD PURCHASE DETAIL MODAL (actualizado Fase 4.3) ─────────────────────
// Accesible desde showSummaryDetail. Ahora incluye botón de edición.
function showCardPurchaseDetail(purchaseId) {
  const p = CARD_PURCHASES.find(x => x.id === purchaseId);
  if (!p) return;
  const card = getCard(p.cardId);
  const cat = getCat(p.category);
  if (!card) {
    showToast('La tarjeta de esta compra fue eliminada', 'error');
    return;
  }

  const first = getFirstSummaryMonth(p.purchaseDate, card.closingDay);
  const perInst = p.totalAmount / p.installments;
  const remaining = getRemainingInstallments(p);
  const remainingAmount = perInst * remaining;

  const now = new Date();
  const nowYM = { year: now.getFullYear(), month: now.getMonth() };
  const installmentsList = [];
  for (let i = 0; i < p.installments; i++) {
    const ym = addMonths(first, i);
    const due = getDueDate(card, ym.year, ym.month);
    const monthsToNow = (nowYM.year - ym.year) * 12 + (nowYM.month - ym.month);
    let status = 'future';
    if (monthsToNow > 0) status = 'past';
    else if (monthsToNow === 0) status = 'current';
    installmentsList.push({ num: i + 1, ym, due, status });
  }

  const tagsHtml = p.tags && p.tags.length > 0
    ? `<div class="cpd-tags">${p.tags.map(t => `<span class="tx-tag-mini">#${t}</span>`).join('')}</div>`
    : '';

  const html = `
    <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
      <div class="modal" style="max-width:400px;max-height:90vh;overflow-y:auto">
        <div class="modal-header">
          <div class="modal-title">${cat.icon} Compra con tarjeta</div>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>

        <div class="cpd-card" style="border-left-color:${card.color}">
          <div class="cpd-card-row">
            <span class="cpd-emoji">${card.emoji}</span>
            <div>
              <div class="cpd-card-name">${card.name}</div>
              <div class="cpd-card-meta">Cierre día ${card.closingDay} · ${cardDueText(card)}</div>
            </div>
          </div>
        </div>

        ${p.description ? `<div class="cpd-desc">${p.description.replace(/\n/g, '<br>')}</div>` : ''}
        ${p.noInterest ? `<div class="msi-badge">💚 Sin interés (MSI)</div>` : ''}
        ${tagsHtml}

        <div class="cpd-grid">
          <div class="cpd-cell">
            <div class="cpd-label">Total</div>
            <div class="cpd-value">${fmt(p.totalAmount)}</div>
          </div>
          <div class="cpd-cell">
            <div class="cpd-label">Cuotas</div>
            <div class="cpd-value">${p.installments}x ${fmt(perInst)}</div>
          </div>
          <div class="cpd-cell">
            <div class="cpd-label">Comprado</div>
            <div class="cpd-value">${fmtRelativeDate(p.purchaseDate)}</div>
          </div>
          <div class="cpd-cell">
            <div class="cpd-label">Restante</div>
            <div class="cpd-value">${remaining}/${p.installments} · ${fmt(remainingAmount)}</div>
          </div>
        </div>

        <div class="cpd-section-title">Desglose de cuotas</div>
        <div class="cpd-installments">
          ${installmentsList.map(it => `
            <div class="cpd-inst ${it.status}">
              <div class="cpd-inst-num">${it.num}</div>
              <div class="cpd-inst-info">
                <div class="cpd-inst-month">${MONTHS_ES[it.ym.month]} ${it.ym.year}</div>
                <div class="cpd-inst-due">${it.due ? `Vence ${it.due.getDate()} ${MONTHS_ES[it.due.getMonth()].toLowerCase().slice(0,3)}` : 'Vencimiento manual'}</div>
              </div>
              <div class="cpd-inst-amount">${fmt(perInst)}</div>
            </div>
          `).join('')}
        </div>

        <div class="form-actions" style="margin-top:14px">
          <button class="btn-cancel" onclick="closeModal()">Cerrar</button>
          <button class="btn-secondary" onclick="openEditPurchase(${p.id})">✏️ Editar</button>
          <button class="btn-delete" onclick="deleteCardPurchase(${p.id})">🗑️</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('modal-container').innerHTML = html;
}

function deleteCardPurchase(purchaseId) {
  const p = CARD_PURCHASES.find(x => x.id === purchaseId);
  if (!p) return;
  showConfirm(
    '¿Eliminar esta compra?',
    `Se borrarán todas las cuotas asociadas (${p.installments} en total). Esta acción no se puede deshacer.`,
    () => {
      CARD_PURCHASES = CARD_PURCHASES.filter(x => x.id !== purchaseId);
      saveCardPurchasesToStorage();
      closeModal();
      showToast('Compra eliminada');
      render();
    }
  );
}

// ── EDICIÓN DE COMPRAS CON TARJETA (Fase 4.3) ─────────────────────────────
let editPurchaseState = null;

function openEditPurchase(purchaseId) {
  const p = CARD_PURCHASES.find(x => x.id === purchaseId);
  if (!p) return;

  editPurchaseState = {
    id: p.id,
    cardId: p.cardId,
    purchaseDate: p.purchaseDate,
    totalAmount: p.totalAmount.toString(),
    installments: p.installments,
    category: p.category,
    description: p.description || '',
    tags: [...(p.tags || [])]
  };
  renderEditPurchaseModal();
}

function renderEditPurchaseModal() {
  const st = editPurchaseState;
  if (!st) return;
  const activeCards = CARDS.filter(c => c.active !== false);
  const cats = CATEGORIES.expense;
  const installmentsOptions = [1, 2, 3, 6, 9, 12, 18, 24];

  const html = `
    <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
      <div class="modal" style="max-width:380px;max-height:90vh;overflow-y:auto">
        <div class="modal-header">
          <div class="modal-title">✏️ Editar compra</div>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>

        <label>Tarjeta</label>
        <select id="ep-card" onchange="editPurchaseState.cardId=this.value">
          ${activeCards.map(c => `
            <option value="${c.id}" ${st.cardId===c.id?'selected':''}>
              ${c.emoji} ${c.name} · cierre ${c.closingDay}
            </option>
          `).join('')}
        </select>

        <label>Monto total</label>
        <input type="number" id="ep-amount" value="${st.totalAmount}"
          placeholder="0" inputmode="decimal"
          oninput="editPurchaseState.totalAmount=this.value" />

        <label>Cuotas</label>
        <div class="installments-grid">
          ${installmentsOptions.map(n => `
            <button class="inst-btn ${st.installments===n?'active':''}"
              onclick="editPurchaseState.installments=${n}; renderEditPurchaseModal()">${n===1?'1 pago':n+'x'}</button>
          `).join('')}
        </div>

        <label>Categoría</label>
        <div class="cat-grid" style="margin-bottom:10px">
          ${cats.map(cat => `
            <button class="cat-btn ${st.category===cat.id?'active':''}"
              onclick="editPurchaseState.category='${cat.id}'; renderEditPurchaseModal()">
              ${cat.icon}
              <span class="cat-lbl">${cat.label}</span>
            </button>`).join('')}
        </div>

        <label>Descripción <span style="color:var(--muted);text-transform:none;font-size:10px">(opcional)</span></label>
        <textarea id="ep-desc" placeholder="Descripción de la compra"
          oninput="editPurchaseState.description=this.value">${st.description}</textarea>

        <label>Fecha de compra</label>
        <input type="date" id="ep-date" value="${st.purchaseDate}"
          onchange="editPurchaseState.purchaseDate=this.value" />

        <div class="form-actions" style="margin-top:14px">
          <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
          <button class="btn-save" onclick="saveEditPurchase()">💾 Guardar</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('modal-container').innerHTML = html;
}

function saveEditPurchase() {
  const st = editPurchaseState;
  if (!st) return;

  const amount = parseFloat(st.totalAmount);
  if (!amount || isNaN(amount) || amount <= 0) {
    showToast('Ingresá un monto válido', 'error');
    return;
  }
  const card = getCard(st.cardId);
  if (!card) { showToast('Tarjeta no válida', 'error'); return; }

  const first = getFirstSummaryMonth(st.purchaseDate, card.closingDay);
  const firstStr = first ? `${first.year}-${String(first.month + 1).padStart(2, '0')}` : null;

  const idx = CARD_PURCHASES.findIndex(p => p.id === st.id);
  if (idx < 0) { showToast('Compra no encontrada', 'error'); return; }

  CARD_PURCHASES[idx] = {
    ...CARD_PURCHASES[idx],
    cardId: st.cardId,
    purchaseDate: st.purchaseDate,
    totalAmount: amount,
    installments: Math.max(1, parseInt(st.installments) || 1),
    category: st.category,
    description: st.description.trim(),
    tags: st.tags || [],
    firstInstallmentMonth: firstStr
  };
  saveCardPurchasesToStorage();
  editPurchaseState = null;
  closeModal();
  showToast('Compra actualizada');
  render();
}

// ── HISTORY ───────────────────────────────────────────────────────────────
function renderHistory() {
  // Fase 4.2: combinar txs legacy con cuotas virtuales calculadas desde card_purchases
  const txRows = transactions.map(t => ({ ...t, _kind: 'tx', _sortDate: t.date }));
  const installmentRows = buildInstallmentRowsForHistory();
  let combined = [...txRows, ...installmentRows];

  // Filtros (aplicables a ambos tipos)
  combined = combined.filter(r => histFilter === 'all' || r.type === histFilter);

  if (tagFilter) {
    combined = combined.filter(r => r.tags && r.tags.includes(tagFilter));
  }

  const q = searchQuery.trim().toLowerCase();
  if (q) {
    combined = combined.filter(r => {
      const cat = getCat(r.category);
      const inAmount = r._kind === 'installment'
        ? r.amount_searchable.includes(q)
        : r.amount.toString().includes(q);
      return (
        (r.description || '').toLowerCase().includes(q) ||
        cat.label.toLowerCase().includes(q) ||
        (r.method || '').toLowerCase().includes(q) ||
        inAmount ||
        (r.date || '').includes(q) ||
        (r.tags || []).some(tag => tag.includes(q))
      );
    });
  }

  // Ordenar por fecha desc (cuotas usan la fecha del vencimiento del resumen)
  combined.sort((a, b) => {
    if (a._sortDate < b._sortDate) return 1;
    if (a._sortDate > b._sortDate) return -1;
    // Tie: txs antes que cuotas
    if (a._kind !== b._kind) return a._kind === 'tx' ? -1 : 1;
    return 0;
  });

  const allTags = getAllUsedTags();

  return `
  <div class="fade-up">
    <div class="search-wrap">
      <span class="search-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg></span>
      <input type="text" class="search-input" id="search-input"
        placeholder="Buscar por descripción, monto, categoría..."
        value="${searchQuery.replace(/"/g, '&quot;')}"
        oninput="updateSearch(this.value)" />
      ${searchQuery ? `<button class="search-clear" onclick="clearSearch()">✕</button>` : ''}
    </div>

    <div class="filter-row">
      <button class="filter-btn ${histFilter==='all'?'active':''}" onclick="setFilter('all')">Todo</button>
      <button class="filter-btn ${histFilter==='income'?'active':''}" onclick="setFilter('income')">Ingresos</button>
      <button class="filter-btn ${histFilter==='expense'?'active':''}" onclick="setFilter('expense')">Gastos</button>
    </div>

    ${allTags.length > 0 ? `
    <div class="tag-filter-row">
      <button class="tag-filter-btn ${tagFilter==='' ? 'active' : ''}" onclick="setTagFilter('')">Todas</button>
      ${allTags.map(t => `
        <button class="tag-filter-btn ${tagFilter===t ? 'active' : ''}" onclick="setTagFilter('${t.replace(/'/g, "\\'")}')">#${t}</button>
      `).join('')}
    </div>` : ''}

    ${q || tagFilter ? `<div class="search-results-info">${combined.length} resultado${combined.length !== 1 ? 's' : ''}${q ? ` para "${q}"` : ''}${tagFilter ? ` con etiqueta #${tagFilter}` : ''}</div>` : ''}

    <div class="section">
      ${combined.length === 0
        ? `<div class="empty"><div class="emoji">🔍</div><p>${q || tagFilter ? 'No se encontraron movimientos.' : 'No hay movimientos aquí.'}</p></div>`
        : combined.map(r => r._kind === 'summary' ? summaryRow(r) : txRow(r, true)).join('')
      }
    </div>
  </div>`;
}

function setFilter(f) { histFilter = f; render(); }
function setTagFilter(t) { tagFilter = t; render(); }
function setChartRange(months) {
  chartRange = months;
  localStorage.setItem('mie_chart_range', months);
  render();
}

function updateSearch(v) {
  searchQuery = v;
  // Re-render but preserve focus
  const main = document.getElementById('main');
  main.innerHTML = renderHistory();
  // Restore focus + cursor at end
  const input = document.getElementById('search-input');
  if (input) {
    input.focus();
    input.setSelectionRange(v.length, v.length);
  }
}

function clearSearch() {
  searchQuery = '';
  render();
}

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f0f13" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MiEconomía" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>MiEconomía</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%237c3aed'/><text y='.9em' font-size='75' x='12'>💰</text></svg>">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script>
    // Init theme ASAP to prevent flash
    (function() {
      const stored = localStorage.getItem('mie_theme');
      const theme = stored || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <script>
    // Register Service Worker (skip on Claude preview)
    if ('serviceWorker' in navigator && !location.hostname.includes('claudeusercontent')) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('SW registered'))
          .catch(err => console.log('SW failed', err));
      });
    }
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root, [data-theme="dark"] {
      --bg: #0f0f13;
      --surface: #1a1a2e;
      --surface2: #16213e;
      --border: #2a2a4a;
      --text: #e8e8f0;
      --muted: #6b7280;
      --purple: #7c3aed;
      --purple-light: #a78bfa;
      --green: #4ade80;
      --red: #f87171;
      --orange: #fb923c;
      --radius: 14px;
      --shadow-color: rgba(0,0,0,0.3);
      --gradient-header-from: #16213e;
      --gradient-header-to: #0d1b2a;
    }

    [data-theme="light"] {
      --bg: #f5f5f9;
      --surface: #ffffff;
      --surface2: #ede9fe;
      --border: #e2e2ee;
      --text: #1a1a2e;
      --muted: #6b7280;
      --purple: #7c3aed;
      --purple-light: #6d28d9;
      --green: #15803d;
      --red: #dc2626;
      --orange: #ea580c;
      --radius: 14px;
      --shadow-color: rgba(0,0,0,0.08);
      --gradient-header-from: #ede9fe;
      --gradient-header-to: #ddd6fe;
    }

    [data-theme="light"] body {
      background: linear-gradient(180deg, #faf5ff, #f5f5f9);
    }
    [data-theme="light"] .header-v2 {
      background: linear-gradient(135deg, var(--gradient-header-from), var(--gradient-header-to));
    }
    [data-theme="light"] .header-v2 .logo { color: var(--purple); }
    [data-theme="light"] .credit-highlight {
      background: linear-gradient(135deg, #faf5ff, #ede9fe);
      border-color: #c4b5fd;
    }
    [data-theme="light"] .credit-card-amount,
    [data-theme="light"] .card-amount.orange { color: #c2410c; }
    [data-theme="light"] .bottom-nav {
      box-shadow: 0 -8px 24px rgba(124, 58, 237, 0.08);
    }
    [data-theme="light"] .toggle-btn.expense-active { background: #fee2e2; color: #dc2626; border-color: #fecaca; }
    [data-theme="light"] .toggle-btn.income-active { background: #dcfce7; color: #166534; border-color: #bbf7d0; }
    [data-theme="light"] .cat-btn.active { background: #ede9fe; border-color: var(--purple); }
    [data-theme="light"] .cat-btn.active .cat-lbl { color: var(--purple); }
    [data-theme="light"] .filter-btn.active { background: #ede9fe; color: var(--purple); }
    [data-theme="light"] .nav-btn.active { color: var(--purple); }
    [data-theme="light"] .month-cell.current { background: #ede9fe; color: var(--purple); }
    [data-theme="light"] .backup-reminder {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border-color: #fcd34d;
    }
    [data-theme="light"] .backup-reminder-text { color: #78350f; }
    [data-theme="light"] .backup-reminder-text strong { color: #92400e; }
    [data-theme="light"] .recurring-applied-banner {
      background: linear-gradient(135deg, #dcfce7, #bbf7d0);
      border-color: #86efac;
      color: #166534;
    }
    [data-theme="light"] .toast { background: var(--surface); color: var(--text); }
    [data-theme="light"] .modal-overlay { background: rgba(0,0,0,0.4); }
    [data-theme="light"] ::-webkit-scrollbar-thumb { background: var(--border); }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    body { display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, var(--surface2) 0%, #0d1b2a 100%);
      border-bottom: 1px solid var(--border);
      padding: 16px 16px 0;
      position: sticky; top: 0; z-index: 100;
    }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .logo { font-size: 19px; font-weight: 700; }
    .logo span { color: var(--purple-light); }

    .btn-add {
      background: linear-gradient(135deg, var(--purple), #a855f7);
      color: #fff; border: none; border-radius: 10px;
      padding: 9px 18px; font-weight: 700; font-size: 14px;
      cursor: pointer; font-family: inherit;
      box-shadow: 0 4px 15px rgba(124,58,237,0.4);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn-add:active { transform: scale(0.96); box-shadow: none; }

    nav { display: flex; }
    .nav-btn {
      flex: 1; padding: 10px 8px; border: none; background: transparent;
      color: var(--muted); font-family: inherit; font-size: 13px; font-weight: 600;
      cursor: pointer; border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    .nav-btn.active { color: var(--purple-light); border-bottom-color: var(--purple-light); }

    /* ── MAIN ── */
    main { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 100px; }

    /* ── CARDS ── */
    .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px;
    }
    .card.full { grid-column: 1 / -1; }
    .card-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
    .card-amount { font-size: 24px; font-weight: 700; font-family: 'DM Mono', monospace; }
    .card-amount.balance { font-size: 32px; }
    .green { color: var(--green); }
    .red { color: var(--red); }
    .orange { color: var(--orange); }
    .purple { color: var(--purple-light); }

    /* Credit card highlight */
    .credit-highlight {
      background: linear-gradient(135deg, #1c1c3a, #2a1a3e);
      border: 1px solid #3a2a5a;
      border-radius: var(--radius); padding: 14px 16px;
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px;
    }
    .credit-left { display: flex; align-items: center; gap: 12px; }
    .credit-icon { font-size: 28px; }
    .credit-title { font-weight: 600; font-size: 14px; }
    .credit-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* ── SECTION ── */
    .section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px; margin-bottom: 14px;
    }
    .section-title {
      font-size: 11px; font-weight: 700; color: var(--purple-light);
      text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 14px;
    }

    /* Category bars */
    .cat-row { display: flex; align-items: center; gap: 8px; margin-bottom: 11px; }
    .cat-row:last-child { margin-bottom: 0; }
    .cat-icon-wrap { font-size: 20px; width: 28px; text-align: center; flex-shrink: 0; }
    .cat-name { font-size: 13px; color: #c4c4d4; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cat-bar-wrap { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .bar-track { width: 55px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .bar-fill { height: 100%; background: linear-gradient(90deg, var(--purple), #f472b6); border-radius: 2px; transition: width 0.5s ease; }
    .cat-amount-sm { font-size: 12px; font-weight: 700; color: var(--red); min-width: 75px; text-align: right; font-family: 'DM Mono', monospace; }

    /* Transactions */
    .tx-row {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 0; border-bottom: 1px solid var(--border);
    }
    .tx-row:last-child { border-bottom: none; padding-bottom: 0; }
    .tx-icon { font-size: 22px; flex-shrink: 0; }
    .tx-info { flex: 1; min-width: 0; }
    .tx-desc { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tx-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .tx-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .tx-amount { font-size: 14px; font-weight: 700; font-family: 'DM Mono', monospace; }
    .btn-delete {
      background: #2d1b1b; border: none; border-radius: 6px;
      color: var(--red); padding: 4px 7px; cursor: pointer;
      font-size: 11px; font-family: inherit;
      transition: background 0.15s;
    }
    .btn-delete:active { background: #5a2a2a; }

    /* ── EMPTY STATE ── */
    .empty { text-align: center; padding: 50px 20px; }
    .empty .emoji { font-size: 52px; margin-bottom: 12px; }
    .empty p { color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 20px; }

    /* ── FORM ── */
    .form-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px;
    }
    .type-toggle { display: flex; gap: 8px; margin-bottom: 4px; }
    .toggle-btn {
      flex: 1; padding: 11px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--bg);
      color: var(--muted); cursor: pointer; font-family: inherit;
      font-weight: 700; font-size: 14px; transition: all 0.15s;
    }
    .toggle-btn.expense-active { background: #2d1b1b; color: var(--red); border-color: #5a2a2a; }
    .toggle-btn.income-active { background: #1b2d1b; color: var(--green); border-color: #2a5a2a; }

    label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin: 16px 0 7px; font-weight: 600; }
    input[type=text], input[type=number], input[type=date], select {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 9px; padding: 11px 13px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none;
      -webkit-appearance: none; appearance: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: var(--purple); }
    input[type=number] { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 600; }

    .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; }
    .cat-btn {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 9px 4px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--bg); color: #9ca3af; cursor: pointer;
      font-size: 20px; font-family: inherit; gap: 3px;
      transition: all 0.15s;
    }
    .cat-btn span.cat-lbl { font-size: 10px; color: var(--muted); text-align: center; line-height: 1.2; }
    .cat-btn.active { background: #2a1a5e; border-color: var(--purple); color: var(--text); }
    .cat-btn.active .cat-lbl { color: var(--purple-light); }

    .form-actions { display: flex; gap: 10px; margin-top: 22px; }
    .btn-cancel {
      background: #2a2a3a; color: var(--muted); border: none;
      border-radius: 10px; padding: 12px 18px; cursor: pointer;
      font-family: inherit; font-weight: 600; font-size: 14px;
      transition: background 0.15s;
    }
    .btn-cancel:active { background: #3a3a4a; }
    .btn-save {
      flex: 1; background: linear-gradient(135deg, var(--purple), #a855f7);
      color: #fff; border: none; border-radius: 10px; padding: 12px;
      font-family: inherit; font-weight: 700; font-size: 15px; cursor: pointer;
      box-shadow: 0 4px 15px rgba(124,58,237,0.4);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn-save:active { transform: scale(0.97); box-shadow: none; }
    .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── FILTER PILLS ── */
    .filter-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .filter-btn {
      padding: 7px 16px; border-radius: 20px; border: 1px solid var(--border);
      background: var(--surface); color: var(--muted); cursor: pointer;
      font-family: inherit; font-size: 13px; font-weight: 600;
      transition: all 0.15s;
    }
    .filter-btn.active { background: #2a1a5e; border-color: var(--purple); color: var(--purple-light); }

    /* ── MONTH SELECTOR ── */
    .month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .month-nav button {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); padding: 6px 12px; cursor: pointer; font-family: inherit; font-size: 16px;
    }
    .month-label { font-weight: 700; font-size: 15px; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: calc(90px + env(safe-area-inset-bottom));
      left: 50%; transform: translateX(-50%) translateY(80px);
      background: #1f2937; color: var(--text); padding: 12px 20px; border-radius: 12px;
      font-size: 14px; font-weight: 500; z-index: 999; border: 1px solid var(--border);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), visibility 0s linear 0.3s;
      white-space: nowrap; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      visibility: hidden;
      pointer-events: none;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      visibility: visible;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), visibility 0s;
    }
    .toast.success { border-color: var(--green); }
    .toast.error { border-color: var(--red); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.3s ease both; }

    .hidden { display: none !important; }

    /* ── BACKUP BUTTONS ── */
    .backup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .backup-btn {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 6px; padding: 16px 8px; border-radius: var(--radius);
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text); cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600;
      transition: all 0.15s;
    }
    .backup-btn:active { transform: scale(0.97); }
    .backup-btn .bico { font-size: 26px; }
    .backup-btn.excel { border-color: #166534; background: #052e16; color: #4ade80; }
    .backup-btn.whatsapp { border-color: #065f46; background: #022c22; color: #34d399; }
    .backup-btn.csv { border-color: #1e3a5f; background: #0c1d3a; color: #60a5fa; }
    .backup-btn.restore { border-color: #44403c; background: #1c1917; color: #d4a27a; }

    /* ── BACKUP REMINDER ── */
    .backup-reminder {
      background: linear-gradient(135deg, #2d2410, #3a2e15);
      border: 1px solid #5c4818;
      border-radius: var(--radius); padding: 12px 14px;
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 14px;
      animation: fadeUp 0.4s ease;
    }
    .backup-reminder-icon { font-size: 22px; flex-shrink: 0; }
    .backup-reminder-text { flex: 1; font-size: 12px; color: #fde68a; line-height: 1.4; }
    .backup-reminder-text strong { color: #fbbf24; }
    .backup-reminder button {
      background: #fbbf24; color: #1c1917; border: none;
      padding: 7px 12px; border-radius: 8px; font-weight: 700;
      cursor: pointer; font-family: inherit; font-size: 11px;
      flex-shrink: 0;
    }
    .backup-reminder .dismiss {
      background: transparent; color: #fde68a; padding: 4px 8px;
      font-size: 16px; opacity: 0.6;
    }

    /* ── COMPARISON BADGE ── */
    .comparison {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 11px; font-weight: 700; padding: 3px 8px;
      border-radius: 100px; margin-left: 6px;
      vertical-align: middle;
    }
    .comparison.up-bad { background: rgba(248,113,113,0.15); color: var(--red); }
    .comparison.down-good { background: rgba(74,222,128,0.15); color: var(--green); }
    .comparison.up-good { background: rgba(74,222,128,0.15); color: var(--green); }
    .comparison.down-bad { background: rgba(248,113,113,0.15); color: var(--red); }
    .comparison.neutral { background: rgba(107,114,128,0.15); color: var(--muted); }

    /* ── MINI STATS ── */
    .mini-stats {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
      margin-bottom: 14px;
    }
    .mini-stat {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 11px 13px;
    }
    .mini-stat-label {
      font-size: 10px; color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.7px; margin-bottom: 4px; font-weight: 600;
    }
    .mini-stat-value {
      font-size: 17px; font-weight: 700; font-family: 'DM Mono', monospace;
      color: var(--text);
    }
    .mini-stat-sub {
      font-size: 10px; color: var(--muted); margin-top: 2px;
    }

    /* ── SEARCH BAR ── */
    .search-wrap { position: relative; margin-bottom: 14px; }
    .search-input {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 11px 38px 11px 38px; color: var(--text);
      font-family: inherit; font-size: 14px; outline: none;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--purple); }
    .search-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 16px; pointer-events: none;
    }
    .search-clear {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      background: var(--border); color: var(--muted); border: none;
      width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
      font-size: 11px; display: flex; align-items: center; justify-content: center;
      font-family: inherit;
    }
    .search-results-info {
      font-size: 11px; color: var(--muted); margin-bottom: 10px;
      padding: 0 4px;
    }

    /* ── MONTH PICKER ── */
    .month-label-btn {
      background: transparent; border: none; color: var(--text);
      font-family: inherit; font-weight: 700; font-size: 15px;
      cursor: pointer; padding: 6px 14px; border-radius: 8px;
      display: flex; align-items: center; gap: 6px;
      transition: background 0.15s;
    }
    .month-label-btn:active { background: var(--surface); }
    .month-label-btn .chevron { font-size: 10px; opacity: 0.6; }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      z-index: 200; display: flex; align-items: center; justify-content: center;
      padding: 20px; animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px; padding: 20px; width: 100%; max-width: 320px;
      animation: modalIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes modalIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .modal-title { font-size: 14px; font-weight: 700; color: var(--purple-light); text-transform: uppercase; letter-spacing: 0.8px; }
    .modal-close {
      background: var(--border); border: none; width: 26px; height: 26px;
      border-radius: 50%; color: var(--text); cursor: pointer; font-size: 14px;
    }
    .year-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px; padding: 4px;
    }
    .year-nav button {
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); padding: 6px 12px; cursor: pointer;
      font-family: inherit; font-size: 16px; min-width: 36px;
    }
    .year-display { font-weight: 700; font-size: 18px; font-family: 'DM Mono', monospace; }
    .month-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
    }
    .month-cell {
      padding: 12px 6px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text); cursor: pointer;
      font-family: inherit; font-size: 13px; font-weight: 600;
      transition: all 0.15s;
    }
    .month-cell.current { background: #2a1a5e; border-color: var(--purple); color: var(--purple-light); }
    .month-cell.today { border-color: var(--green); color: var(--green); }
    .month-cell:active { transform: scale(0.95); }

    /* ── SYSTEM SECTION ── */
    .system-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .system-btn {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 4px; padding: 14px 6px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--bg);
      color: var(--text-dim); cursor: pointer; font-family: inherit;
      font-size: 11px; font-weight: 600;
      transition: all 0.15s;
    }
    .system-btn:active { transform: scale(0.96); }
    .system-btn .sico { font-size: 20px; }
    .system-btn.reload { color: #60a5fa; }
    .system-btn.about { color: #a78bfa; }
    .system-btn.exit { color: #f87171; }

    .about-content {
      text-align: center; padding: 10px 0 4px;
    }
    .about-logo { font-size: 48px; margin-bottom: 8px; }
    .about-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .about-version {
      font-family: 'DM Mono', monospace; font-size: 11px;
      color: var(--purple-light); background: rgba(167,139,250,0.1);
      padding: 3px 10px; border-radius: 100px; display: inline-block;
      margin-bottom: 14px;
    }
    .about-desc { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 16px; }
    .about-link {
      display: block; padding: 10px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text-dim); font-size: 12px;
      text-decoration: none; margin-top: 6px; word-break: break-all;
    }
    .about-link strong { color: var(--purple-light); }

    /* Textarea (notes) */
    textarea {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 9px; padding: 11px 13px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none;
      resize: vertical; min-height: 70px;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--purple); }

    /* ═══════════════════════════════════════════════════════════
       FASE 2 · Rediseño + nuevas features
       ═══════════════════════════════════════════════════════════ */

    /* Reset old header layout */
    body {
      padding-bottom: 80px; /* space for bottom nav */
    }

    /* New simplified header */
    header.header-v2 {
      background: linear-gradient(135deg, var(--surface2) 0%, #0d1b2a 100%);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-v2 .logo {
      font-size: 18px; font-weight: 700; color: var(--text);
      transition: opacity 0.15s;
    }
    .header-v2 .logo:active { opacity: 0.6; }
    .header-v2 .logo span { color: var(--purple-light); }
    .header-v2-meta {
      font-size: 10px; color: var(--muted);
      font-family: 'DM Mono', monospace;
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    /* Bottom navigation */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      padding: 8px 12px calc(16px + env(safe-area-inset-bottom));
      z-index: 100;
      max-width: 480px;
      margin: 0 auto;
      box-shadow: 0 -8px 24px rgba(0,0,0,0.3);
    }
    .bn-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 3px; padding: 8px 4px; background: transparent; border: none;
      color: var(--muted); cursor: pointer; font-family: inherit;
      font-size: 10px; font-weight: 600;
      border-radius: 10px;
      transition: all 0.2s;
    }
    .bn-btn .bn-icon { font-size: 22px; line-height: 1; }
    .bn-btn.active { color: var(--purple-light); }
    .bn-btn.active .bn-icon { transform: scale(1.1); }
    .bn-btn:active { transform: scale(0.92); }

    /* Floating Action Button */
    .fab {
      position: fixed;
      bottom: calc(78px + env(safe-area-inset-bottom));
      right: 20px;
      width: 56px; height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--purple), #a855f7);
      color: #fff; border: none;
      font-size: 28px; font-weight: 300;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(124,58,237,0.5);
      z-index: 99;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s;
    }
    .fab:active { transform: scale(0.92); }
    .fab.hidden { transform: scale(0); pointer-events: none; }

    /* Settings list */
    .settings-list {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 14px;
    }
    .settings-row {
      display: flex; align-items: center; gap: 14px;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-row:active { background: var(--bg); }
    .settings-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      background: var(--accent-soft, rgba(167,139,250,0.1));
      flex-shrink: 0;
    }
    .settings-info { flex: 1; min-width: 0; }
    .settings-title { font-size: 14px; font-weight: 600; color: var(--text); }
    .settings-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .settings-arrow { color: var(--muted); font-size: 18px; }
    .settings-badge {
      background: var(--purple); color: #fff;
      padding: 2px 8px; border-radius: 100px;
      font-size: 10px; font-weight: 700;
      font-family: 'DM Mono', monospace;
    }

    /* Sub-page header (back button) */
    .subpage-header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 16px;
    }
    .back-btn {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); width: 36px; height: 36px;
      border-radius: 10px; cursor: pointer;
      font-size: 16px; font-family: inherit;
      display: flex; align-items: center; justify-content: center;
    }
    .back-btn:active { background: var(--border); }
    .subpage-title {
      font-size: 18px; font-weight: 700;
      flex: 1;
    }
    .subpage-action {
      background: var(--purple); color: #fff;
      border: none; padding: 7px 14px;
      border-radius: 10px; font-weight: 700;
      font-family: inherit; font-size: 13px;
      cursor: pointer;
    }
    .subpage-action:active { transform: scale(0.95); }

    /* Budget item */
    .budget-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
    }
    .budget-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .budget-cat {
      display: flex; align-items: center; gap: 10px;
      font-size: 14px; font-weight: 600;
    }
    .budget-cat .icon { font-size: 20px; }
    .budget-amounts {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--text);
      font-weight: 600;
    }
    .budget-amounts .spent { color: var(--text); }
    .budget-amounts .total { color: var(--muted); }
    .budget-bar {
      height: 6px; background: var(--bg); border-radius: 3px;
      overflow: hidden; position: relative;
    }
    .budget-bar-fill {
      height: 100%; border-radius: 3px;
      transition: width 0.4s ease;
    }
    .budget-bar-fill.safe { background: linear-gradient(90deg, #4ade80, #22c55e); }
    .budget-bar-fill.warn { background: linear-gradient(90deg, #fbbf24, #f59e0b); }
    .budget-bar-fill.danger { background: linear-gradient(90deg, #f87171, #ef4444); }
    .budget-pct {
      font-size: 11px; font-weight: 700;
      margin-top: 6px; text-align: right;
      font-family: 'DM Mono', monospace;
    }
    .budget-pct.safe { color: var(--green); }
    .budget-pct.warn { color: var(--orange); }
    .budget-pct.danger { color: var(--red); }
    .budget-actions {
      display: flex; gap: 8px; margin-top: 10px;
      padding-top: 10px; border-top: 1px solid var(--border);
    }
    .budget-actions button {
      flex: 1; padding: 6px; font-size: 11px; font-weight: 600;
      border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text-dim);
      font-family: inherit; cursor: pointer;
    }
    .budget-actions button.delete { color: var(--red); }
    .budget-actions button:active { transform: scale(0.96); }

    /* Recurring item */
    .recurring-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 12px;
    }
    .recurring-row .ricon {
      font-size: 24px; flex-shrink: 0;
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg); border-radius: 10px;
    }
    .recurring-info { flex: 1; min-width: 0; }
    .recurring-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .recurring-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .recurring-amount {
      font-size: 14px; font-weight: 700;
      font-family: 'DM Mono', monospace;
    }
    .recurring-amount.income { color: var(--green); }
    .recurring-amount.expense { color: var(--red); }
    .recurring-toggle {
      background: transparent; border: 1px solid var(--border);
      width: 30px; height: 30px; border-radius: 8px;
      color: var(--muted); cursor: pointer;
      font-size: 14px;
    }
    .recurring-toggle.active { color: var(--green); border-color: var(--green); }
    .recurring-toggle.paused { color: var(--muted); opacity: 0.5; }

    /* Custom category form */
    .emoji-picker {
      display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px;
      max-height: 180px; overflow-y: auto;
      padding: 10px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 10px;
      margin-bottom: 12px;
    }
    .emoji-cell {
      padding: 6px; border-radius: 6px;
      background: transparent; border: 1px solid transparent;
      cursor: pointer; font-size: 18px;
      transition: all 0.15s;
    }
    .emoji-cell:active { transform: scale(0.9); }
    .emoji-cell.selected {
      background: rgba(167,139,250,0.2);
      border-color: var(--purple);
    }

    .empty-section {
      text-align: center; padding: 40px 20px;
      color: var(--muted);
    }
    .empty-section .big-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-section p { font-size: 13px; line-height: 1.6; margin-bottom: 16px; }

    /* Recurring banner */
    .recurring-applied-banner {
      background: linear-gradient(135deg, #052e16, #0c2e16);
      border: 1px solid #166534;
      border-radius: var(--radius);
      padding: 10px 14px;
      margin-bottom: 14px;
      font-size: 12px;
      color: #4ade80;
      display: flex; align-items: center; gap: 10px;
      animation: fadeUp 0.4s ease;
    }
    .recurring-applied-banner .ricon { font-size: 18px; }

    /* ═══════════════════════════════════════════════════════════
       FASE 3 · Refinamiento UX
       ═══════════════════════════════════════════════════════════ */

    /* Tags input */
    .tags-input-wrap {
      display: flex; flex-wrap: wrap; gap: 6px;
      padding: 8px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 9px;
      min-height: 44px;
      align-items: center;
    }
    .tag-chip {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(167, 139, 250, 0.15);
      color: var(--purple-light);
      padding: 4px 10px; border-radius: 100px;
      font-size: 12px; font-weight: 600;
      border: 1px solid rgba(167, 139, 250, 0.3);
    }
    .tag-chip .x {
      cursor: pointer; opacity: 0.6; font-size: 14px;
      padding: 0 0 0 2px; line-height: 1;
    }
    .tag-chip .x:hover { opacity: 1; }
    .tag-input {
      flex: 1; min-width: 80px;
      background: transparent; border: none; outline: none;
      color: var(--text); font-family: inherit;
      font-size: 13px; padding: 4px;
    }
    .tag-suggestions {
      display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;
    }
    .tag-suggestion {
      background: var(--surface); color: var(--muted);
      border: 1px solid var(--border);
      padding: 4px 10px; border-radius: 100px;
      font-size: 11px; cursor: pointer;
      font-family: inherit;
    }
    .tag-suggestion:active { transform: scale(0.95); }
    .tx-tags {
      display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px;
    }
    .tx-tag-mini {
      background: rgba(167, 139, 250, 0.12);
      color: var(--purple-light);
      padding: 2px 8px; border-radius: 100px;
      font-size: 10px; font-weight: 600;
    }
    .tag-filter-row {
      display: flex; gap: 6px; flex-wrap: wrap;
      margin-bottom: 12px;
      max-height: 80px; overflow-y: auto;
    }
    .tag-filter-btn {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); padding: 5px 12px;
      border-radius: 100px; font-size: 12px;
      cursor: pointer; font-family: inherit; font-weight: 600;
    }
    .tag-filter-btn.active {
      background: rgba(167, 139, 250, 0.2);
      color: var(--purple-light);
      border-color: var(--purple);
    }

    /* Pie chart */
    .pie-wrapper {
      display: flex; align-items: center; gap: 16px;
      padding: 8px 0;
    }
    .pie-svg {
      flex-shrink: 0;
      transform: rotate(-90deg);
    }
    .pie-segment { transition: opacity 0.2s; }
    .pie-segment:hover { opacity: 0.85; }
    .pie-legend {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column; gap: 6px;
    }
    .pie-legend-item {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px;
    }
    .pie-legend-dot {
      width: 10px; height: 10px; border-radius: 2px;
      flex-shrink: 0;
    }
    .pie-legend-label {
      flex: 1; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .pie-legend-value {
      font-family: 'DM Mono', monospace;
      font-size: 11px; font-weight: 700;
      color: var(--text);
    }

    /* Quick add modal */
    .quick-add {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px 20px;
      width: 100%; max-width: 360px;
    }
    .quick-add-title {
      text-align: center; font-size: 14px;
      color: var(--purple-light); font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 18px;
    }
    .quick-amount-input {
      width: 100%; background: transparent; border: none; outline: none;
      color: var(--text); font-family: 'DM Mono', monospace;
      font-size: 42px; font-weight: 700;
      text-align: center; padding: 12px 0;
    }
    .quick-amount-input::placeholder { color: var(--border); }
    .quick-cats {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
      margin: 18px 0;
    }
    .quick-cat-btn {
      display: flex; flex-direction: column; align-items: center;
      padding: 12px 4px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--bg);
      color: #9ca3af; cursor: pointer; font-family: inherit;
      font-size: 18px; gap: 3px;
    }
    .quick-cat-btn .lbl { font-size: 9px; color: var(--muted); }
    .quick-cat-btn.active { background: #2a1a5e; border-color: var(--purple); color: var(--text); }
    .quick-cat-btn.active .lbl { color: var(--purple-light); }
    .quick-actions {
      display: flex; gap: 8px; margin-top: 4px;
    }
    .quick-actions .btn-cancel { flex: 1; }
    .quick-actions .btn-save { flex: 2; }
    .quick-more {
      text-align: center; margin-top: 12px;
      font-size: 12px; color: var(--purple-light);
      background: transparent; border: none; cursor: pointer;
      padding: 8px;
    }

    /* Settings toggle switch */
    .switch {
      position: relative;
      width: 42px; height: 24px;
      background: var(--border);
      border-radius: 100px;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .switch.on { background: var(--purple); }
    .switch::after {
      content: "";
      position: absolute;
      width: 18px; height: 18px;
      background: #fff;
      border-radius: 50%;
      top: 3px; left: 3px;
      transition: transform 0.2s;
    }
    .switch.on::after { transform: translateX(18px); }

    /* ═══════════════════════════════════════════════════════════
       UX POLISH · feedback táctil, animaciones, micro-interactions
       ═══════════════════════════════════════════════════════════ */

    /* Smooth view transitions */
    main > * {
      animation: viewIn 0.32s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes viewIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Ripple base — used on tappable elements */
    .ripple {
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }
    .ripple::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at var(--rx, 50%) var(--ry, 50%),
                                   rgba(167, 139, 250, 0.25) 0%,
                                   rgba(167, 139, 250, 0) 50%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
      z-index: 0;
    }
    .ripple.tapped::after {
      opacity: 1;
      transition: opacity 0s;
    }
    .ripple > * { position: relative; z-index: 1; }

    /* Bottom nav — better active state with subtle bg pill */
    .bn-btn {
      position: relative;
    }
    .bn-btn::before {
      content: "";
      position: absolute;
      top: 4px; left: 50%;
      transform: translateX(-50%) scale(0.5);
      width: 36px; height: 28px;
      background: rgba(167, 139, 250, 0.14);
      border-radius: 100px;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: -1;
    }
    .bn-btn.active::before {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }
    .bn-btn .bn-icon {
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .bn-btn.active .bn-icon {
      transform: scale(1.15);
    }
    .bn-btn:active .bn-icon {
      transform: scale(0.9);
    }

    /* FAB — subtle pulse on idle */
    @keyframes fabPulse {
      0%, 100% { box-shadow: 0 6px 20px rgba(124,58,237,0.5), 0 0 0 0 rgba(124,58,237,0.4); }
      50% { box-shadow: 0 6px 20px rgba(124,58,237,0.5), 0 0 0 8px rgba(124,58,237,0); }
    }
    .fab {
      animation: fabPulse 2.5s ease-in-out infinite;
    }
    .fab:active {
      animation: none;
      transform: scale(0.92) rotate(45deg);
    }

    /* All buttons — improve tap feedback */
    button {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* Cards — subtle hover */
    .card, .credit-highlight, .section, .tx-row, .settings-row, .recurring-row, .budget-row {
      -webkit-tap-highlight-color: transparent;
    }

    /* Save button — pulse on success */
    @keyframes savePulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.04); box-shadow: 0 8px 24px rgba(124,58,237,0.7); }
      100% { transform: scale(1); }
    }
    .btn-save.success-pulse { animation: savePulse 0.4s ease; }

    /* Toast — better entrance with bounce */
    .toast {
      will-change: transform, opacity;
    }

    /* TX row — tap feedback */
    .tx-row {
      transition: background 0.15s, transform 0.1s;
    }
    .tx-row:active {
      background: var(--bg);
      transform: scale(0.995);
    }

    /* Settings rows — smoother active */
    .settings-row {
      transition: background 0.15s, transform 0.1s;
    }
    .settings-row:active {
      background: var(--bg);
      transform: scale(0.995);
    }

    /* Filter buttons — better active */
    .filter-btn, .tag-filter-btn {
      transition: all 0.2s;
    }
    .filter-btn:active, .tag-filter-btn:active {
      transform: scale(0.94);
    }

    /* Cat buttons in form */
    .cat-btn {
      transition: all 0.15s;
    }
    .cat-btn:active {
      transform: scale(0.92);
    }

    /* Modal entrance — smoother */
    .modal {
      will-change: transform, opacity;
    }
    .modal-overlay {
      will-change: opacity;
    }

    /* Inputs — focus ring */
    input:focus, select:focus, textarea:focus {
      box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.15);
    }

    /* Number input on dashboard amount */
    .quick-amount-input:focus {
      box-shadow: none;
      outline: none;
    }

    /* Subtle scale on switch */
    .switch {
      transition: background 0.25s;
    }
    .switch:active {
      transform: scale(0.95);
    }

    /* Backup reminder buttons — better feedback */
    .backup-reminder button {
      transition: transform 0.1s, opacity 0.15s;
    }
    .backup-reminder button:active {
      transform: scale(0.94);
    }

    /* Add a soft border on focus for sliders/cards in forms */
    .cat-btn.active, .month-cell.current {
      animation: gentleScale 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes gentleScale {
      from { transform: scale(0.92); }
      to { transform: scale(1); }
    }

    /* Smooth scroll between views */
    html {
      scroll-behavior: smooth;
    }

    /* Pretty selection */
    ::selection {
      background: rgba(167, 139, 250, 0.3);
      color: var(--text);
    }
  </style>
</head>

  <div class="logo" onclick="showView('dashboard')" style="cursor:pointer">💰 Mi<span>Economía</span></div>
  <div class="header-v2-meta" id="header-meta">v1.7</div>
</header>

  </button>

<div class="toast" id="toast"></div>
<div id="modal-container"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────
const DEFAULT_CATEGORIES = {
  expense: [
    { id: "tarjeta",      label: "Tarjeta créd.", icon: "💳" },
    { id: "supermercado", label: "Supermercado",  icon: "🛒" },
    { id: "restaurantes", label: "Restaurantes",  icon: "🍽️" },
    { id: "transporte",   label: "Transporte",    icon: "🚗" },
    { id: "alquiler",     label: "Alquiler",      icon: "🏠" },
    { id: "salud",        label: "Salud",         icon: "🏥" },
    { id: "ocio",         label: "Ocio",          icon: "🎬" },
    { id: "ropa",         label: "Ropa",          icon: "👕" },
    { id: "servicios",    label: "Servicios",     icon: "💡" },
    { id: "educacion",    label: "Educación",     icon: "📚" },
    { id: "mascotas",     label: "Mascotas",      icon: "🐾" },
    { id: "otros_g",      label: "Otros",         icon: "📦" },
  ],
  income: [
    { id: "salario",      label: "Salario",       icon: "💼" },
    { id: "freelance",    label: "Freelance",     icon: "💻" },
    { id: "inversiones",  label: "Inversiones",   icon: "📈" },
    { id: "alquiler_ing", label: "Alquiler",      icon: "🏘️" },
    { id: "regalo",       label: "Regalo",        icon: "🎁" },
    { id: "otros_i",      label: "Otros",         icon: "➕" },
  ]
};

// Load custom categories from localStorage, merged with defaults
function loadCategories() {
  try {
    const stored = localStorage.getItem('mie_categories');
    if (stored) return JSON.parse(stored);
  } catch {}
  return JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
}
function saveCategoriesToStorage() {
  localStorage.setItem('mie_categories', JSON.stringify(CATEGORIES));
}

let CATEGORIES = loadCategories();

const DEFAULT_METHODS = [
  { id: "efectivo",      label: "Efectivo",        icon: "💵" },
  { id: "debito",        label: "Tarjeta débito",  icon: "💳" },
  { id: "credito",       label: "Tarjeta crédito", icon: "💳" },
  { id: "transferencia", label: "Transferencia",   icon: "🏦" },
  { id: "mercadopago",   label: "Mercado Pago",    icon: "🟡" },
  { id: "modo",          label: "MODO",            icon: "🟣" },
  { id: "cuentadni",     label: "Cuenta DNI",      icon: "🔵" },
  { id: "otro",          label: "Otro",            icon: "📦" }
];

function loadMethods() {
  try {
    const stored = localStorage.getItem('mie_methods');
    if (stored) return JSON.parse(stored);
  } catch {}
  return JSON.parse(JSON.stringify(DEFAULT_METHODS));
}
function saveMethodsToStorage() {
  localStorage.setItem('mie_methods', JSON.stringify(METHODS));
}

let METHODS = loadMethods();

function getMethod(label) {
  return METHODS.find(m => m.label === label) || { label, icon: '💸' };
}

function isCustomMethod(methodId) {
  return !DEFAULT_METHODS.some(m => m.id === methodId);
}

// Form state for new/edit method
let methodForm = {
  id: null,
  label: '',
  icon: '💳',
  oldLabel: null  // to migrate transactions when editing
};
const MONTHS_ES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

function getCat(id) {
  const all = [...CATEGORIES.expense, ...CATEGORIES.income];
  return all.find(c => c.id === id) || { label: id, icon: "📌" };
}

function fmt(n) {
  return new Intl.NumberFormat('es-AR', {
    style: 'currency', currency: 'ARS', maximumFractionDigits: 0
  }).format(Math.abs(n));
}

function fmtSign(n, type) {
  return (type === 'income' ? '+' : '-') + fmt(n);
}

// ── STORAGE ───────────────────────────────────────────────────────────────
function loadTxs() {
  try { return JSON.parse(localStorage.getItem('mie_txs') || '[]'); }
  catch { return []; }
}
function saveTxs(txs) {
  localStorage.setItem('mie_txs', JSON.stringify(txs));
}

let transactions = loadTxs();

// ── BUDGETS ───────────────────────────────────────────────────────────────
function loadBudgets() {
  try { return JSON.parse(localStorage.getItem('mie_budgets') || '{}'); }
  catch { return {}; }
}
function saveBudgets() {
  localStorage.setItem('mie_budgets', JSON.stringify(budgets));
}
let budgets = loadBudgets();

// ── RECURRING ─────────────────────────────────────────────────────────────
function loadRecurring() {
  try { return JSON.parse(localStorage.getItem('mie_recurring') || '[]'); }
  catch { return []; }
}
function saveRecurring() {
  localStorage.setItem('mie_recurring', JSON.stringify(recurring));
}
let recurring = loadRecurring();
let recurringJustApplied = []; // ids of recurring applied on this session

// Form state for new recurring
let recurringForm = {
  id: null,
  name: '',
  amount: '',
  type: 'expense',
  category: 'tarjeta',
  method: 'Tarjeta crédito',
  dayOfMonth: 1,
  active: true
};

// Form state for new/edit category
let categoryForm = {
  id: null,
  label: '',
  icon: '📦',
  type: 'expense'
};

// Common emojis for category picker
const CATEGORY_EMOJIS = [
  '🛒','🍽️','🚗','🏠','🏥','🎬','👕','💡','📚','🐾','📦','💳',
  '💼','💻','📈','🏘️','🎁','➕','💰','🍕','☕','🥗','🛍️','🎮',
  '✈️','🏖️','🎨','📱','🎵','📷','⚽','🏋️','🚴','🧘','💊','🦷',
  '🚌','🚆','⛽','🔧','🧹','🌳','🎂','🍷','🎓','💼','🏦','💸'
];

// ── STATE ─────────────────────────────────────────────────────────────────
let currentView = 'dashboard';
let histFilter = 'all';
let formState = {
  type: 'expense', amount: '', category: 'tarjeta',
  method: 'Tarjeta crédito', description: '',
  tags: [],
  date: new Date().toISOString().slice(0,10)
};
// ── PHASE 3 STATE ─────────────────────────────────────────────────────────
let tagFilter = ''; // selected tag filter in history
let pendingTagInput = ''; // current text in tag input

// Settings (toggleable features)
function loadSettingsFlags() {
  try { return JSON.parse(localStorage.getItem('mie_settings_flags') || '{}'); }
  catch { return {}; }
}
function saveSettingsFlags() {
  localStorage.setItem('mie_settings_flags', JSON.stringify(settingsFlags));
}
let settingsFlags = Object.assign({
  quickAddEnabled: false,
  showPieChart: true,
}, loadSettingsFlags());

// Theme
function getCurrentTheme() {
  return document.documentElement.getAttribute('data-theme') || 'dark';
}
function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('mie_theme', theme);
}
function toggleTheme() {
  setTheme(getCurrentTheme() === 'dark' ? 'light' : 'dark');
  render();
}

// Tags helpers
function getAllUsedTags() {
  const set = new Set();
  transactions.forEach(t => {
    if (t.tags && Array.isArray(t.tags)) t.tags.forEach(tag => set.add(tag));
  });
  return [...set].sort();
}

// Most-used category in last 30 days (for quick add)
function getFavoriteCategory() {
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 30);
  const recent = transactions.filter(t =>
    t.type === 'expense' && new Date(t.date) >= cutoff
  );
  if (recent.length === 0) return CATEGORIES.expense[0]?.id || 'tarjeta';
  const counts = {};
  recent.forEach(t => { counts[t.category] = (counts[t.category] || 0) + 1; });
  return Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0];
}

let viewDate = new Date(); // for month navigation
let searchQuery = ''; // search filter for history
let backupReminderDismissed = false; // session-level dismiss

// ── BACKUP TRACKING ───────────────────────────────────────────────────────
function getLastBackup() {
  return localStorage.getItem('mie_last_backup');
}
function setLastBackup() {
  localStorage.setItem('mie_last_backup', new Date().toISOString());
}
function daysSinceBackup() {
  const last = getLastBackup();
  if (!last) return null;
  const diff = Date.now() - new Date(last).getTime();
  return Math.floor(diff / (1000 * 60 * 60 * 24));
}

// ── PERCENTAGE CHANGE ─────────────────────────────────────────────────────
function pctChange(current, previous) {
  if (previous === 0) return current === 0 ? 0 : null;
  return ((current - previous) / previous) * 100;
}
function fmtPct(p) {
  if (p === null) return '';
  const sign = p > 0 ? '+' : '';
  return `${sign}${Math.round(p)}%`;
}

// ── TOAST ─────────────────────────────────────────────────────────────────
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = (type === 'success' ? '✅ ' : '❌ ') + msg;
  t.className = `toast show ${type}`;
  setTimeout(() => { t.className = 'toast'; }, 2500);
}

// ── VIEW ROUTER ───────────────────────────────────────────────────────────
function showView(v) {
  currentView = v;

  // Update bottom nav active state
  document.querySelectorAll('.bn-btn').forEach(b => b.classList.remove('active'));
  // Map sub-views to main nav items
  let navTarget = v;
  if (['budgets', 'recurring', 'categories', 'methods', 'about'].includes(v)) navTarget = 'settings';
  if (v === 'add') navTarget = null; // no highlight on add
  if (navTarget) {
    const navEl = document.getElementById('nav-' + navTarget);
    if (navEl) navEl.classList.add('active');
  }

  // Hide FAB on add and settings sub-pages
  const fab = document.getElementById('fab');
  if (['add', 'budgets', 'recurring', 'categories', 'methods', 'about'].includes(v)) {
    fab.classList.add('hidden');
  } else {
    fab.classList.remove('hidden');
  }

  render();
  // Scroll to top on view change
  window.scrollTo({ top: 0, behavior: 'instant' });
}

function render() {
  const main = document.getElementById('main');
  if (currentView === 'dashboard')      main.innerHTML = renderDashboard();
  else if (currentView === 'add')       main.innerHTML = renderForm();
  else if (currentView === 'history')   main.innerHTML = renderHistory();
  else if (currentView === 'stats')     main.innerHTML = renderStats();
  else if (currentView === 'settings')  main.innerHTML = renderSettings();
  else if (currentView === 'budgets')   main.innerHTML = renderBudgets();
  else if (currentView === 'recurring') main.innerHTML = renderRecurring();
  else if (currentView === 'categories') main.innerHTML = renderCategoriesPage();
  else if (currentView === 'methods')   main.innerHTML = renderMethodsPage();
  attachEvents();
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────
function renderDashboard() {
  const y = viewDate.getFullYear(), m = viewDate.getMonth();
  const monthTxs = transactions.filter(t => {
    const d = new Date(t.date);
    return d.getFullYear() === y && d.getMonth() === m;
  });

  // Previous month for comparison
  const prevDate = new Date(y, m - 1, 1);
  const py = prevDate.getFullYear(), pm = prevDate.getMonth();
  const prevMonthTxs = transactions.filter(t => {
    const d = new Date(t.date);
    return d.getFullYear() === py && d.getMonth() === pm;
  });

  const income  = monthTxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense = monthTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const balance = income - expense;
  const cardExp = monthTxs.filter(t=>t.type==='expense'&&t.method==='Tarjeta crédito').reduce((s,t)=>s+t.amount,0);

  const prevIncome  = prevMonthTxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const prevExpense = prevMonthTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);

  const incomeChange  = pctChange(income, prevIncome);
  const expenseChange = pctChange(expense, prevExpense);

  // Daily average + projection (only for current month)
  const today = new Date();
  const isCurrentMonth = y === today.getFullYear() && m === today.getMonth();
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const daysElapsed = isCurrentMonth ? today.getDate() : daysInMonth;
  const dailyAvg = daysElapsed > 0 ? expense / daysElapsed : 0;
  const projection = isCurrentMonth ? dailyAvg * daysInMonth : expense;

  const byCat = {};
  monthTxs.filter(t=>t.type==='expense').forEach(t => { byCat[t.category] = (byCat[t.category]||0)+t.amount; });
  const topCats = Object.entries(byCat).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const recentTxs = monthTxs.slice(0,6);

  // Backup reminder
  const daysBackup = daysSinceBackup();
  const showReminder = !backupReminderDismissed && transactions.length > 5 &&
    (daysBackup === null || daysBackup > 30);

  return `
  <div class="fade-up">
    ${recurringJustApplied.length > 0 ? `
    <div class="recurring-applied-banner">
      <span class="ricon">🔁</span>
      <div>Se aplicaron movimientos recurrentes: <strong>${recurringJustApplied.join(', ')}</strong></div>
    </div>` : ''}

    ${showReminder ? `
    <div class="backup-reminder">
      <div class="backup-reminder-icon">📦</div>
      <div class="backup-reminder-text">
        ${daysBackup === null
          ? `<strong>Hacé tu primer backup</strong><br>Tenés ${transactions.length} movimientos sin respaldar.`
          : `<strong>Hace ${daysBackup} días</strong> que no hacés backup. Es un buen momento.`}
      </div>
      <button onclick="exportCSVAndMark()">Exportar</button>
      <button class="dismiss" onclick="dismissBackupReminder()">×</button>
    </div>` : ''}

    <!-- Month nav -->
    <div class="month-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <button class="month-label-btn" onclick="openMonthPicker()">
        ${MONTHS_ES[m]} ${y} <span class="chevron">▼</span>
      </button>
      <button onclick="changeMonth(1)">›</button>
    </div>

    <!-- Balance -->
    <div class="cards-grid">
      <div class="card full">
        <div class="card-label">Balance del mes</div>
        <div class="card-amount balance ${balance>=0?'green':'red'}">${fmtSign(balance, balance>=0?'income':'expense')}</div>
      </div>
      <div class="card">
        <div class="card-label">↑ Ingresos ${incomeChange !== null ? `<span class="comparison ${incomeChange > 0 ? 'up-good' : incomeChange < 0 ? 'down-bad' : 'neutral'}">${fmtPct(incomeChange)}</span>` : ''}</div>
        <div class="card-amount green">${fmt(income)}</div>
      </div>
      <div class="card">
        <div class="card-label">↓ Gastos ${expenseChange !== null ? `<span class="comparison ${expenseChange > 0 ? 'up-bad' : expenseChange < 0 ? 'down-good' : 'neutral'}">${fmtPct(expenseChange)}</span>` : ''}</div>
        <div class="card-amount red">${fmt(expense)}</div>
      </div>
    </div>

    ${expense > 0 ? `
    <!-- Mini stats: daily avg + projection -->
    <div class="mini-stats">
      <div class="mini-stat">
        <div class="mini-stat-label">📊 Promedio diario</div>
        <div class="mini-stat-value">${fmt(dailyAvg)}</div>
        <div class="mini-stat-sub">Día ${daysElapsed} de ${daysInMonth}</div>
      </div>
      <div class="mini-stat">
        <div class="mini-stat-label">🔮 ${isCurrentMonth ? 'Proyección fin de mes' : 'Total del mes'}</div>
        <div class="mini-stat-value">${fmt(projection)}</div>
        <div class="mini-stat-sub">${isCurrentMonth ? 'A este ritmo' : 'Cerrado'}</div>
      </div>
    </div>` : ''}

    <!-- Credit card -->
    <div class="credit-highlight">
      <div class="credit-left">
        <span class="credit-icon">💳</span>
        <div>
          <div class="credit-title">Tarjeta de crédito</div>
          <div class="credit-sub">Gastos del mes</div>
        </div>
      </div>
      <div class="card-amount orange">${fmt(cardExp)}</div>
    </div>

    ${(() => {
      const activeBudgets = Object.entries(budgets);
      if (activeBudgets.length === 0) return '';
      const alerts = activeBudgets.filter(([catId, total]) => {
        const sp = byCat[catId] || 0;
        return sp >= total * 0.8;
      });
      if (alerts.length === 0) return '';
      return `
      <div class="section">
        <div class="section-title">🎯 Estado de presupuestos</div>
        ${alerts.slice(0, 4).map(([catId, total]) => {
          const cat = getCat(catId);
          const sp = byCat[catId] || 0;
          const pct = (sp / total) * 100;
          const cls = pct >= 100 ? 'danger' : 'warn';
          return `
          <div style="margin-bottom:12px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
              <span style="font-size:13px">${cat.icon} ${cat.label}</span>
              <span style="font-family:'DM Mono',monospace;font-size:11px;font-weight:700" class="budget-pct ${cls}">${Math.round(pct)}%</span>
            </div>
            <div class="budget-bar"><div class="budget-bar-fill ${cls}" style="width:${Math.min(pct, 100)}%"></div></div>
            <div style="font-size:10px;color:var(--muted);margin-top:3px;text-align:right;font-family:'DM Mono',monospace">
              ${fmt(sp)} / ${fmt(total)}
            </div>
          </div>`;
        }).join('')}
        ${activeBudgets.length > alerts.length ? `
        <button onclick="showView('budgets')" style="width:100%;margin-top:6px;padding:8px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--purple-light);font-family:inherit;font-size:12px;cursor:pointer">
          Ver todos los presupuestos →
        </button>` : ''}
      </div>`;
    })()}

    ${topCats.length > 0 ? `
    <!-- Top categories -->
    <div class="section">
      <div class="section-title">🏆 Mayores gastos</div>
      ${topCats.map(([catId, amount]) => {
        const cat = getCat(catId);
        const pct = expense > 0 ? (amount/expense)*100 : 0;
        return `
        <div class="cat-row">
          <div class="cat-icon-wrap">${cat.icon}</div>
          <div class="cat-name">${cat.label}</div>
          <div class="cat-bar-wrap">
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
            <div class="cat-amount-sm">${fmt(amount)}</div>
          </div>
        </div>`;
      }).join('')}
    </div>` : ''}

    ${recentTxs.length > 0 ? `
    <!-- Recent -->
    <div class="section">
      <div class="section-title">🕐 Últimos movimientos</div>
      ${recentTxs.map(tx => txRow(tx, false)).join('')}
    </div>` : `
    <div class="empty">
      <div class="emoji">📭</div>
      <p>Sin movimientos este mes.<br>¡Agregá tu primer ingreso o gasto!</p>
      <button class="btn-add" onclick="showView('add')">+ Agregar movimiento</button>
    </div>`}
  </div>`;
}

function changeMonth(delta) {
  viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() + delta, 1);
  render();
}

function dismissBackupReminder() {
  backupReminderDismissed = true;
  render();
}

function exportCSVAndMark() {
  exportCSV();
  setLastBackup();
  backupReminderDismissed = true;
}

// ── MONTH PICKER ──────────────────────────────────────────────────────────
let pickerYear = null;

function openMonthPicker() {
  pickerYear = viewDate.getFullYear();
  renderMonthPicker();
}

function renderMonthPicker() {
  const today = new Date();
  const todayY = today.getFullYear(), todayM = today.getMonth();
  const currentY = viewDate.getFullYear(), currentM = viewDate.getMonth();

  const html = `
    <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">📅 Seleccionar mes</div>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="year-nav">
          <button onclick="changePickerYear(-1)">‹</button>
          <span class="year-display">${pickerYear}</span>
          <button onclick="changePickerYear(1)">›</button>
        </div>
        <div class="month-grid">
          ${MONTHS_ES.map((mo, i) => {
            const isCurrent = pickerYear === currentY && i === currentM;
            const isToday = pickerYear === todayY && i === todayM;
            const cls = isCurrent ? 'current' : isToday ? 'today' : '';
            return `<button class="month-cell ${cls}" onclick="selectMonth(${i})">${mo.slice(0,3)}</button>`;
          }).join('')}
        </div>
      </div>
    </div>
  `;
  document.getElementById('modal-container').innerHTML = html;
}

function changePickerYear(delta) {
  pickerYear += delta;
  renderMonthPicker();
}

function selectMonth(monthIdx) {
  viewDate = new Date(pickerYear, monthIdx, 1);
  closeModal();
  render();
}

function closeModal() {
  document.getElementById('modal-container').innerHTML = '';
}

// ── TX ROW ────────────────────────────────────────────────────────────────
function txRow(tx, showDelete = true) {
  const cat = getCat(tx.category);
  const meth = getMethod(tx.method);
  const color = tx.type === 'income' ? 'green' : 'red';
  const desc = tx.description || cat.label;
  const hasLongDesc = desc.length > 35 || desc.includes('\n');
  const tags = tx.tags && tx.tags.length > 0 ? `
    <div class="tx-tags">
      ${tx.tags.map(t => `<span class="tx-tag-mini">#${t}</span>`).join('')}
    </div>
  ` : '';
  return `
  <div class="tx-row">
    <span class="tx-icon">${cat.icon}</span>
    <div class="tx-info">

// ── HISTORY ───────────────────────────────────────────────────────────────
function renderHistory() {
  let filtered = transactions.filter(t => histFilter === 'all' || t.type === histFilter);

  // Tag filter
  if (tagFilter) {
    filtered = filtered.filter(t => t.tags && t.tags.includes(tagFilter));
  }

  const q = searchQuery.trim().toLowerCase();
  if (q) {
    filtered = filtered.filter(t => {
      const cat = getCat(t.category);
      return (
        (t.description || '').toLowerCase().includes(q) ||
        cat.label.toLowerCase().includes(q) ||
        t.method.toLowerCase().includes(q) ||
        t.amount.toString().includes(q) ||
        t.date.includes(q) ||
        (t.tags || []).some(tag => tag.includes(q))
      );
    });
  }

  const allTags = getAllUsedTags();

  return `
  <div class="fade-up">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="search-input"
        placeholder="Buscar por descripción, monto, categoría..."
        value="${searchQuery.replace(/"/g, '&quot;')}"
        oninput="updateSearch(this.value)" />
      ${searchQuery ? `<button class="search-clear" onclick="clearSearch()">✕</button>` : ''}
    </div>

    <div class="filter-row">
      <button class="filter-btn ${histFilter==='all'?'active':''}" onclick="setFilter('all')">Todo</button>
      <button class="filter-btn ${histFilter==='income'?'active':''}" onclick="setFilter('income')">Ingresos</button>
      <button class="filter-btn ${histFilter==='expense'?'active':''}" onclick="setFilter('expense')">Gastos</button>
    </div>

    ${allTags.length > 0 ? `
    <div class="tag-filter-row">
      <button class="tag-filter-btn ${tagFilter==='' ? 'active' : ''}" onclick="setTagFilter('')">Todas</button>
      ${allTags.map(t => `
        <button class="tag-filter-btn ${tagFilter===t ? 'active' : ''}" onclick="setTagFilter('${t.replace(/'/g, "\\'")}')">#${t}</button>
      `).join('')}
    </div>` : ''}

    ${q || tagFilter ? `<div class="search-results-info">${filtered.length} resultado${filtered.length !== 1 ? 's' : ''}${q ? ` para "${q}"` : ''}${tagFilter ? ` con etiqueta #${tagFilter}` : ''}</div>` : ''}

    <div class="section">
      ${filtered.length === 0
        ? `<div class="empty"><div class="emoji">🔍</div><p>${q || tagFilter ? 'No se encontraron movimientos.' : 'No hay movimientos aquí.'}</p></div>`
        : filtered.map(tx => txRow(tx, true)).join('')
      }
    </div>
  </div>`;
}

function setFilter(f) { histFilter = f; render(); }
function setTagFilter(t) { tagFilter = t; render(); }

function updateSearch(v) {
  searchQuery = v;
  // Re-render but preserve focus
  const main = document.getElementById('main');
  main.innerHTML = renderHistory();
  // Restore focus + cursor at end
  const input = document.getElementById('search-input');
  if (input) {
    input.focus();
    input.setSelectionRange(v.length, v.length);
  }
}

function clearSearch() {
  searchQuery = '';
  render();
}

// ── STATS ─────────────────────────────────────────────────────────────────
function renderStats() {
  const total_income  = transactions.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const total_expense = transactions.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const total_card    = transactions.filter(t=>t.type==='expense'&&t.method==='Tarjeta crédito').reduce((s,t)=>s+t.amount,0);

  // By method
  const byMethod = {};
  transactions.filter(t=>t.type==='expense').forEach(t => { byMethod[t.method] = (byMethod[t.method]||0)+t.amount; });
  const methods = Object.entries(byMethod).sort((a,b)=>b[1]-a[1]);

  // By category (for pie chart) - current month
  const today = new Date();
  const ty = today.getFullYear(), tm = today.getMonth();
  const monthExpenses = transactions.filter(t => {
    const d = new Date(t.date);
    return t.type === 'expense' && d.getFullYear() === ty && d.getMonth() === tm;
  });
  const byCategoryMonth = {};
  monthExpenses.forEach(t => { byCategoryMonth[t.category] = (byCategoryMonth[t.category] || 0) + t.amount; });
  const pieCats = Object.entries(byCategoryMonth).sort((a, b) => b[1] - a[1]);
  const pieTotal = pieCats.reduce((s, [_, v]) => s + v, 0);

  // Monthly summary (last 6 months)
  const monthlySummary = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(); d.setDate(1); d.setMonth(d.getMonth() - i);
    const y = d.getFullYear(), m = d.getMonth();
    const monthTxs = transactions.filter(t => {
      const td = new Date(t.date);
      return td.getFullYear()===y && td.getMonth()===m;
    });
    monthlySummary.push({
      label: MONTHS_ES[m].slice(0,3),
      income: monthTxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0),
      expense: monthTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0),
    });
  }
  const maxVal = Math.max(...monthlySummary.flatMap(m=>[m.income,m.expense]), 1);

  // Pie chart colors
  const PIE_COLORS = ['#a78bfa','#f472b6','#fb923c','#4ade80','#60a5fa','#facc15','#f87171','#34d399','#c084fc','#fbbf24','#22d3ee','#fb7185'];

  return `
  <div class="fade-up">
    <!-- General totals -->
    <div class="cards-grid">
      <div class="card">
        <div class="card-label">Total ingresos</div>
        <div class="card-amount green" style="font-size:18px">${fmt(total_income)}</div>
      </div>
      <div class="card">
        <div class="card-label">Total gastos</div>
        <div class="card-amount red" style="font-size:18px">${fmt(total_expense)}</div>
      </div>
      <div class="card full">
        <div class="card-label">Total tarjeta crédito (histórico)</div>
        <div class="card-amount orange" style="font-size:18px">${fmt(total_card)}</div>
      </div>
    </div>

    ${settingsFlags.showPieChart && pieCats.length > 0 && pieTotal > 0 ? `
    <!-- Pie chart -->
    <div class="section">
      <div class="section-title">🥧 Distribución del mes actual</div>
      <div class="pie-wrapper">
        <svg class="pie-svg" width="120" height="120" viewBox="0 0 100 100">
          ${(() => {
            let cumAngle = 0;
            return pieCats.map(([catId, amount], i) => {
              const pct = amount / pieTotal;
              const startAngle = cumAngle;
              const endAngle = cumAngle + pct * 360;
              cumAngle = endAngle;
              if (pct >= 0.999) {
                return `<circle cx="50" cy="50" r="45" fill="${PIE_COLORS[i % PIE_COLORS.length]}" />`;
              }
              const startRad = (startAngle * Math.PI) / 180;
              const endRad = (endAngle * Math.PI) / 180;
              const x1 = 50 + 45 * Math.cos(startRad);
              const y1 = 50 + 45 * Math.sin(startRad);
              const x2 = 50 + 45 * Math.cos(endRad);
              const y2 = 50 + 45 * Math.sin(endRad);
              const largeArc = pct > 0.5 ? 1 : 0;
              return `<path class="pie-segment" d="M 50 50 L ${x1} ${y1} A 45 45 0 ${largeArc} 1 ${x2} ${y2} Z" fill="${PIE_COLORS[i % PIE_COLORS.length]}" />`;
            }).join('');
          })()}
          <circle cx="50" cy="50" r="22" fill="var(--surface)" />
        </svg>
        <div class="pie-legend">
          ${pieCats.slice(0, 6).map(([catId, amount], i) => {
            const cat = getCat(catId);
            const pct = (amount / pieTotal) * 100;
            return `
              <div class="pie-legend-item">
                <div class="pie-legend-dot" style="background:${PIE_COLORS[i % PIE_COLORS.length]}"></div>
                <span class="pie-legend-label">${cat.icon} ${cat.label}</span>
                <span class="pie-legend-value">${Math.round(pct)}%</span>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    </div>` : ''}

    <!-- Monthly chart -->
    <div class="section">
      <div class="section-title">📅 Últimos 6 meses</div>
      <div style="display:flex;align-items:flex-end;gap:8px;height:120px;padding:8px 0">
        ${monthlySummary.map(m => {
          const hInc = maxVal > 0 ? (m.income/maxVal)*100 : 0;
          const hExp = maxVal > 0 ? (m.expense/maxVal)*100 : 0;
          return `
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
            <div style="display:flex;align-items:flex-end;gap:3px;height:90px">
              <div style="width:10px;background:var(--green);border-radius:3px 3px 0 0;height:${hInc}%;opacity:0.85"></div>
              <div style="width:10px;background:var(--red);border-radius:3px 3px 0 0;height:${hExp}%;opacity:0.85"></div>
            </div>
            <div style="font-size:10px;color:var(--muted)">${m.label}</div>
          </div>`;
        }).join('')}
      </div>
      <div style="display:flex;gap:16px;margin-top:4px">
        <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)">
          <div style="width:10px;height:10px;background:var(--green);border-radius:2px"></div> Ingresos
        </div>
        <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)">
          <div style="width:10px;height:10px;background:var(--red);border-radius:2px"></div> Gastos
        </div>
      </div>
    </div>

    <!-- By payment method -->
    ${methods.length > 0 ? `
    <div class="section">
      <div class="section-title">💳 Gastos por método de pago</div>
      ${methods.map(([method, amount]) => {
        const pct = total_expense > 0 ? (amount/total_expense)*100 : 0;
        const meth = getMethod(method);
        return `
        <div class="cat-row">
          <div class="cat-name" style="flex:unset;min-width:130px">${meth.icon} ${method}</div>
          <div class="cat-bar-wrap" style="flex:1;justify-content:flex-end">
            <div class="bar-track" style="width:80px"><div class="bar-fill" style="width:${pct}%"></div></div>
            <div class="cat-amount-sm">${fmt(amount)}</div>
          </div>
        </div>`;
      }).join('')}
    </div>` : ''}

    <!-- Count -->
    <div style="text-align:center;color:var(--muted);font-size:13px;margin-top:8px">
      ${transactions.length} movimiento${transactions.length!==1?'s':''} registrado${transactions.length!==1?'s':''}
    </div>
  </div>`;
}

function setFormType(t) {
  formState.type = t;
  formState.category = t === 'expense' ? 'tarjeta' : 'salario';
  render();
}

function setFormCat(id) {
  formState.category = id;
  render();
  // Re-set amount so typing doesn't reset
  const amtEl = document.getElementById('f-amount');
  if (amtEl) { amtEl.value = formState.amount; amtEl.focus(); }
}

function saveTransaction() {
  const amount = parseFloat(formState.amount);
  if (!amount || isNaN(amount) || amount <= 0) {
    showToast('Ingresá un monto válido', 'error'); return;
  }
  const tx = {
    id: Date.now(),
    type: formState.type,
    amount,
    category: formState.category,
    method: formState.method,
    description: formState.description.trim(),
    tags: (formState.tags || []).filter(t => t.trim()),
    date: formState.date,
  };
  transactions.unshift(tx);
  saveTxs(transactions);
  formState = { type:'expense', amount:'', category:'tarjeta', method:'Tarjeta crédito', description:'', tags: [], date: new Date().toISOString().slice(0,10) };
  showView('dashboard');
  showToast('Movimiento guardado');
}

// ── TAGS HELPERS ──────────────────────────────────────────────────────────
function addTag(tag) {
  tag = tag.trim().toLowerCase().replace(/^#/, '').replace(/[^a-z0-9áéíóúñü]/g, '');
  if (!tag) return;
  if (!formState.tags) formState.tags = [];
  if (formState.tags.includes(tag)) return;
  formState.tags.push(tag);
  render();
  setTimeout(() => {
    const el = document.getElementById('tag-input');
    if (el) el.focus();
  }, 50);
}
function addTagFromInput(input) {
  const v = input.value;
  if (v.trim()) addTag(v);
  input.value = '';
}
function removeTag(idx) {
  if (formState.tags) formState.tags.splice(idx, 1);
  render();
}

function deleteTx(id) {
  if (!confirm('¿Eliminar este movimiento?')) return;
  transactions = transactions.filter(t => t.id !== id);
  saveTxs(transactions);
  showToast('Movimiento eliminado');
  render();
}
